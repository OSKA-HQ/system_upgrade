// ===== STATE =====
const state = {

// ===== UTILS =====
function fw(n){return '₩ '+(n||0).toLocaleString('ko-KR');}
function fwn(n){return (n||0).toLocaleString('ko-KR');}
function getToday(){const d=new Date();return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function getTodayFull(){const d=new Date();const days=['일','월','화','수','목','금','토'];return getToday()+' ('+days[d.getDay()]+')';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function formatPhone(v){v=v.replace(/[^0-9]/g,'');if(v.length>3&&v.length<=7)return v.slice(0,3)+'-'+v.slice(3);if(v.length>7)return v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);return v;}
function getTravelCost(){return state.sido?(TRAVEL_COST_MAP[state.sido]||0):0;}
function getPresetItems(){return AS_ITEMS_PERGOLA;}
function calcMaterialSum(){
  let s=state.selectedItems.reduce((a,i)=>a+((i.price||0)*(i.qty||0)),0);
  s+=state.customMaterials.reduce((a,i)=>a+((i.price||0)*(i.qty||0)),0);return s;
}
function calcLaborCost(){return state.laborWorkers*state.laborTime*150000;}
function calcEquipSum(){return state.equipments.reduce((a,i)=>a+(i.price||0),0);}
function calcAll(){
  const m=calcMaterialSum(),l=calcLaborCost(),e=calcEquipSum(),t=getTravelCost();
  const supply=m+l+e+t,vat=Math.round(supply*0.1);return{matSum:m,laborCost:l,equipSum:e,travelCost:t,supply,vat,grand:supply+vat};
}

function getConfig(){
  try{
    const saved=JSON.parse(localStorage.getItem('oska_as_config')||'{}');
    // 빈 문자열은 무시하고 DEFAULT_CONFIG 사용
    const merged={...DEFAULT_CONFIG};
    for(const k in saved){if(saved[k]!==undefined&&saved[k]!=='') merged[k]=saved[k];}
    return merged;
  }catch(e){return {...DEFAULT_CONFIG};}
}
function setConfig(c){localStorage.setItem('oska_as_config',JSON.stringify(c));}

// ===== SOLAPI AUTH =====
async function solapiAuth(){
  const cfg=getConfig();
  const date=new Date().toISOString();
  const salt=crypto.getRandomValues(new Uint8Array(16)).reduce((s,b)=>s+b.toString(16).padStart(2,'0'),'');
  const encoder=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',encoder.encode(cfg.apiSecret),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',key,encoder.encode(date+salt));
  const signature=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return{auth:`HMAC-SHA256 apiKey=${cfg.apiKey}, date=${date}, salt=${salt}, signature=${signature}`,sender:cfg.sender};
}

// ===== KAKAO ALIMTALK via SOLAPI =====
async function sendAlimtalk(to, variables){
  const cfg=getConfig();
  if(!cfg.apiKey||!cfg.apiSecret||!cfg.pfId||!cfg.templateId) throw new Error('알림톡 설정 미완료');
  const{auth,sender}=await solapiAuth();
  const res=await fetch('https://api.solapi.com/messages/v4/send',{
    method:'POST',
    headers:{'Authorization':auth,'Content-Type':'application/json'},
    body:JSON.stringify({
      message:{
        to:to.replace(/[^0-9]/g,''),
        from:sender.replace(/[^0-9]/g,''),
        kakaoOptions:{
          pfId:cfg.pfId,
          templateId:cfg.templateId,
          variables:variables
        }
      }
    })
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.errorMessage||`알림톡 발송 실패(${res.status})`);}
  return await res.json();
}

// ===== FONT LOADING FOR PDF =====
let cachedFontR=null, cachedFontB=null, fontLoadAttempted=false, fontAvailable=false;
const FONT_NAME_K='NanumSquare', FONT_NAME_F='helvetica';
let FONT='helvetica'; // 현재 사용 중인 폰트

function arrayBufferToBase64(buf){
  const bytes=new Uint8Array(buf);const chunks=[];const cs=0x8000;
  for(let i=0;i<bytes.length;i+=cs) chunks.push(String.fromCharCode.apply(null,bytes.subarray(i,i+cs)));
  return btoa(chunks.join(''));
}

function fetchFontXHR(url){
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',url,true);
    xhr.responseType='arraybuffer';
    xhr.timeout=8000;
    xhr.onload=function(){
      if(xhr.status===200||xhr.status===0){resolve(arrayBufferToBase64(xhr.response));}
      else reject(new Error('XHR '+xhr.status));
    };
    xhr.onerror=function(){reject(new Error('XHR network error'));};
    xhr.ontimeout=function(){reject(new Error('XHR timeout'));};
    xhr.send();
  });
}

async function fetchFont(url){
  // 1) fetch API 시도
  try{
    const res=await fetch(url,{mode:'cors'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    return arrayBufferToBase64(await res.arrayBuffer());
  }catch(e){console.warn('fetch failed:',url,e.message);}
  // 2) XHR 폴백
  return fetchFontXHR(url);
}

async function registerFonts(doc){
  if(fontLoadAttempted){
    if(fontAvailable&&cachedFontR&&cachedFontB){
      doc.addFileToVFS('NanumSquareR.ttf',cachedFontR);
      doc.addFont('NanumSquareR.ttf','NanumSquare','normal');
      doc.addFileToVFS('NanumSquareB.ttf',cachedFontB);
      doc.addFont('NanumSquareB.ttf','NanumSquare','bold');
      FONT=FONT_NAME_K;
    }else{FONT=FONT_NAME_F;}
    return fontAvailable;
  }
  fontLoadAttempted=true;

  const sources=[
    'https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/NanumSquare',
    'https://hangeul.pstatic.net/hangeul_static/webfont/NanumSquare',
  ];
  for(const base of sources){
    try{
      const[r,b]=await Promise.all([fetchFont(base+'/NanumSquareR.ttf'),fetchFont(base+'/NanumSquareB.ttf')]);
      cachedFontR=r;cachedFontB=b;
      doc.addFileToVFS('NanumSquareR.ttf',r);
      doc.addFont('NanumSquareR.ttf','NanumSquare','normal');
      doc.addFileToVFS('NanumSquareB.ttf',b);
      doc.addFont('NanumSquareB.ttf','NanumSquare','bold');
      fontAvailable=true;FONT=FONT_NAME_K;
      console.log('Korean font loaded from:',base);
      return true;
    }catch(e){console.warn('Font source failed:',base,e.message);continue;}
  }
  console.error('All font sources failed. Using Helvetica.');
  FONT=FONT_NAME_F;fontAvailable=false;
  return false;
}

  const{grand}=calcAll();
  document.getElementById('subPhone').textContent=state.customerPhone;
  document.getElementById('subName').textContent=state.customerName||'-';
  document.getElementById('subAmount').textContent=fw(grand)+' (VAT포함)';
  document.getElementById('submitModal').style.display='flex';
  lucide.createIcons();
}

function setStep(n,status){
  const el=document.getElementById('step'+n);if(!el)return;
  const circle=el.querySelector('div');const label=el.querySelector('span');
  if(status==='active'){circle.className='w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black text-white animate-pulse';label.className='text-[11px] font-bold text-blue-600';}
  else if(status==='done'){circle.className='w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-[10px] font-black text-white';circle.textContent='✓';label.className='text-[11px] font-bold text-green-600';}
  else if(status==='error'){circle.className='w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-[10px] font-black text-white';circle.textContent='!';label.className='text-[11px] font-bold text-red-500';}
  else if(status==='skip'){circle.className='w-6 h-6 bg-neutral-300 rounded-full flex items-center justify-center text-[10px] font-black text-white';circle.textContent='-';label.className='text-[11px] font-bold text-neutral-400';}
}

async function executeSubmit(){
  document.getElementById('submitModal').style.display='none';
  document.getElementById('progressModal').style.display='flex';

  const cfg=getConfig();
  const{matSum,laborCost,equipSum,travelCost,supply,vat,grand}=calcAll();
  const travelLabel=TRAVEL_LABEL[travelCost]||'';
  const addr=[state.sido,state.sigungu].filter(Boolean).join(' ');
  const laborTimeLabel=state.laborTime===1?'반일':'종일';
  let pdfDoc=null, pdfBlob=null;

  // STEP 1: PDF 생성
  setStep(1,'active');
  try{
    pdfDoc=await generatePDF();
    pdfBlob=pdfDoc.output('blob');
    setStep(1,'done');
  }catch(err){
    console.error('PDF 생성 실패:',err);
    setStep(1,'error');
    setTimeout(()=>{document.getElementById('progressModal').style.display='none';showToast('PDF 생성 실패: '+err.message);},1500);
    return;
  }

  // STEP 2: 회사 이메일 알림
  setStep(2,'active');
  if(cfg.emailServiceId&&cfg.emailTemplateId&&cfg.emailPublicKey){
    try{
      if(typeof emailjs==='undefined') throw new Error('EmailJS 라이브러리 미로드');
      emailjs.init(cfg.emailPublicKey);
      const itemList=state.selectedItems.map(i=>`${i.name} (${fwn(i.price)}원×${i.qty}${i.unit})`).join(', ');
      const customMatList=state.customMaterials.map(i=>`${i.name} (${fwn(i.price)}원×${i.qty})`).join(', ');
      const equipList=state.equipments.map(i=>`${i.name} (${fwn(i.price)}원)`).join(', ');
      await emailjs.send(cfg.emailServiceId,cfg.emailTemplateId,{
        to_email: cfg.companyEmail||'',
        customer_name: state.customerName||'-',
        customer_phone: state.customerPhone||'-',
        site_location: addr||'-',
        author: state.authorName||'-',
        tax_type: state.taxType,
        preset_items: itemList||'없음',
        custom_items: customMatList||'없음',
        equip_items: equipList||'없음',
        mat_sum: fw(calcMaterialSum()),
        labor_info: `${state.laborWorkers}명 × ${laborTimeLabel} × 150,000원 = ${fw(laborCost)}`,
        equip_sum: fw(calcEquipSum()),
        travel_info: (travelLabel?travelLabel+' ':'')+ fw(travelCost),
        supply_amount: fw(supply),
        vat_amount: fw(vat),
        total_amount: fw(grand),
        memo: state.memo||'없음',
        submit_time: new Date().toLocaleString('ko-KR'),
      });
      setStep(2,'done');
    }catch(err){
      console.error('이메일 발송 실패:',err);
      setStep(2,'error');
      const errMsg=err?.text||err?.message||err?.status||JSON.stringify(err,Object.getOwnPropertyNames(err));
      alert('이메일 오류: '+errMsg);
    }
  }else{
    setStep(2,'skip');
  }

  // STEP 3: PDF 저장
  setStep(3,'active');
  try{
    const fn=`OSKA_AS_${state.customerName||'견적서'}_${getToday().replace(/\./g,'')}.pdf`;
    const dataUri=pdfDoc.output('datauristring');
    const link=document.createElement('a');
    link.href=dataUri;
    link.download=fn;
    link.style.display='none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setStep(3,'done');
  }catch(err){
    console.error('PDF 저장 실패:',err);
    setStep(3,'error');
  }

  // STEP 4: OSKA Works Firestore 저장 (works_as_requests + CRM)
  setStep && setStep(4,'active');
  try {
    await saveASToFirestore({
      customerName: state.customerName||'',
      customerPhone: state.customerPhone||'',
      sido: state.sido||'', sigungu: state.sigungu||'',
      authorName: state.authorName||'',
      totalAmount: grand,
      matSum, laborCost, equipSum, travelCost,
      memo: state.memo||'',
      status: '접수'
    });
    setStep && setStep(4,'done');
  } catch(err) {
    console.warn('Firestore 저장 실패(AS 진행은 계속):', err);
    setStep && setStep(4,'skip');
  }

  // 완료
  setTimeout(()=>{
    document.getElementById('progressModal').style.display='none';
    showToast('견적서 제출이 완료되었습니다!');
  },1200);
}

async function saveASToFirestore(data) {
  if (!window._asDB) return;
  const { db, collection, addDoc, serverTimestamp } = window._asDB;
  // works_as_requests에 저장
  await addDoc(collection(db, 'works_as_requests'), {
    ...data, createdAt: serverTimestamp(), submitTime: new Date().toLocaleString('ko-KR')
  });
  // CRM에도 동시 등록 (전화번호 있을 때)
  if (data.customerPhone) {
    const no = Math.floor(Math.random() * 100000) + 90000;
    await addDoc(collection(db, 'crm_customers'), {
      no, brand: '오스카', channel: 'AS접수',
      phone: data.customerPhone, custType: '개인',
      province: data.sido||'', district: data.sigungu||'',
      address: [data.sido, data.sigungu].filter(Boolean).join(' '),
      content: `[AS접수] ${data.authorName||''} - ${data.memo||''}`,
      grade: '', grade2: '', product: '', consent: '',
      assignedBranch: '', status: '미배정',
      // KST 로컬 날짜 (UTC slice(0,10) 사용 시 새벽 시간대 -9시간 오차 버그 BUG-003)
      date: (function(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })(),
      source: 'live',
      createdAt: serverTimestamp()
    });
  }
  // EmailJS 알림 (비동기, 실패해도 접수는 성공)
  sendASEmailNotification(data).catch(e => console.warn('AS 이메일 알림 실패:', e));
}

// #23 AS 접수 이메일 알림
async function sendASEmailNotification(data) {
  if (!window._asEmail || !window.emailjs) return;
  const { serviceId, templateIdAS, templateId } = window._asEmail;
  const template = templateIdAS || templateId; // 전용 템플릿 없으면 기존 템플릿 재사용
  if (!serviceId || !template) return;
  const recipient = window._asEmailRecipient || '';
  // 제목이 기존 로그인 알림 템플릿과 공유되는 경우를 위해 prefix로 구분
  const params = {
    subject_prefix: '[AS 접수]',
    branch: '🔧 AS 신규 접수 — ' + (data.customerName || '고객'),
    password: (data.totalAmount ? '₩' + Number(data.totalAmount).toLocaleString('ko-KR') : '금액 없음'),
    ip: data.customerPhone || '연락처 없음',
    location: [data.sido, data.sigungu].filter(Boolean).join(' ') || '위치 없음',
    device: '접수자: ' + (data.authorName || '-'),
    resolution: '메모: ' + ((data.memo || '-').slice(0, 200)),
    windowSize: '',
    timestamp: new Date().toLocaleString('ko-KR'),
    to_email: recipient
  };
  await window.emailjs.send(serviceId, template, params);
}
