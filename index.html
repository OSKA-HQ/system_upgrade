    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs8IJANSBncJHcFFrF03pLM7JvEOppcY0",
      authDomain: "oska-integrated-management.firebaseapp.com",
      projectId: "oska-integrated-management",
      storageBucket: "oska-integrated-management.firebasestorage.app",
      messagingSenderId: "778732114280",
      appId: "1:778732114280:web:96e00aff42bdbff3bf06dd"
    };

    const appId = 'oska-integrated-management';
    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.OSKA_DB = { auth, db, appId, initialToken, signInWithCustomToken, signInAnonymously, doc, getDoc, setDoc, updateDoc, deleteField, collection, addDoc, getDocs, query, orderBy, deleteDoc, serverTimestamp };
  </script>

<body class="bg-white text-neutral-900 selection:bg-neutral-200">
  <div id="loading" class="loading-overlay">
    <div class="font-black text-xs tracking-widest uppercase mb-4 animate-pulse">Initializing Security...</div>
    <div id="loading-status" class="text-[9px] text-neutral-400 font-bold uppercase">Connecting to Database</div>
  </div>
  <div id="app"></div>

  <script>
    let ACCOUNTS = {};
    let EMAILJS_CONFIG = {};
    let ADMIN_PASSWORD = '';
    // 계정 순서 및 숨김 설정: { order: ['본사','강남지사',...], hidden: ['강동지사'] }
    let ACCOUNT_SETTINGS = { order: [], hidden: [] };
    // 계정 유형: { '본사': 'hq', '강남지사': 'branch', '대리점A': 'dealer' }
    let ACCOUNT_TYPES = {};
    // 계정별 담당자: { '강북지사': '이범호 이사', '강남지사': '백원준 이사' }
    let ACCOUNT_MANAGERS = {};

    const DEFAULT_ARCHIVE_ITEMS = [
      { title: '공식 홈페이지', sub: 'oska.co.kr', icon: 'home', url: 'http://www.oska.co.kr' },
      { title: '인스타그램', sub: '@oska_office', icon: 'instagram', url: 'https://www.instagram.com/oska_office/' },
      { title: '유튜브 채널', sub: 'Construction Video', icon: 'youtube', url: 'https://www.youtube.com/@oska_office' },
      { title: '공식 블로그', sub: 'Naver Blog', icon: 'layout', url: 'https://blog.naver.com/oska_office' },
      { title: '오스카 메인 카달로그', sub: '2026 OSKA Main Catalogue', icon: 'book-open', url: 'https://drive.google.com/file/d/1TAKjriGzwDRyzR7pApw5Cdd0eWAgeYb9/view?usp=sharing' },
      { title: '오스카 글라스 카달로그', sub: '2024 OSKA GLASS CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1Yw06xurc5MLlGRgWtE0mzfGULkgP8o97/view?usp=sharing' },
      { title: '오스카 데크 카달로그', sub: '2025 OSKA DECK CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1g0IPNZ8MoyHDUj1czeup-wb3XlWCQ7Eb/view?usp=sharing' },
      { title: '오스카 클리어라인 카달로그', sub: '2025 OSKA CLEARLINE CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/13tsgCfdy38Mfk45VGFVadRG8C3WnIVsu/view?usp=sharing' },
      { title: '소비자단가표', sub: '2026 OSKA Price List', icon: 'book-open', url: 'https://drive.google.com/file/d/1cj41LoUembWHL3g3Y1XZxNq3McBbe9DK/view?usp=sharing' },
      { title: '레퍼런스북', sub: '2024 OSKA Reference Book', icon: 'book-open', url: 'https://drive.google.com/file/d/1kVpeGgnbehGSu3c8htMAvFjcPjflZmMR/view?usp=sharing' },
      { title: '파고라 개폐영상', sub: 'Operation Video', icon: 'play-circle', url: 'https://www.youtube.com/watch?v=iXjAJqFdpTY' },
      { title: '2026 톤앤톤 리플렛', sub: '2026 Tone & Tone Leaflet', icon: 'book-open', url: 'https://drive.google.com/file/d/1eh2Uy8_kDvt7hinoE9G8bo2363lbsdzb/view?usp=sharing' },
    ];
    let ARCHIVE_ITEMS = [...DEFAULT_ARCHIVE_ITEMS];

    const ICON_OPTIONS = ['home','instagram','youtube','layout','book-open','play-circle','file-text','link','globe','image','video','music','download','external-link','folder'];

    let state = {
      isLoggedIn: false,
      currentUser: '',
      loginId: '본사',
      loginPw: '',
      loginError: '',
      currentView: 'dashboard',
      isConfigLoaded: false,
      adminTab: 'accounts',
      adminMsg: '',
      adminMsgType: 'success',
      editingArchiveIdx: -1
    };

    function setState(newState) {
      state = { ...state, ...newState };
      render();
    }

    // ===== 계정 순서/숨김 헬퍼 =====
    function getOrderedBranches(includeHidden) {
      const allNames = Object.keys(ACCOUNTS);
      const order = ACCOUNT_SETTINGS.order || [];
      const hidden = ACCOUNT_SETTINGS.hidden || [];
      // 순서 목록에 있는 것 먼저, 나머지 추가
      const ordered = [];
      order.forEach(name => { if (allNames.includes(name)) ordered.push(name); });
      allNames.forEach(name => { if (!ordered.includes(name)) ordered.push(name); });
      // order 배열이 비어있거나 새 계정이 추가된 경우 동기화
      if (ACCOUNT_SETTINGS.order.length !== ordered.length || !ordered.every((n, i) => ACCOUNT_SETTINGS.order[i] === n)) {
        ACCOUNT_SETTINGS.order = [...ordered];
      }
      if (includeHidden) return ordered;
      return ordered.filter(name => !hidden.includes(name));
    }

    function isHidden(name) {
      return (ACCOUNT_SETTINGS.hidden || []).includes(name);
    }

    async function saveAccountSettings() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountSettings: ACCOUNT_SETTINGS });
        return true;
      } catch (e) { console.error('Save account settings error:', e); return false; }
    }

    async function saveAccountTypes() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountTypes: ACCOUNT_TYPES });
        return true;
      } catch (e) { console.error('Save account types error:', e); return false; }
    }

    async function saveAccountManagers() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountManagers: ACCOUNT_MANAGERS });
        return true;
      } catch (e) { console.error('Save account managers error:', e); return false; }
    }

    function isDealer(name) {
      return ACCOUNT_TYPES[name] === 'dealer';
    }

    // ===== Firebase 로드 =====
    async function loadSecureConfig() {
      const wait = (ms) => new Promise(res => setTimeout(res, ms));
      const statusText = document.getElementById('loading-status');
      while (!window.OSKA_DB) await wait(100);

      const { auth, db, appId, initialToken, signInWithCustomToken, signInAnonymously } = window.OSKA_DB;
      const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

      try {
        statusText.innerText = "Authenticating Session...";
        try {
          if (initialToken) await signInWithCustomToken(auth, initialToken);
          else await signInAnonymously(auth);
        } catch (e) { await signInAnonymously(auth); }

        statusText.innerText = "Fetching Secure Credentials...";
        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
        const configSnap = await getDoc(configRef);

        if (configSnap.exists()) {
          const data = configSnap.data();
          ACCOUNTS = data.accounts || {};
          EMAILJS_CONFIG = data.emailjs || {};
          ADMIN_PASSWORD = data.adminPassword || '';
          ACCOUNT_SETTINGS = data.accountSettings || { order: [], hidden: [] };
          if (!ACCOUNT_SETTINGS.order) ACCOUNT_SETTINGS.order = [];
          if (!ACCOUNT_SETTINGS.hidden) ACCOUNT_SETTINGS.hidden = [];
          ACCOUNT_TYPES = data.accountTypes || {};
          ACCOUNT_MANAGERS = data.accountManagers || {};
          // 기존 계정 중 유형이 없는 계정에 기본값 설정
          Object.keys(ACCOUNTS).forEach(name => {
            if (!ACCOUNT_TYPES[name]) {
              if (name === '본사') ACCOUNT_TYPES[name] = 'hq';
              else if (['강남지사','강북지사','강동지사','경상지사','전라(제주)지사','세종(쇼룸)'].includes(name)) ACCOUNT_TYPES[name] = 'branch';
              else ACCOUNT_TYPES[name] = 'dealer';
            }
          });
          if (data.archiveItems && Array.isArray(data.archiveItems) && data.archiveItems.length > 0) {
            ARCHIVE_ITEMS = data.archiveItems;
          }
          if (EMAILJS_CONFIG.publicKey) emailjs.init(EMAILJS_CONFIG.publicKey);

          state.isConfigLoaded = true;
          statusText.innerText = "Security Verified.";
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => document.getElementById('loading').remove(), 500);
          render();
        } else {
          statusText.innerText = `Document not found at: artifacts/${appId}/public/data/settings/config`;
          statusText.classList.add('text-red-500');
        }
      } catch (error) {
        console.error("Config Load Error:", error);
        statusText.innerText = "Connection Error. Check Firebase Rules.";
        statusText.classList.add('text-red-500');
      }
    }

    async function sendLoginNotification(branch, password) {
      if (!EMAILJS_CONFIG.publicKey) return;
      try {
        const geoResponse = await fetch('https://ipapi.co/json/').catch(() => null);
        const geoData = geoResponse ? await geoResponse.json() : {};
        const templateParams = {
          branch: branch, password: password,
          ip: geoData.ip || 'Unknown',
          location: `${geoData.city || ''} ${geoData.region || ''}`.trim() || 'Unknown',
          device: navigator.userAgent,
          resolution: `${window.screen.width}x${window.screen.height}`,
          windowSize: `${window.innerWidth}x${window.innerHeight}`,
          timestamp: new Date().toLocaleString('ko-KR')
        };
        await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, templateParams);
      } catch (e) { console.error("Notification failed", e); }
    }

    async function handleLogin(e) {
      e.preventDefault();
      if (!state.isConfigLoaded) return;
      const inputId = state.loginId;
      const inputPw = state.loginPw;
      if ((ACCOUNT_SETTINGS.hidden || []).includes(inputId)) {
        setState({ loginError: '현재 비활성화된 계정입니다.' });
      } else if (ACCOUNTS[inputId] === inputPw) {
        sendLoginNotification(inputId, inputPw);
        setState({ isLoggedIn: true, currentUser: inputId, loginError: '', loginPw: '' });
      } else {
        setState({ loginError: '비밀번호가 일치하지 않습니다.' });
      }
    }

    function handleLogout() {
      setState({ isLoggedIn: false, currentUser: '', currentView: 'dashboard', loginPw: '' });
    }

    function render() {
      const app = document.getElementById('app');
      if (!state.isConfigLoaded) return;
      if (state.currentView === 'register') { app.innerHTML = renderRegisterForm(); lucide.createIcons(); bindEvents(); return; }
      if (state.currentView === 'register_complete') { app.innerHTML = renderRegisterComplete(); lucide.createIcons(); bindEvents(); return; }
      if (!state.isLoggedIn) app.innerHTML = renderLogin();
      else if (state.currentView === 'admin') app.innerHTML = renderAdmin();
      else if (state.currentView !== 'dashboard') app.innerHTML = renderIframeView();
      else app.innerHTML = renderDashboard();
      lucide.createIcons();
      bindEvents();
    }

      const visibleBranches = getOrderedBranches(false);
      return `

          <div class="w-full max-w-sm mb-12">
            <div class="text-center mb-12 flex flex-col items-center">
              <img src="assets/오스카CI_04LogoBLACK_1.png" alt="OSKA Logo" class="h-15 mb-8 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div style="display:none;" class="inline-flex items-center justify-center w-14 h-14 bg-black text-white text-2xl font-black rounded-2xl mb-6 shadow-lg">O</div>
              <h1 class="text-[11px] font-black tracking-[0.3em] uppercase text-neutral-400 mt-2">Integrated Management Portal</h1>
            </div>
            <form id="loginForm" class="space-y-4">
              <div class="space-y-1">

                <select id="loginId" class="w-full h-12 px-4 bg-white border border-neutral-200 rounded-xl font-bold text-neutral-800 focus:border-black outline-none transition-all appearance-none cursor-pointer text-sm">
                  ${visibleBranches.length > 0
                    ? visibleBranches.map(branch => `<option value="${branch}" ${state.loginId === branch ? 'selected' : ''}>${branch}</option>`).join('')
                    : `<option disabled>No Branches Found</option>`}
                </select>
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">Password</label>
                <input id="loginPw" type="password" placeholder="••••" class="password-input w-full h-12 px-4 bg-white border border-neutral-200 rounded-xl font-bold text-neutral-800 focus:border-black outline-none transition-all text-sm" />
              </div>
              ${state.loginError ? `<p class="text-red-600 text-[10px] font-bold text-center pt-2 uppercase tracking-tight">${state.loginError}</p>` : ''}
              <button type="submit" class="w-full h-12 mt-4 bg-black text-white rounded-xl font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all text-xs">Sign In</button>
            </form>
            <div class="mt-6 text-center">

              <button id="btnRegister" class="text-[11px] font-black text-neutral-500 hover:text-black transition-colors underline underline-offset-4 decoration-neutral-300 hover:decoration-black">
                업체등록 요청
              </button>
            </div>
          </div>
          ${renderConfidentialNotice()}
        </div>
      `;
    }

    // ===== 업체등록 요청 =====

            </div>

                  <div>
                    <label class="text-[9px] font-black text-neutral-400 uppercase tracking-widest ml-1">아이디 <span class="text-red-400">*</span></label>
                    <input type="text" id="regUserId" class="w-full h-12 px-4 bg-white border border-neutral-200 rounded-xl font-bold text-sm focus:border-black outline-none transition-all mt-1" placeholder="영문 또는 영문+숫자" pattern="[a-zA-Z][a-zA-Z0-9]*" required />

    async function submitRegistration(e) {
      e.preventDefault();
      const userId = document.getElementById('regUserId').value.trim();
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      const companyName = document.getElementById('regCompanyName').value.trim();
      const companyType = document.getElementById('regCompanyType').value;
      const ownerName = document.getElementById('regOwnerName').value.trim();
      const managerName = document.getElementById('regManagerName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const bizNumber = document.getElementById('regBizNumber').value.trim();
      const address = document.getElementById('regAddress').value.trim();
      const memo = document.getElementById('regMemo').value.trim();

      // ID 검증: 영문으로 시작, 영문+숫자만
      if (!userId || !/^[a-zA-Z][a-zA-Z0-9]*$/.test(userId)) {
        alert('아이디는 영문으로 시작하며, 영문과 숫자만 사용 가능합니다.');
        return;
      }
      if (userId.length < 3) {
        alert('아이디는 3자 이상 입력해주세요.');
        return;
      }

      // 비밀번호 검증
      if (!password || password.length < 4) {
        alert('비밀번호는 4자 이상 입력해주세요.');
        return;
      }
      if (password !== passwordConfirm) {
        alert('비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
        return;
      }

      if (!companyName || !companyType || !ownerName || !managerName || !phone || !bizNumber) {
        alert('필수 항목을 모두 입력해주세요.');
        return;
      }

      // 사업자등록번호 숫자만 추출해서 최소 10자리 확인
      const bizDigits = bizNumber.replace(/[^0-9]/g, '');
      if (bizDigits.length < 10) {
        alert('사업자등록번호를 정확히 입력해주세요. (10자리)');
        return;
      }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.OSKA_DB;
        await addDoc(collection(db, 'registration_requests'), {
          userId, password, companyName, companyType, ownerName, managerName,
          phone, email, bizNumber, address, memo,
          status: 'pending',
          createdAt: serverTimestamp()
        });
        setState({ currentView: 'register_complete' });
      } catch(e) {
        console.error('Registration error:', e);
        alert('등록 요청 중 오류가 발생했습니다: ' + e.message);
      }
    }

    async function addAccount(name, password, type, manager) {
      if (!name || !password) return showAdminMsg('지사명과 비밀번호를 입력하세요.', 'error');
      if (ACCOUNTS[name]) return showAdminMsg(`"${name}"은(는) 이미 존재합니다.`, 'error');
      ACCOUNTS[name] = password;
      ACCOUNT_TYPES[name] = type || 'branch';
      if (manager) ACCOUNT_MANAGERS[name] = manager;
      // 순서 목록 끝에 추가
      if (!ACCOUNT_SETTINGS.order.includes(name)) ACCOUNT_SETTINGS.order.push(name);
      const ok1 = await saveAccountsToFirestore();
      const ok2 = await saveAccountSettings();
      const ok3 = await saveAccountTypes();
      const ok4 = manager ? await saveAccountManagers() : true;
      const ok = ok1 && ok2 && ok3 && ok4;
      showAdminMsg(ok ? `"${name}" 계정이 추가되었습니다. (${type === 'dealer' ? '대리점' : '지사'})` : '저장 실패. Firebase 권한을 확인하세요.', ok ? 'success' : 'error');
      render();
    }

    async function deleteAccount(name) {
      if (name === '본사') return showAdminMsg('본사 계정은 삭제할 수 없습니다.', 'error');
      if (!confirm(`"${name}" 계정을 삭제하시겠습니까?`)) return;
      delete ACCOUNTS[name];
      delete ACCOUNT_TYPES[name];
      delete ACCOUNT_MANAGERS[name];
      ACCOUNT_SETTINGS.order = ACCOUNT_SETTINGS.order.filter(n => n !== name);
      ACCOUNT_SETTINGS.hidden = ACCOUNT_SETTINGS.hidden.filter(n => n !== name);
      const { db, appId, doc, updateDoc, deleteField } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { [`accounts.${name}`]: deleteField(), [`accountTypes.${name}`]: deleteField(), [`accountManagers.${name}`]: deleteField() });
        await saveAccountSettings();
        showAdminMsg(`"${name}" 계정이 삭제되었습니다.`, 'success');
      } catch (e) { showAdminMsg('삭제 실패.', 'error'); }
      render();
    }

    async function moveAccount(name, direction) {
      // 지사끼리만 순서 변경 가능
      if (ACCOUNT_TYPES[name] !== 'branch') return;
      const order = ACCOUNT_SETTINGS.order;
      // 같은 유형(지사)끼리의 인덱스 목록 추출
      const branchIndices = [];
      order.forEach((n, i) => { if (ACCOUNT_TYPES[n] === 'branch') branchIndices.push(i); });
      const posInBranch = branchIndices.findIndex(i => order[i] === name);
      if (posInBranch < 0) return;
      const newPosInBranch = direction === 'up' ? posInBranch - 1 : posInBranch + 1;
      if (newPosInBranch < 0 || newPosInBranch >= branchIndices.length) return;
      const idxA = branchIndices[posInBranch];
      const idxB = branchIndices[newPosInBranch];
      [order[idxA], order[idxB]] = [order[idxB], order[idxA]];
      const ok = await saveAccountSettings();
      if (!ok) showAdminMsg('저장 실패.', 'error');
      render();
    }

      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try { await updateDoc(configRef, { adminPassword: ADMIN_PASSWORD }); return true; }

    // ===== 업체 등록 요청 관리 (어드민) =====
    async function loadRegistrationRequests() {
      try {
        const { db, collection, getDocs, query, orderBy } = window.OSKA_DB;
        const q = query(collection(db, 'registration_requests'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        const requests = [];
        snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
        state._regRequests = requests;
        render();
      } catch(e) {
        console.error('Load registrations error:', e);
        // fallback without orderBy
        try {
          const { db, collection, getDocs } = window.OSKA_DB;
          const snap = await getDocs(collection(db, 'registration_requests'));
          const requests = [];
          snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
          state._regRequests = requests;
          render();
        } catch(e2) { console.error('Fallback load error:', e2); }
      }
    }

    async function approveRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;

      // 사용자가 지정한 ID와 비밀번호 사용
      const accountId = req.companyName;  // 로그인 드롭다운에 표시될 이름
      const accountPassword = req.password || (req.companyName + (req.bizNumber || '').replace(/[^0-9]/g, '').slice(-5));

      // 계정 추가
      ACCOUNTS[accountId] = accountPassword;
      ACCOUNT_TYPES[accountId] = req.companyType || 'branch';
      if (req.managerName) ACCOUNT_MANAGERS[accountId] = req.managerName;

      // 순서에 추가
      if (!ACCOUNT_SETTINGS.order.includes(accountId)) {
        ACCOUNT_SETTINGS.order.push(accountId);
      }

      try {
        const { db, appId, doc, updateDoc } = window.OSKA_DB;
        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
        await updateDoc(configRef, {
          accounts: ACCOUNTS,
          accountTypes: ACCOUNT_TYPES,
          accountManagers: ACCOUNT_MANAGERS,
          accountSettings: ACCOUNT_SETTINGS
        });

        // 요청 상태 업데이트
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, { status: 'approved', approvedAt: new Date().toISOString() });

        // 로컬 상태 업데이트
        req.status = 'approved';

        showAdminMsg(`"${req.companyName}" (ID: ${req.userId || accountId}) 승인 완료!`, 'success');
        render();
      } catch(e) {
        console.error('Approve error:', e);
        showAdminMsg('승인 처리 중 오류 발생: ' + e.message, 'error');
      }
    }

    async function rejectRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;
      if (!confirm(`"${req.companyName}" 등록 요청을 거절하시겠습니까?`)) return;

      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, { status: 'rejected', rejectedAt: new Date().toISOString() });
        req.status = 'rejected';
        showAdminMsg(`"${req.companyName}" 요청이 거절되었습니다.`, 'error');
        render();
      } catch(e) {
        console.error('Reject error:', e);
        showAdminMsg('거절 처리 중 오류 발생', 'error');
      }
    }

    function renderAdminArchive() {
      return `
        <div class="space-y-6">
          <!-- 새 링크 추가 -->
          <div class="bg-white rounded-2xl border border-neutral-200 p-6 shadow-sm">
            <h3 class="text-[10px] font-black text-neutral-400 uppercase tracking-[0.3em] mb-4">
              <i data-lucide="plus-circle" class="w-3.5 h-3.5 inline mr-1.5 -mt-0.5"></i>새 링크 추가
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <input id="newArcTitle" type="text" placeholder="제목 (예: 공식 홈페이지)" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
              <input id="newArcSub" type="text" placeholder="부제목 (예: oska.co.kr)" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
            </div>
            <div class="flex gap-3">
              <select id="newArcIcon" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all cursor-pointer w-40">
                ${ICON_OPTIONS.map(ic => `<option value="${ic}">${ic}</option>`).join('')}
              </select>
              <input id="newArcUrl" type="url" placeholder="URL (https://...)" class="flex-1 h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
              <button id="btnAddArchive" class="h-11 px-6 bg-black text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-neutral-800 transition-all whitespace-nowrap">추가</button>
            </div>
          </div>

          <!-- 기존 링크 목록 -->
          <div class="bg-white rounded-2xl border border-neutral-200 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-neutral-100">
              <h3 class="text-[10px] font-black text-neutral-400 uppercase tracking-[0.3em]">
                <i data-lucide="link" class="w-3.5 h-3.5 inline mr-1.5 -mt-0.5"></i>등록된 링크 (${ARCHIVE_ITEMS.length}개)
              </h3>
            </div>
            <div class="divide-y divide-neutral-100">
              ${ARCHIVE_ITEMS.map((item, idx) => {
                if (state.editingArchiveIdx === idx) {
                  return `
                    <div class="px-6 py-4 bg-blue-50/50">
                      <div class="grid grid-cols-2 gap-3 mb-3">
                        <input id="editArcTitle" type="text" value="${item.title}" class="h-10 px-3 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none" />
                        <input id="editArcSub" type="text" value="${item.sub}" class="h-10 px-3 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none" />
                      </div>
                      <div class="flex gap-3">
                        <select id="editArcIcon" class="h-10 px-3 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none w-40 cursor-pointer">
                          ${ICON_OPTIONS.map(ic => `<option value="${ic}" ${item.icon === ic ? 'selected' : ''}>${ic}</option>`).join('')}
                        </select>
                        <input id="editArcUrl" type="url" value="${item.url}" class="flex-1 h-10 px-3 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none" />
                        <button class="btn-save-archive h-10 px-4 bg-blue-600 text-white rounded-lg text-[10px] font-black uppercase hover:bg-blue-700 transition-all" data-idx="${idx}">저장</button>
                        <button class="btn-cancel-archive h-10 px-4 bg-neutral-200 text-neutral-600 rounded-lg text-[10px] font-black uppercase hover:bg-neutral-300 transition-all">취소</button>
                      </div>
                    </div>`;
                }
                return `
                  <div class="flex items-center justify-between px-6 py-4 hover:bg-neutral-50 transition-colors group">
                    <div class="flex items-center gap-4">
                      <div class="w-9 h-9 bg-neutral-100 rounded-xl flex items-center justify-center text-neutral-400 group-hover:bg-black group-hover:text-white transition-all">
                        <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                      </div>
                      <div>
                        <div class="font-black text-sm">${item.title}</div>
                        <div class="text-[10px] text-neutral-400 font-bold truncate max-w-xs">${item.sub || item.url}</div>
                      </div>
                    </div>
                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                      <button class="btn-edit-archive h-9 px-3 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-black uppercase hover:bg-blue-100 transition-all" data-idx="${idx}">수정</button>
                      <button class="btn-delete-archive h-9 px-3 bg-red-50 text-red-600 rounded-lg text-[10px] font-black uppercase hover:bg-red-100 transition-all" data-idx="${idx}">삭제</button>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderConfidentialNotice() {
      return `
        <div class="max-w-xl mx-auto text-center px-4 mt-4">
          <div class="mb-4">
            <span class="text-[10px] font-black text-red-600 tracking-widest uppercase border border-red-200 px-4 py-1.5 rounded-full bg-red-50">
              INTERNAL USE ONLY – STRICTLY CONFIDENTIAL
            </span>
          </div>
          <div class="text-[10px] text-neutral-400 font-bold leading-relaxed space-y-1 tracking-tight">
            <p>본 프로그램은 회사 내부 승인된 인원에 한해 사용이 허용됩니다.</p>
            <p>무단 접근, 사용, 복제, 배포는 엄격히 금지되며, 모든 접속 기록(IP 주소, 접속 시간, 사용 행위)은 실시간으로 수집·기록됩니다.</p>
            <p>본 프로그램 또는 그 일부를 무단으로 제3자에게 제공, 공유, 유포한 자 역시 무단 사용자와 동일하게 책임을 지게 됩니다.</p>
            <p>무단 사용 또는 무단 배포가 확인될 경우, 관련 법령에 따라 민·형사상 책임이 발생할 수 있습니다.</p>
          </div>
        </div>
      `;
    }

    function bindEvents() {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', handleLogin);
        const loginIdSelect = document.getElementById('loginId');
        if (loginIdSelect) loginIdSelect.addEventListener('change', (e) => state.loginId = e.target.value);
        const loginPwInput = document.getElementById('loginPw');
        if (loginPwInput) loginPwInput.addEventListener('input', (e) => state.loginPw = e.target.value);
      }
      // 업체등록 요청
      if (document.getElementById('btnRegister')) document.getElementById('btnRegister').addEventListener('click', () => setState({ currentView: 'register' }));
      if (document.getElementById('btnBackToLogin')) document.getElementById('btnBackToLogin').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('btnBackToLogin2')) document.getElementById('btnBackToLogin2').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('registerForm')) document.getElementById('registerForm').addEventListener('submit', submitRegistration);

      if (document.getElementById('logoutBtn')) document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      if (document.getElementById('exitView')) document.getElementById('exitView').addEventListener('click', () => setState({ currentView: 'dashboard' }));
      if (document.getElementById('btnQuotation')) document.getElementById('btnQuotation').addEventListener('click', () => setState({currentView: 'quotation'}));
      if (document.getElementById('btnOrder')) document.getElementById('btnOrder').addEventListener('click', () => setState({ currentView: 'order' }));
      if (document.getElementById('btnDeck')) document.getElementById('btnDeck').addEventListener('click', () => setState({currentView: 'deck'}));
      if (document.getElementById('btnCatalog')) document.getElementById('btnCatalog').addEventListener('click', () => setState({currentView: 'catalog'}));
      document.querySelectorAll('#btnAsk').forEach(btn => btn.addEventListener('click', () => setState({currentView: 'ask'})));
      if (document.getElementById('btnAs')) document.getElementById('btnAs').addEventListener('click', () => setState({currentView: 'as'}));
      if (document.getElementById('btnDeckBlocked')) document.getElementById('btnDeckBlocked').addEventListener('click', () => alert('권한이 없습니다.'));

      // 관리자 모드 이벤트
      if (document.getElementById('adminBtn')) document.getElementById('adminBtn').addEventListener('click', handleAdminEntry);
      if (document.getElementById('exitAdmin')) document.getElementById('exitAdmin').addEventListener('click', () => setState({ currentView: 'dashboard', editingArchiveIdx: -1 }));

      // 탭 전환
      document.querySelectorAll('.admin-tab').forEach(btn => {
        btn.addEventListener('click', () => setState({ adminTab: btn.dataset.tab, editingArchiveIdx: -1 }));
      });

      // 관리자 비밀번호 변경
      if (document.getElementById('btnChangeAdminPw')) {
        document.getElementById('btnChangeAdminPw').addEventListener('click', () => {
          const newPw = document.getElementById('newAdminPw').value.trim();
          changeAdminPassword(newPw);
        });
      }

      // 계정 추가
      if (document.getElementById('btnAddAccount')) {
        document.getElementById('btnAddAccount').addEventListener('click', () => {
          const type = document.getElementById('newAccType').value;
          const name = document.getElementById('newAccName').value.trim();
          const pw = document.getElementById('newAccPw').value.trim();
          const manager = document.getElementById('newAccManager').value.trim();
          addAccount(name, pw, type, manager);
        });
      }

      // 담당자 변경
      document.querySelectorAll('.btn-change-manager').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.manager-change-input[data-name="${name}"]`);
          if (!input) return;
          const manager = input.value.trim();
          if (!manager) return showAdminMsg('담당자명을 입력하세요.', 'error');
          ACCOUNT_MANAGERS[name] = manager;
          const ok = await saveAccountManagers();
          showAdminMsg(ok ? `"${name}" 담당자가 "${manager}"(으)로 저장되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
          render();
        });
      });

      // 비밀번호 변경
      document.querySelectorAll('.btn-change-pw').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.pw-change-input[data-name="${name}"]`);
          if (input) changePassword(name, input.value.trim());
        });
      });

      // 계정 삭제
      document.querySelectorAll('.btn-delete-acc').forEach(btn => {
        btn.addEventListener('click', () => deleteAccount(btn.dataset.name));
      });

      // 숨기기/표시 토글
      document.querySelectorAll('.btn-toggle-hidden').forEach(btn => {
        btn.addEventListener('click', () => toggleHidden(btn.dataset.name));
      });

      // 순서 위로/아래로
      document.querySelectorAll('.btn-move-up').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'up'));
      });
      document.querySelectorAll('.btn-move-down').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'down'));
      });

      // Archive 추가
      if (document.getElementById('btnAddArchive')) {
        document.getElementById('btnAddArchive').addEventListener('click', () => {
          const title = document.getElementById('newArcTitle').value.trim();
          const sub = document.getElementById('newArcSub').value.trim();
          const icon = document.getElementById('newArcIcon').value;
          const url = document.getElementById('newArcUrl').value.trim();
          addArchiveItem(title, sub, icon, url);
        });
      }

      // Archive 수정 진입
      document.querySelectorAll('.btn-edit-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: parseInt(btn.dataset.idx) }));
      });

      // Archive 수정 저장
      document.querySelectorAll('.btn-save-archive').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const title = document.getElementById('editArcTitle').value.trim();
          const sub = document.getElementById('editArcSub').value.trim();
          const icon = document.getElementById('editArcIcon').value;
          const url = document.getElementById('editArcUrl').value.trim();
          updateArchiveItem(idx, title, sub, icon, url);
        });
      });

      // Archive 수정 취소
      document.querySelectorAll('.btn-cancel-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: -1 }));
      });

      // Archive 삭제
      document.querySelectorAll('.btn-delete-archive').forEach(btn => {
        btn.addEventListener('click', () => deleteArchiveItem(parseInt(btn.dataset.idx)));
      });
    }

    // Service Worker 등록 (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    window.onload = loadSecureConfig;
  </script>
</body>
</html>
