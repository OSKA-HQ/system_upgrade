<html lang="ko">
<head>
  <meta charset="utf-8" />

  <!-- PWA -->

  <!-- EmailJS SDK -->

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField, collection, addDoc, getDocs, query, orderBy, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs8IJANSBncJHcFFrF03pLM7JvEOppcY0",
      authDomain: "oska-integrated-management.firebaseapp.com",
      projectId: "oska-integrated-management",
      storageBucket: "oska-integrated-management.firebasestorage.app",
      messagingSenderId: "778732114280",
      appId: "1:778732114280:web:96e00aff42bdbff3bf06dd"
    };

    const appId = 'oska-integrated-management';
    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const storage = getStorage(app);
    window.OSKA_DB = { auth, db, storage, appId, initialToken, signInWithCustomToken, signInAnonymously, doc, getDoc, setDoc, updateDoc, deleteField, collection, addDoc, getDocs, query, orderBy, deleteDoc, serverTimestamp, storageRef, uploadBytes, getDownloadURL };
  </script>

  <style>
    body { font-family: 'NanumSquare', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    .password-input { font-family: sans-serif !important; }
  </style>
</head>

<body class="bg-white text-neutral-900 selection:bg-neutral-200">
  <div id="loading" class="loading-overlay">
    <div class="font-black text-xs tracking-widest uppercase mb-4 animate-pulse">Initializing Security...</div>
    <div id="loading-status" class="text-[9px] text-neutral-400 font-bold uppercase">Connecting to Database</div>
  </div>
  <div id="app"></div>

  <script>
    let ACCOUNTS = {};
    let EMAILJS_CONFIG = {};
    let ADMIN_PASSWORD = '';
    // 계정 순서 및 숨김 설정: { order: ['본사','강남지사',...], hidden: ['강동지사'] }
    let ACCOUNT_SETTINGS = { order: [], hidden: [] };
    // 계정 유형: { '본사': 'hq', '강남지사': 'branch', '대리점A': 'dealer' }
    let ACCOUNT_TYPES = {};
    // 계정별 담당자: { '강북지사': '이범호 이사', '강남지사': '백원준 이사' }
    let ACCOUNT_MANAGERS = {};
    // 지사/대리점 데이터: { '지사명': { type, bizNumber, address, email, phone, ownerName, staff: [{id, pw, name, phone, email}, ...] } }
    let BRANCHES = {};

    const DEFAULT_ARCHIVE_ITEMS = [
      { title: '공식 홈페이지', sub: 'oska.co.kr', icon: 'home', url: 'http://www.oska.co.kr' },
      { title: '인스타그램', sub: '@oska_office', icon: 'instagram', url: 'https://www.instagram.com/oska_office/' },
      { title: '유튜브 채널', sub: 'Construction Video', icon: 'youtube', url: 'https://www.youtube.com/@oska_office' },
      { title: '공식 블로그', sub: 'Naver Blog', icon: 'layout', url: 'https://blog.naver.com/oska_office' },
      { title: '오스카 메인 카달로그', sub: '2026 OSKA Main Catalogue', icon: 'book-open', url: 'https://drive.google.com/file/d/1TAKjriGzwDRyzR7pApw5Cdd0eWAgeYb9/view?usp=sharing' },
      { title: '오스카 글라스 카달로그', sub: '2024 OSKA GLASS CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1Yw06xurc5MLlGRgWtE0mzfGULkgP8o97/view?usp=sharing' },
      { title: '오스카 데크 카달로그', sub: '2025 OSKA DECK CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1g0IPNZ8MoyHDUj1czeup-wb3XlWCQ7Eb/view?usp=sharing' },
      { title: '오스카 클리어라인 카달로그', sub: '2025 OSKA CLEARLINE CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/13tsgCfdy38Mfk45VGFVadRG8C3WnIVsu/view?usp=sharing' },
      { title: '소비자단가표', sub: '2026 OSKA Price List', icon: 'book-open', url: 'https://drive.google.com/file/d/1cj41LoUembWHL3g3Y1XZxNq3McBbe9DK/view?usp=sharing' },
      { title: '레퍼런스북', sub: '2024 OSKA Reference Book', icon: 'book-open', url: 'https://drive.google.com/file/d/1kVpeGgnbehGSu3c8htMAvFjcPjflZmMR/view?usp=sharing' },
      { title: '파고라 개폐영상', sub: 'Operation Video', icon: 'play-circle', url: 'https://www.youtube.com/watch?v=iXjAJqFdpTY' },
      { title: '2026 톤앤톤 리플렛', sub: '2026 Tone & Tone Leaflet', icon: 'book-open', url: 'https://drive.google.com/file/d/1eh2Uy8_kDvt7hinoE9G8bo2363lbsdzb/view?usp=sharing' },
    ];
    let ARCHIVE_ITEMS = [...DEFAULT_ARCHIVE_ITEMS];

    const ICON_OPTIONS = ['home','instagram','youtube','layout','book-open','play-circle','file-text','link','globe','image','video','music','download','external-link','folder'];

    let state = {
      isLoggedIn: false,
      currentUser: '',
      loginCategory: '본사',
      loginId: '',
      loginPw: '',
      loginError: '',
      currentView: 'dashboard',
      isConfigLoaded: false,
      adminTab: 'accounts',
      adminMsg: '',
      adminMsgType: 'success',
      editingArchiveIdx: -1,
      expandedBranch: null
    };

    function setState(newState) {
      state = { ...state, ...newState };
      render();
    }

    // ===== 계정 순서/숨김 헬퍼 =====
    function getOrderedBranches(includeHidden) {
      const allNames = Object.keys(ACCOUNTS);
      const order = ACCOUNT_SETTINGS.order || [];
      const hidden = ACCOUNT_SETTINGS.hidden || [];
      // 순서 목록에 있는 것 먼저, 나머지 추가
      const ordered = [];
      order.forEach(name => { if (allNames.includes(name)) ordered.push(name); });
      allNames.forEach(name => { if (!ordered.includes(name)) ordered.push(name); });
      // order 배열이 비어있거나 새 계정이 추가된 경우 동기화
      if (ACCOUNT_SETTINGS.order.length !== ordered.length || !ordered.every((n, i) => ACCOUNT_SETTINGS.order[i] === n)) {
        ACCOUNT_SETTINGS.order = [...ordered];
      }
      if (includeHidden) return ordered;
      return ordered.filter(name => !hidden.includes(name));
    }

    function isHidden(name) {
      return (ACCOUNT_SETTINGS.hidden || []).includes(name);
    }

    async function saveAccountSettings() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountSettings: ACCOUNT_SETTINGS });
        return true;
      } catch (e) { console.error('Save account settings error:', e); return false; }
    }

    async function saveAccountTypes() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountTypes: ACCOUNT_TYPES });
        return true;
      } catch (e) { console.error('Save account types error:', e); return false; }
    }

    async function saveAccountManagers() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountManagers: ACCOUNT_MANAGERS });
        return true;
      } catch (e) { console.error('Save account managers error:', e); return false; }
    }

    function isDealer(name) {
      return ACCOUNT_TYPES[name] === 'dealer';
    }

    // ===== Firebase 로드 =====
    async function loadSecureConfig() {
      const wait = (ms) => new Promise(res => setTimeout(res, ms));
      const statusText = document.getElementById('loading-status');
      while (!window.OSKA_DB) await wait(100);

      const { auth, db, appId, initialToken, signInWithCustomToken, signInAnonymously } = window.OSKA_DB;
      const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

      try {
        statusText.innerText = "Authenticating Session...";
        try {
          if (initialToken) await signInWithCustomToken(auth, initialToken);
          else await signInAnonymously(auth);
        } catch (e) { await signInAnonymously(auth); }

        statusText.innerText = "Fetching Secure Credentials...";
        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
        const configSnap = await getDoc(configRef);

        if (configSnap.exists()) {
          const data = configSnap.data();
          ACCOUNTS = data.accounts || {};
          EMAILJS_CONFIG = data.emailjs || {};
          ADMIN_PASSWORD = data.adminPassword || '';
          ACCOUNT_SETTINGS = data.accountSettings || { order: [], hidden: [] };
          if (!ACCOUNT_SETTINGS.order) ACCOUNT_SETTINGS.order = [];
          if (!ACCOUNT_SETTINGS.hidden) ACCOUNT_SETTINGS.hidden = [];
          ACCOUNT_TYPES = data.accountTypes || {};
          ACCOUNT_MANAGERS = data.accountManagers || {};
          BRANCHES = data.branches || {};
          // 기존 계정 중 유형이 없는 계정에 기본값 설정 (BRANCHES 데이터 기반)
          Object.keys(ACCOUNTS).forEach(name => {
            if (!ACCOUNT_TYPES[name]) {
              if (name === '본사') ACCOUNT_TYPES[name] = 'hq';
              else if (BRANCHES[name]) ACCOUNT_TYPES[name] = BRANCHES[name].type || 'branch';
              else ACCOUNT_TYPES[name] = 'dealer';
            }
          });
          if (data.archiveItems && Array.isArray(data.archiveItems) && data.archiveItems.length > 0) {
            ARCHIVE_ITEMS = data.archiveItems;
          }
          if (EMAILJS_CONFIG.publicKey) emailjs.init(EMAILJS_CONFIG.publicKey);

          // 마스터 계정: Firestore에서 로드
          if (data.masterAccount) {
            MASTER_ACCOUNT = { ...MASTER_ACCOUNT, ...data.masterAccount };
          }
          if (!ACCOUNT_TYPES[MASTER_ACCOUNT.id]) ACCOUNT_TYPES[MASTER_ACCOUNT.id] = MASTER_ACCOUNT.type;
          if (!ACCOUNT_MANAGERS[MASTER_ACCOUNT.id]) ACCOUNT_MANAGERS[MASTER_ACCOUNT.id] = MASTER_ACCOUNT.manager;

          state.isConfigLoaded = true;
          statusText.innerText = "Security Verified.";
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => document.getElementById('loading').remove(), 500);
          render();
        } else {
          statusText.innerText = `Document not found at: artifacts/${appId}/public/data/settings/config`;
          statusText.classList.add('text-red-500');
        }
      } catch (error) {
        console.error("Config Load Error:", error);
        statusText.innerText = "Connection Error. Check Firebase Rules.";
        statusText.classList.add('text-red-500');
      }
    }

    async function sendLoginNotification(branch, password) {
      if (!EMAILJS_CONFIG.publicKey) return;
      try {
        const geoResponse = await fetch('https://ipapi.co/json/').catch(() => null);
        const geoData = geoResponse ? await geoResponse.json() : {};
        const templateParams = {
          branch: branch, password: password,
          ip: geoData.ip || 'Unknown',
          location: `${geoData.city || ''} ${geoData.region || ''}`.trim() || 'Unknown',
          device: navigator.userAgent,
          resolution: `${window.screen.width}x${window.screen.height}`,
          windowSize: `${window.innerWidth}x${window.innerHeight}`,
          timestamp: new Date().toLocaleString('ko-KR')
        };
        await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, templateParams);
      } catch (e) { console.error("Notification failed", e); }
    }

    // 마스터 계정 (Firestore에서 로드, 폴백용 기본값)
    let MASTER_ACCOUNT = { id: 'Master', pw: '', type: 'hq', manager: '마스터 관리자' };

    async function handleLogin(e) {
      e.preventDefault();
      if (!state.isConfigLoaded) return;
      const inputCategory = state.loginCategory;
      const inputId = state.loginId.trim();
      const inputPw = state.loginPw;

      if (!inputId) { setState({ loginError: '아이디를 입력하세요.' }); return; }
      if (!inputPw) { setState({ loginError: '비밀번호를 입력하세요.' }); return; }

      // 마스터 계정 체크
      if (inputId === MASTER_ACCOUNT.id && inputPw === MASTER_ACCOUNT.pw) {
        // 마스터는 본사 전용이므로 이메일 알림 생략
        setState({ isLoggedIn: true, currentUser: inputId, loginError: '', loginPw: '', loginId: '' });
        return;
      }

      // 일반 계정 체크
      if ((ACCOUNT_SETTINGS.hidden || []).includes(inputId)) {
        setState({ loginError: '현재 비활성화된 계정입니다.' });
      } else if (ACCOUNTS[inputId] === inputPw) {
        const acctType = ACCOUNT_TYPES[inputId] || '';
        const categoryMap = { '본사': 'hq', '지사': 'branch', '대리점': 'dealer', '기타': '' };
        const expectedType = categoryMap[inputCategory] || '';
        // 카테고리 일치 확인 (기타는 모든 유형 허용)
        if (inputCategory !== '기타' && acctType && acctType !== expectedType) {
          setState({ loginError: '선택한 카테고리와 계정 유형이 일치하지 않습니다.' });
          return;
        }
        // 본사(hq) 로그인은 이메일 알림 생략
        if (acctType !== 'hq') {
          sendLoginNotification(inputId, inputPw);
        }
        setState({ isLoggedIn: true, currentUser: inputId, loginError: '', loginPw: '', loginId: '' });
      } else {
        // BRANCHES staff 체크 (마스터/기존 ACCOUNTS 체크 다음에)
        let staffMatch = null;
        let staffBranch = null;
        Object.entries(BRANCHES).forEach(([bName, bData]) => {
          (bData.staff || []).forEach(s => {
            if (s.id === inputId && s.pw === inputPw) {
              staffMatch = s;
              staffBranch = bName;
            }
          });
        });
        if (staffMatch) {
          const bType = BRANCHES[staffBranch].type || 'branch';
          const categoryMap = { '본사': 'hq', '지사': 'branch', '대리점': 'dealer', '기타': '' };
          const expectedType = categoryMap[inputCategory] || '';
          if (inputCategory !== '기타' && bType && bType !== expectedType) {
            setState({ loginError: '선택한 카테고리와 계정 유형이 일치하지 않습니다.' });
            return;
          }
          if (bType !== 'hq') sendLoginNotification(staffBranch + ' / ' + staffMatch.name, '***');
          setState({ isLoggedIn: true, currentUser: staffBranch, loginError: '', loginPw: '', loginId: '' });
          // iframe에 전달될 manager 정보 설정
          ACCOUNT_MANAGERS[staffBranch] = staffMatch.name;
          ACCOUNT_TYPES[staffBranch] = bType;
          return;
        }
        setState({ loginError: '아이디 또는 비밀번호가 일치하지 않습니다.' });
      }
    }

    function handleLogout() {
      setState({ isLoggedIn: false, currentUser: '', currentView: 'dashboard', loginId: '', loginPw: '' });
    }

    function render() {
      const app = document.getElementById('app');
      if (!state.isConfigLoaded) return;
      if (state.currentView === 'register') { app.innerHTML = renderRegisterForm(); lucide.createIcons(); bindEvents(); return; }
      if (state.currentView === 'register_complete') { app.innerHTML = renderRegisterComplete(); lucide.createIcons(); bindEvents(); return; }
      if (!state.isLoggedIn) app.innerHTML = renderLogin();
      else if (state.currentView === 'admin') app.innerHTML = renderAdmin();
      else if (state.currentView !== 'dashboard') app.innerHTML = renderIframeView();
      else app.innerHTML = renderDashboard();
      lucide.createIcons();
      bindEvents();
    }

    function renderLogin() {
      const categories = ['본사', '지사', '대리점', '기타'];
      return `
        <div class="min-h-screen bg-white flex flex-col items-center justify-center p-6 animate-fade-in">
          <div class="w-full max-w-sm mb-12">
            <div class="text-center mb-12 flex flex-col items-center">
              <img src="assets/오스카CI_04LogoBLACK_1.png" alt="OSKA Logo" class="h-15 mb-8 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div style="display:none;" class="inline-flex items-center justify-center w-14 h-14 bg-black text-white text-2xl font-black rounded-2xl mb-6 shadow-lg">O</div>
              <h1 class="text-[11px] font-black tracking-[0.3em] uppercase text-neutral-400 mt-2">Integrated Management Portal</h1>
            </div>
            <form id="loginForm" class="space-y-4">
              <!-- 카테고리 선택 -->
              <div class="space-y-1">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">Category</label>
                <div class="grid grid-cols-4 gap-2">
                  ${categories.map(cat => `
                  <button type="button" class="login-cat-btn h-11 rounded-xl text-[11px] font-black transition-all
                    ${state.loginCategory === cat
                      ? 'bg-black text-white shadow-lg'
                      : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}"
                    data-category="${cat}">${cat}</button>
                  `).join('')}
                </div>
              </div>
              <!-- 아이디 -->
              <div class="space-y-1">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">ID</label>
                <input id="loginId" type="text" placeholder="아이디 입력" autocomplete="username" value="${state.loginId || ''}" class="w-full h-12 px-4 bg-white border border-neutral-200 rounded-xl font-bold text-neutral-800 focus:border-black outline-none transition-all text-sm" />
              </div>
              <!-- 비밀번호 -->
              <div class="space-y-1">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">Password</label>
                <input id="loginPw" type="password" placeholder="••••" autocomplete="current-password" class="password-input w-full h-12 px-4 bg-white border border-neutral-200 rounded-xl font-bold text-neutral-800 focus:border-black outline-none transition-all text-sm" />
              </div>
              ${state.loginError ? `<p class="text-red-600 text-[10px] font-bold text-center pt-2 uppercase tracking-tight">${state.loginError}</p>` : ''}
              <button type="submit" class="w-full h-12 mt-4 bg-black text-white rounded-xl font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all text-xs">Sign In</button>
            </form>
            <div class="mt-6 text-center">
              <p class="text-[10px] text-neutral-300 mb-2">아직 계정이 없으신가요?</p>
              <button id="btnRegister" class="text-[11px] font-black text-neutral-500 hover:text-black transition-colors underline underline-offset-4 decoration-neutral-300 hover:decoration-black">
                업체등록 요청
              </button>
            </div>
          </div>
          ${renderConfidentialNotice()}
        </div>
      `;
    }

    // ===== 업체등록 요청 =====
    // 전역 담당자 리스트
    let _regStaffList = [];

    // 시/도별 시/군/구 데이터
    const DISTRICTS_BY_PROVINCE = {

    function updateRegDistrict() {
      const provinceSelect = document.getElementById('regProvince');
      const districtSelect = document.getElementById('regDistrict');
      if (!provinceSelect || !districtSelect) return;
      const province = provinceSelect.value;
      const districts = DISTRICTS_BY_PROVINCE[province] || [];
      districtSelect.innerHTML = '<option value="">선택</option>' +
        districts.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function syncRepEmail() {
      const checkbox = document.getElementById('regRepEmailSync');
      if (!checkbox || !checkbox.checked) return;
      const repEmail = document.getElementById('regOwnerEmail').value;
      document.querySelectorAll('input.regStaffEmail').forEach(input => {
        input.value = repEmail;
      });
    }

    function addRegStaff() {
      // 현재 입력값 저장
      _saveRegStaffInputs();
      _regStaffList.push({ name: '', position: '', phone: '', email: '', role: '' });
      render();
    }

    function removeRegStaff(idx) {
      _saveRegStaffInputs();
      _regStaffList.splice(idx, 1);
      render();
    }

    function _saveRegStaffInputs() {
      _regStaffList.forEach((s, i) => {
        const n = document.querySelector(`.regStaffName[data-idx="${i}"]`);
        const p = document.querySelector(`.regStaffPosition[data-idx="${i}"]`);
        const ph = document.querySelector(`.regStaffPhone[data-idx="${i}"]`);
        const e = document.querySelector(`.regStaffEmail[data-idx="${i}"]`);
        const r = document.querySelector(`.regStaffRole[data-idx="${i}"]`);
        if (n) s.name = n.value;
        if (p) s.position = p.value;
        if (ph) s.phone = ph.value;
        if (e) s.email = e.value;
        if (r) s.role = r.value;
      });
    }

    function formatRegBizNumber() {
      const input = document.getElementById('regBizNumber');
      if (!input) return;
      let v = input.value.replace(/[^0-9]/g, '');
      if (v.length > 10) v = v.slice(0, 10);
      if (v.length > 5) v = v.slice(0, 3) + '-' + v.slice(3, 5) + '-' + v.slice(5);
      else if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3);
      input.value = v;
    }

    function previewBizFile() {
      const fileInput = document.getElementById('regBizFile');
      const preview = document.getElementById('regBizPreview');
      if (!fileInput || !fileInput.files[0]) return;
      const file = fileInput.files[0];
      const maxSize = 5 * 1024 * 1024;
      if (file.size > maxSize) {
        alert('파일 크기가 5MB를 초과합니다.\n사업자등록증을 office@oska.co.kr 로 이메일 보내주세요.');
        fileInput.value = '';
        if (preview) preview.innerHTML = `<div class="mt-2 p-3 bg-amber-50 border border-amber-200 rounded-lg text-[10px] text-amber-700 font-bold"><i data-lucide="mail" class="w-3 h-3 inline -mt-0.5 mr-1"></i> 파일이 5MB를 초과하여 첨부할 수 없습니다. <span class="underline">office@oska.co.kr</span> 로 보내주세요.</div>`;
        lucide.createIcons();
        return;
      }
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          if (preview) {
            preview.innerHTML = `<img src="${e.target.result}" class="max-w-xs max-h-48 rounded-lg mt-2" />`;
          }
        };
        reader.readAsDataURL(file);
      } else if (preview) {
        preview.innerHTML = `<div class="mt-2 text-[10px] text-neutral-500 flex items-center gap-1"><i data-lucide="file" class="w-4 h-4"></i> ${file.name}</div>`;
        lucide.createIcons();
      }
    }

    async function submitRegistration(e) {
      e.preventDefault();
      const companyType = document.getElementById('regCompanyType').value.trim();
      const companyName = document.getElementById('regCompanyName').value.trim();
      const bizNumber = document.getElementById('regBizNumber').value.trim();

      const ownerName = document.getElementById('regOwnerName').value.trim();
      const ownerPhone = document.getElementById('regOwnerPhone').value.trim();
      const ownerEmail = document.getElementById('regOwnerEmail').value.trim();
      const memo = document.getElementById('regMemo').value.trim();
      const bizFile = document.getElementById('regBizFile').files[0];

      // 필수값 검증
      if (!companyType) { alert('업체 유형을 선택해주세요.'); return; }
      if (!companyName) { alert('업체명을 입력해주세요.'); return; }
      if (!bizNumber) { alert('사업자등록번호를 입력해주세요.'); return; }
      if (!province) { alert('시/도를 선택해주세요.'); return; }
      if (!district) { alert('시/군/구를 선택해주세요.'); return; }
      if (!ownerName) { alert('대표자명을 입력해주세요.'); return; }
      if (!ownerPhone) { alert('대표자 연락처를 입력해주세요.'); return; }
      if (!ownerEmail) { alert('대표자 이메일을 입력해주세요.'); return; }
      if (!bizFile) { alert('사업자등록증을 첨부해주세요.'); return; }

      // 사업자등록번호 검증: 숫자 10자리 이상
      const bizDigits = bizNumber.replace(/[^0-9]/g, '');
      if (bizDigits.length < 10) {
        alert('사업자등록번호는 10자리 이상이어야 합니다.');
        return;
      }

      try {
        const { db, storage, collection, addDoc, serverTimestamp, storageRef, uploadBytes, getDownloadURL } = window.OSKA_DB;
        let bizFileUrl = '';
        let bizFileName = '';

        // 파일 업로드
        if (bizFile) {
          bizFileName = bizFile.name;
          const timestamp = Date.now();
          const filePath = `registration_files/${timestamp}_${bizFileName}`;
          const fileRef = storageRef(storage, filePath);
          await uploadBytes(fileRef, bizFile);
          bizFileUrl = await getDownloadURL(fileRef);
        }

        // Firestore에 저장
        await addDoc(collection(db, 'registration_requests'), {
          companyType, companyName, bizNumber,
          province, district, addressDetail,
          ownerName, ownerPhone, ownerEmail,
          staff: _regStaffList.filter(s => s.name || s.email),
          bizFileUrl, bizFileName, memo,
          status: 'pending',
          createdAt: serverTimestamp()
        });

        setState({ currentView: 'register_complete' });
      } catch(e) {
        console.error('Registration error:', e);
        alert('등록 요청 중 오류가 발생했습니다: ' + e.message);
      }
    }

    async function addAccount(name, password, type, manager) {
      if (!name || !password) return showAdminMsg('지사명과 비밀번호를 입력하세요.', 'error');
      if (ACCOUNTS[name]) return showAdminMsg(`"${name}"은(는) 이미 존재합니다.`, 'error');
      ACCOUNTS[name] = password;
      ACCOUNT_TYPES[name] = type || 'branch';
      if (manager) ACCOUNT_MANAGERS[name] = manager;
      // 순서 목록 끝에 추가
      if (!ACCOUNT_SETTINGS.order.includes(name)) ACCOUNT_SETTINGS.order.push(name);
      const ok1 = await saveAccountsToFirestore();
      const ok2 = await saveAccountSettings();
      const ok3 = await saveAccountTypes();
      const ok4 = manager ? await saveAccountManagers() : true;
      const ok = ok1 && ok2 && ok3 && ok4;
      showAdminMsg(ok ? `"${name}" 계정이 추가되었습니다. (${type === 'dealer' ? '대리점' : '지사'})` : '저장 실패. Firebase 권한을 확인하세요.', ok ? 'success' : 'error');
      render();
    }

    async function deleteAccount(name) {
      if (name === '본사') return showAdminMsg('본사 계정은 삭제할 수 없습니다.', 'error');
      if (!confirm(`"${name}" 계정을 삭제하시겠습니까?`)) return;
      delete ACCOUNTS[name];
      delete ACCOUNT_TYPES[name];
      delete ACCOUNT_MANAGERS[name];
      ACCOUNT_SETTINGS.order = ACCOUNT_SETTINGS.order.filter(n => n !== name);
      ACCOUNT_SETTINGS.hidden = ACCOUNT_SETTINGS.hidden.filter(n => n !== name);
      const { db, appId, doc, updateDoc, deleteField } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { [`accounts.${name}`]: deleteField(), [`accountTypes.${name}`]: deleteField(), [`accountManagers.${name}`]: deleteField() });
        await saveAccountSettings();
        showAdminMsg(`"${name}" 계정이 삭제되었습니다.`, 'success');
      } catch (e) { showAdminMsg('삭제 실패.', 'error'); }
      render();
    }

    async function moveAccount(name, direction) {
      // 지사끼리만 순서 변경 가능
      if (ACCOUNT_TYPES[name] !== 'branch') return;
      const order = ACCOUNT_SETTINGS.order;
      // 같은 유형(지사)끼리의 인덱스 목록 추출
      const branchIndices = [];
      order.forEach((n, i) => { if (ACCOUNT_TYPES[n] === 'branch') branchIndices.push(i); });
      const posInBranch = branchIndices.findIndex(i => order[i] === name);
      if (posInBranch < 0) return;
      const newPosInBranch = direction === 'up' ? posInBranch - 1 : posInBranch + 1;
      if (newPosInBranch < 0 || newPosInBranch >= branchIndices.length) return;
      const idxA = branchIndices[posInBranch];
      const idxB = branchIndices[newPosInBranch];
      [order[idxA], order[idxB]] = [order[idxB], order[idxA]];
      const ok = await saveAccountSettings();
      if (!ok) showAdminMsg('저장 실패.', 'error');
      render();
    }

    const ALL_REGIONS = ['서울','부산','대구','인천','광주','대전','울산','세종','경기','강원','충북','충남','전북','전남','경북','경남','제주'];

    async function saveBranchValidFrom(branchName) {
      const input = document.querySelector(`.branch-valid-from[data-branch="${branchName}"]`);
      if (!input) return;
      BRANCHES[branchName].validFrom = input.value || '';
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? `"${branchName}" 유효 시작일이 ${input.value || '해제'}되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function addBranch(name, type, bizNumber, address, email, phone, ownerName) {
      if (!name || !type) return showAdminMsg('지사명과 유형을 입력하세요.', 'error');
      if (BRANCHES[name]) return showAdminMsg(`"${name}"은(는) 이미 존재합니다.`, 'error');
      BRANCHES[name] = {
        type: type || 'branch',
        bizNumber: bizNumber || '',
        address: address || '',
        email: email || '',
        phone: phone || '',
        ownerName: ownerName || '',
        regions: [],
        staff: []
      };
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? `"${name}" 지사가 등록되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function deleteBranch(name) {
      if (name === '본사') return showAdminMsg('본사는 삭제할 수 없습니다.', 'error');
      if (!confirm(`"${name}" 지사를 삭제하시겠습니까?`)) return;
      delete BRANCHES[name];
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? `"${name}" 지사가 삭제되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function addStaff(branchName, id, pw, name, phone, email) {
      if (!branchName || !id || !pw || !name) return showAdminMsg('필수 정보를 모두 입력하세요.', 'error');
      if (!BRANCHES[branchName]) return showAdminMsg(`"${branchName}" 지사를 찾을 수 없습니다.`, 'error');
      // 같은 ID가 이미 있는지 확인
      if ((BRANCHES[branchName].staff || []).some(s => s.id === id)) {
        return showAdminMsg(`ID "${id}"는 이미 존재합니다.`, 'error');
      }
      if (!BRANCHES[branchName].staff) BRANCHES[branchName].staff = [];
      BRANCHES[branchName].staff.push({
        id: id,
        pw: pw,
        name: name,
        phone: phone || '',
        email: email || BRANCHES[branchName].email || ''
      });
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? `"${name}" 담당자가 추가되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function deleteStaff(branchName, staffIdx) {
      if (!BRANCHES[branchName] || !BRANCHES[branchName].staff) return;
      const staff = BRANCHES[branchName].staff[staffIdx];
      if (!staff) return;
      if (!confirm(`"${staff.name}" 담당자를 삭제하시겠습니까?`)) return;
      BRANCHES[branchName].staff.splice(staffIdx, 1);
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? '담당자가 삭제되었습니다.' : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function updateStaffPw(branchName, staffIdx, newPw) {
      if (!newPw) return showAdminMsg('새 비밀번호를 입력하세요.', 'error');
      if (!BRANCHES[branchName] || !BRANCHES[branchName].staff) return;
      const staff = BRANCHES[branchName].staff[staffIdx];
      if (!staff) return;
      staff.pw = newPw;
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok ? `"${staff.name}" 비밀번호가 변경되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    // ===== 업체 등록 요청 관리 (어드민) =====
    async function loadRegistrationRequests() {
      try {
        const { db, collection, getDocs, query, orderBy } = window.OSKA_DB;
        const q = query(collection(db, 'registration_requests'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        const requests = [];
        snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
        state._regRequests = requests;
        render();
      } catch(e) {
        console.error('Load registrations error:', e);
        // fallback without orderBy
        try {
          const { db, collection, getDocs } = window.OSKA_DB;
          const snap = await getDocs(collection(db, 'registration_requests'));
          const requests = [];
          snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
          state._regRequests = requests;
          render();
        } catch(e2) { console.error('Fallback load error:', e2); }
      }
    }

    async function approveRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;

      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        // 요청 상태 업데이트: status만 approved로 변경
        // ID/PW는 본사에서 지사관리에서 별도 부여하므로 여기서는 상태만 변경
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, { status: 'approved', approvedAt: new Date().toISOString() });

        // 로컬 상태 업데이트
        req.status = 'approved';

        showAdminMsg(`"${req.companyName}" 등록 요청이 승인되었습니다. 지사관리에서 계정을 생성하세요.`, 'success');
        render();
      } catch(e) {
        console.error('Approve error:', e);
        showAdminMsg('승인 처리 중 오류 발생: ' + e.message, 'error');
      }
    }

    async function rejectRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;
      const reason = prompt(`"${req.companyName}" 등록 요청을 거절합니다.\n거절 사유를 입력하세요:`);
      if (reason === null) return;

      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, {
          status: 'rejected',
          rejectedAt: new Date().toISOString(),
          rejectedBy: currentManager || '관리자',
          rejectReason: reason || '사유 미입력'
        });
        req.status = 'rejected';
        req.rejectedAt = new Date().toISOString();
        req.rejectedBy = currentManager || '관리자';
        req.rejectReason = reason || '사유 미입력';
        showAdminMsg(`"${req.companyName}" 요청이 거절되었습니다.`, 'error');
        render();
      } catch(e) {
        console.error('Reject error:', e);
        showAdminMsg('거절 처리 중 오류 발생', 'error');
      }
    }

            <div class="space-y-3">
              ${pending.map(r => `
              <div class="bg-white border-2 border-amber-200 rounded-2xl p-5 shadow-sm">
                <div class="flex items-start justify-between mb-4">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <span class="text-lg font-black">${r.companyName}</span>
                      <span class="text-[8px] font-black px-2 py-0.5 rounded ${
                        r.companyType === 'dealer' ? 'bg-purple-100 text-purple-600' :
                        r.companyType === 'regional_branch' ? 'bg-amber-100 text-amber-600' :
                        'bg-blue-100 text-blue-600'
                      }">${TYPE_LABEL[r.companyType] || r.companyType}</span>

                  </div>
                  <div class="flex gap-2">
                    <button onclick="approveRegistration('${r.id}')" class="px-4 py-2 bg-green-500 text-white rounded-lg text-[10px] font-black uppercase hover:bg-green-600 active:scale-[0.97] transition-all">승인</button>
                    <button onclick="rejectRegistration('${r.id}')" class="px-4 py-2 bg-white border border-red-200 text-red-500 rounded-lg text-[10px] font-black uppercase hover:bg-red-50 active:scale-[0.97] transition-all">거절</button>
                  </div>
                </div>
                <div class="space-y-3">
                  <!-- 대표자 정보 -->
                  <div class="bg-neutral-50 rounded-lg p-3 space-y-1 border border-neutral-100">

                    <div class="grid grid-cols-2 gap-2 text-[10px]">
                      <div><span class="text-neutral-400 font-bold">이름:</span> <span class="font-black">${r.ownerName || '-'}</span></div>
                      <div><span class="text-neutral-400 font-bold">연락처:</span> <span class="font-black">${r.ownerPhone || '-'}</span></div>
                      <div class="col-span-2"><span class="text-neutral-400 font-bold">이메일:</span> <span class="font-black">${r.ownerEmail || '-'}</span></div>

                  </div>
                  <!-- 주소 정보 -->
                  <div class="bg-neutral-50 rounded-lg p-3 space-y-1 border border-neutral-100">
                    <p class="text-[9px] font-black text-neutral-400 uppercase">사업장 주소</p>
                    <p class="text-[10px] font-black">${r.province || '-'} ${r.district || '-'} ${r.addressDetail || '-'}</p>

                  <!-- 사업자정보 -->

                  <!-- 담당자 목록 -->
                  ${(r.staff && r.staff.length > 0) ? `
                  <div class="bg-neutral-50 rounded-lg p-3 space-y-2 border border-neutral-100">
                    <p class="text-[9px] font-black text-neutral-400 uppercase">담당자 (${r.staff.length}명)</p>
                    ${r.staff.map(s => `
                    <div class="text-[9px] space-y-0.5">
                      <p><span class="font-bold text-neutral-500">이름/직급:</span> <span class="font-black">${s.name || '-'} ${s.position ? '/' + s.position : ''}</span></p>
                      <p><span class="font-bold text-neutral-500">역할:</span> <span class="font-black">${s.role || '-'}</span></p>
                      <p><span class="font-bold text-neutral-500">연락처/이메일:</span> <span class="font-black">${s.phone || '-'} / ${s.email || '-'}</span></p>
                    </div>
                    `).join('')}
                  </div>
                  ` : ''}
                  <!-- 메모 -->
                  ${r.memo ? `<div class="bg-neutral-50 rounded-lg p-3 border border-neutral-100 text-[10px]"><span class="text-neutral-400 font-bold">메모:</span> <span class="font-black">${r.memo}</span></div>` : ''}
                </div>
              </div>
              `).join('')}
            </div>
          </div>
          ` : `
          <div class="bg-white border border-neutral-200 rounded-2xl p-8 text-center">
            <i data-lucide="inbox" class="w-8 h-8 text-neutral-200 mx-auto mb-3"></i>
            <p class="text-sm text-neutral-300 font-bold">대기 중인 등록 요청이 없습니다</p>
          </div>
          `}

          ${processed.length > 0 ? `
          <div>
            <p class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-3">처리 완료 (${processed.length}건)</p>
            <div class="space-y-2">
              ${processed.map(r => {
                const processedDate = r.status === 'approved'
                  ? (r.approvedAt ? new Date(r.approvedAt).toLocaleDateString('ko-KR') : '-')
                  : (r.rejectedAt ? new Date(r.rejectedAt).toLocaleDateString('ko-KR') : '-');
                const requestDate = r.createdAt ? new Date(r.createdAt.seconds ? r.createdAt.seconds * 1000 : r.createdAt).toLocaleDateString('ko-KR') : '-';
                return `
              <div class="bg-white border border-neutral-100 rounded-xl p-4">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center ${r.status === 'approved' ? 'bg-green-50' : 'bg-red-50'}">
                      <i data-lucide="${r.status === 'approved' ? 'check' : 'x'}" class="w-4 h-4 ${r.status === 'approved' ? 'text-green-500' : 'text-red-500'}"></i>
                    </div>
                    <div>
                      <span class="font-black text-sm">${r.companyName}</span>
                      <span class="text-[8px] font-black ml-2 px-1.5 py-0.5 rounded ${r.status === 'approved' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${r.status === 'approved' ? '승인' : '거절'}</span>
                    </div>
                  </div>
                  <div class="text-right">
                    <p class="text-[9px] text-neutral-300">${TYPE_LABEL[r.companyType] || r.companyType}</p>
                  </div>
                </div>
                <div class="mt-3 grid grid-cols-2 gap-2 text-[9px] text-neutral-400">
                  <div><span class="font-bold">대표자:</span> ${r.ownerName || '-'}</div>
                  <div><span class="font-bold">사업자번호:</span> ${r.bizNumber || '-'}</div>
                  <div><span class="font-bold">신청일:</span> ${requestDate}</div>
                  <div><span class="font-bold">처리일:</span> ${processedDate}</div>
                </div>
                ${r.status === 'rejected' && r.rejectReason ? `<div class="mt-2 p-2 bg-red-50 rounded-lg text-[9px] text-red-600"><span class="font-black">거절 사유:</span> ${r.rejectReason}</div>` : ''}
              </div>`;
              }).join('')}
            </div>
          </div>
          ` : ''}
        </div>
      `;
    }

    function renderAdminBranches() {

        const typeOrder = { 'hq': 0, 'branch': 1, 'dealer': 2 };
        const typeA = BRANCHES[a].type || 'branch';
        const typeB = BRANCHES[b].type || 'branch';
        return typeOrder[typeA] - typeOrder[typeB];
      });

      return `
        <div class="space-y-6">
          <!-- 새 지사/대리점 등록 -->

              <i data-lucide="plus-circle" class="w-3.5 h-3.5 inline mr-1.5 -mt-0.5"></i>새 지사/대리점 등록

            <div class="grid grid-cols-2 gap-3 mb-3">
              <select id="branchType" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all cursor-pointer">

                <option value="branch">지사</option>
                <option value="dealer">대리점</option>

            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">

              <input id="branchPhone" type="text" placeholder="대표 전화" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <input id="branchEmail" type="email" placeholder="대표 이메일" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
              <input id="branchOwner" type="text" placeholder="대표자명" class="h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all" />
            </div>
            <input id="branchAddress" type="text" placeholder="소재지 (주소)" class="w-full h-11 px-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold focus:border-black outline-none transition-all mb-3" />
            <button id="btnAddBranch" class="w-full h-11 px-6 bg-black text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-neutral-800 transition-all">등록</button>
          </div>

          <!-- 등록된 지사/대리점 목록 -->
          <div class="space-y-4">
            ${branchNames.length === 0 ? `
              <div class="bg-white border border-neutral-200 rounded-2xl p-8 text-center">
                <i data-lucide="map-pin" class="w-8 h-8 text-neutral-200 mx-auto mb-3"></i>
                <p class="text-sm text-neutral-300 font-bold">등록된 지사/대리점이 없습니다</p>
              </div>
            ` : branchNames.map((branchName) => {
              const branch = BRANCHES[branchName];
              const typeLabel = branch.type === 'hq' ? '본사' : branch.type === 'dealer' ? '대리점' : '지사';
              const typeColor = branch.type === 'hq' ? 'border-neutral-300 bg-neutral-50' : branch.type === 'dealer' ? 'border-purple-200 bg-purple-50' : 'border-blue-200 bg-blue-50';
              const isExpanded = state.expandedBranch === branchName;
              const staff = branch.staff || [];

              return `
              <div class="bg-white rounded-2xl border ${typeColor} shadow-sm overflow-hidden">
                <!-- 지사 헤더 -->
                <div class="px-6 py-4 border-b border-neutral-100">
                  <div class="flex items-start justify-between">
                    <div class="flex-1">
                      <div class="flex items-center gap-3 mb-2">
                        <h3 class="text-lg font-black">${branchName}</h3>
                        <span class="text-[8px] font-black px-2 py-0.5 rounded ${branch.type === 'hq' ? 'bg-neutral-200 text-neutral-700' : branch.type === 'dealer' ? 'bg-purple-100 text-purple-600' : 'bg-blue-100 text-blue-600'}">${typeLabel}</span>
                      </div>
                      <div class="text-[10px] text-neutral-400 space-y-0.5 font-bold">
                        ${branch.bizNumber ? `<p>사업자: ${branch.bizNumber}</p>` : ''}
                        ${branch.address ? `<p>주소: ${branch.address}</p>` : ''}
                        ${branch.phone ? `<p>전화: ${branch.phone}</p>` : ''}
                        ${branch.email ? `<p>이메일: ${branch.email}</p>` : ''}
                        ${branch.ownerName ? `<p>대표: ${branch.ownerName}</p>` : ''}
                      </div>
                      ${(branch.regions || []).length > 0 ? `
                      <div class="flex flex-wrap gap-1 mt-2">
                        <span class="text-[8px] font-black text-neutral-300 mr-1">담당지역:</span>
                        ${branch.regions.map(r => `<span class="text-[8px] font-black px-1.5 py-0.5 rounded bg-green-50 text-green-600 border border-green-200">${r}</span>`).join('')}
                      </div>` : ''}
                    </div>
                    <div class="flex items-center gap-2">
                      <button class="btn-toggle-branch h-9 px-4 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-black uppercase hover:bg-blue-100 transition-all" data-branch="${branchName}">
                        ${isExpanded ? '접기' : '담당자관리'}
                      </button>
                      <button class="btn-delete-branch h-9 px-4 bg-red-50 text-red-600 rounded-lg text-[10px] font-black uppercase hover:bg-red-100 transition-all" data-branch="${branchName}">삭제</button>

                  </div>
                </div>

                <!-- 담당자 목록 (펼쳐짐) -->
                ${isExpanded ? `
                <div class="px-6 py-4 bg-blue-50/30 space-y-4">
                  <!-- 담당자 테이블 -->
                  ${staff.length > 0 ? `
                  <div>
                    <p class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-3">담당자 (${staff.length}명)</p>
                    <div class="border border-neutral-200 rounded-xl overflow-hidden">
                      <table class="w-full text-[10px]">
                        <thead>
                          <tr class="bg-neutral-50 border-b border-neutral-200">
                            <th class="px-3 py-2 text-left font-black text-neutral-400">아이디</th>
                            <th class="px-3 py-2 text-left font-black text-neutral-400">이름</th>
                            <th class="px-3 py-2 text-left font-black text-neutral-400">전화</th>
                            <th class="px-3 py-2 text-left font-black text-neutral-400">이메일</th>
                            <th class="px-3 py-2 text-left font-black text-neutral-400">비밀번호</th>
                            <th class="px-3 py-2 text-center font-black text-neutral-400">작업</th>
                          </tr>
                        </thead>
                        <tbody>
                          ${staff.map((s, idx) => `
                          <tr class="border-b border-neutral-100 hover:bg-neutral-50 transition-colors">
                            <td class="px-3 py-2 font-bold">${s.id}</td>
                            <td class="px-3 py-2 font-bold">${s.name}</td>
                            <td class="px-3 py-2 text-neutral-400">${s.phone || '-'}</td>
                            <td class="px-3 py-2 text-neutral-400 truncate max-w-xs">${s.email || '-'}</td>
                            <td class="px-3 py-2 font-bold text-center text-neutral-500">••••</td>
                            <td class="px-3 py-2 text-center">
                              <button class="btn-delete-staff h-6 px-2 bg-red-50 text-red-600 rounded text-[9px] font-black uppercase hover:bg-red-100 transition-all" data-branch="${branchName}" data-idx="${idx}">삭제</button>
                            </td>
                          </tr>
                          `).join('')}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  ` : `
                  <div class="text-center py-4">
                    <p class="text-[10px] text-neutral-300 font-bold">등록된 담당자가 없습니다</p>
                  </div>
                  `}

                  <!-- 담당자 추가 폼 -->
                  <div class="bg-white rounded-xl border border-blue-200 p-4 space-y-3">
                    <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest">담당자 추가</p>
                    <div class="grid grid-cols-2 gap-2">
                      <input class="staff-id h-10 px-3 bg-white border border-neutral-200 rounded-lg text-[10px] font-bold focus:border-black outline-none" placeholder="아이디" data-branch="${branchName}" />
                      <input class="staff-pw h-10 px-3 bg-white border border-neutral-200 rounded-lg text-[10px] font-bold focus:border-black outline-none" type="password" placeholder="비밀번호" data-branch="${branchName}" />

                    <div class="grid grid-cols-2 gap-2">
                      <input class="staff-name h-10 px-3 bg-white border border-neutral-200 rounded-lg text-[10px] font-bold focus:border-black outline-none" placeholder="이름" data-branch="${branchName}" />
                      <input class="staff-phone h-10 px-3 bg-white border border-neutral-200 rounded-lg text-[10px] font-bold focus:border-black outline-none" placeholder="전화" data-branch="${branchName}" />
                    </div>
                    <input class="staff-email h-10 px-3 bg-white border border-neutral-200 rounded-lg text-[10px] font-bold focus:border-black outline-none w-full" placeholder="이메일 (빈칸이면 지사 이메일 사용)" data-branch="${branchName}" />
                    <button class="btn-add-staff w-full h-10 px-3 bg-blue-600 text-white rounded-lg text-[10px] font-black uppercase hover:bg-blue-700 transition-all" data-branch="${branchName}">추가</button>
                  </div>

                  <!-- 담당 지역 설정 -->
                  <div class="bg-white rounded-xl border border-green-200 p-4 space-y-3">
                    <p class="text-[9px] font-black text-green-600 uppercase tracking-widest">담당 지역 설정</p>

                    <div class="grid grid-cols-4 md:grid-cols-6 gap-2">
                      ${ALL_REGIONS.map(region => {
                        const isChecked = (branch.regions || []).includes(region);
                        const cbClass = 'region-cb-' + branchName.replace(/[^a-zA-Z0-9가-힣]/g, '_');
                        return `
                        <label class="flex items-center gap-1.5 cursor-pointer group">
                          <input type="checkbox" class="${cbClass}" value="${region}" ${isChecked ? 'checked' : ''} data-branch="${branchName}" />
                          <span class="text-[10px] font-bold ${isChecked ? 'text-green-600' : 'text-neutral-400'} group-hover:text-green-600 transition-colors">${region}</span>

                      }).join('')}

                  </div>

                  <!-- 유효 DB 시작일 설정 -->
                  <div class="bg-white rounded-xl border border-amber-200 p-4 space-y-3">
                    <p class="text-[9px] font-black text-amber-600 uppercase tracking-widest">유효 DB 시작일</p>
                    <p class="text-[8px] text-neutral-400 font-bold">이 날짜 이후 등록된 고객 DB만 해당 지사에서 조회할 수 있습니다</p>
                    <div class="flex gap-3">
                      <input type="date" class="branch-valid-from flex-1 h-10 px-3 bg-white border border-amber-200 rounded-lg text-[10px] font-bold focus:border-amber-500 outline-none" value="${branch.validFrom || ''}" data-branch="${branchName}" />
                      <button onclick="saveBranchValidFrom('${branchName}')" class="h-10 px-4 bg-amber-500 text-white rounded-lg text-[9px] font-black uppercase hover:bg-amber-600 transition-all">저장</button>
                    </div>
                    ${branch.validFrom ? `<p class="text-[9px] text-amber-600 font-bold">현재 설정: ${branch.validFrom} 부터</p>` : '<p class="text-[9px] text-neutral-300 font-bold">미설정 (모든 DB 조회 가능)</p>'}
                  </div>
                </div>
                ` : ''}
              </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

                        </select>
                        <input id="editArcUrl" type="url" value="${item.url}" class="flex-1 h-10 px-3 bg-white border border-blue-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none" />
                        <button class="btn-save-archive h-10 px-4 bg-blue-600 text-white rounded-lg text-[10px] font-black uppercase hover:bg-blue-700 transition-all" data-idx="${idx}">저장</button>
                        <button class="btn-cancel-archive h-10 px-4 bg-neutral-200 text-neutral-600 rounded-lg text-[10px] font-black uppercase hover:bg-neutral-300 transition-all">취소</button>
                      </div>
                    </div>`;
                }
                return `
                  <div class="flex items-center justify-between px-6 py-4 hover:bg-neutral-50 transition-colors group">
                    <div class="flex items-center gap-4">
                      <div class="w-9 h-9 bg-neutral-100 rounded-xl flex items-center justify-center text-neutral-400 group-hover:bg-black group-hover:text-white transition-all">
                        <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                      </div>
                      <div>
                        <div class="font-black text-sm">${item.title}</div>
                        <div class="text-[10px] text-neutral-400 font-bold truncate max-w-xs">${item.sub || item.url}</div>
                      </div>
                    </div>
                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all">
                      <button class="btn-edit-archive h-9 px-3 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-black uppercase hover:bg-blue-100 transition-all" data-idx="${idx}">수정</button>
                      <button class="btn-delete-archive h-9 px-3 bg-red-50 text-red-600 rounded-lg text-[10px] font-black uppercase hover:bg-red-100 transition-all" data-idx="${idx}">삭제</button>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderConfidentialNotice() {
      return `
        <div class="max-w-xl mx-auto text-center px-4 mt-4">
          <div class="mb-4">
            <span class="text-[10px] font-black text-red-600 tracking-widest uppercase border border-red-200 px-4 py-1.5 rounded-full bg-red-50">
              INTERNAL USE ONLY – STRICTLY CONFIDENTIAL
            </span>
          </div>
          <div class="text-[10px] text-neutral-400 font-bold leading-relaxed space-y-1 tracking-tight">
            <p>본 프로그램은 회사 내부 승인된 인원에 한해 사용이 허용됩니다.</p>
            <p>무단 접근, 사용, 복제, 배포는 엄격히 금지되며, 모든 접속 기록(IP 주소, 접속 시간, 사용 행위)은 실시간으로 수집·기록됩니다.</p>
            <p>본 프로그램 또는 그 일부를 무단으로 제3자에게 제공, 공유, 유포한 자 역시 무단 사용자와 동일하게 책임을 지게 됩니다.</p>
            <p>무단 사용 또는 무단 배포가 확인될 경우, 관련 법령에 따라 민·형사상 책임이 발생할 수 있습니다.</p>
          </div>
        </div>
      `;
    }

    function bindEvents() {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', handleLogin);
        // 카테고리 버튼
        document.querySelectorAll('.login-cat-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.loginCategory = btn.dataset.category;
            state.loginError = '';
            render();
          });
        });
        const loginIdInput = document.getElementById('loginId');
        if (loginIdInput) loginIdInput.addEventListener('input', (e) => state.loginId = e.target.value);
        const loginPwInput = document.getElementById('loginPw');
        if (loginPwInput) loginPwInput.addEventListener('input', (e) => state.loginPw = e.target.value);
      }
      // 업체등록 요청
      if (document.getElementById('btnRegister')) document.getElementById('btnRegister').addEventListener('click', () => setState({ currentView: 'register' }));
      if (document.getElementById('btnBackToLogin')) document.getElementById('btnBackToLogin').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('btnBackToLogin2')) document.getElementById('btnBackToLogin2').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('registerForm')) document.getElementById('registerForm').addEventListener('submit', submitRegistration);

      if (document.getElementById('logoutBtn')) document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      document.querySelectorAll('#logoHome').forEach(btn => btn.addEventListener('click', () => setState({ currentView: 'dashboard' })));
      if (document.getElementById('exitView')) document.getElementById('exitView').addEventListener('click', () => setState({ currentView: 'dashboard' }));
      if (document.getElementById('btnQuotation')) document.getElementById('btnQuotation').addEventListener('click', () => setState({currentView: 'quotation'}));
      if (document.getElementById('btnOrder')) document.getElementById('btnOrder').addEventListener('click', () => setState({ currentView: 'order' }));
      if (document.getElementById('btnDeck')) document.getElementById('btnDeck').addEventListener('click', () => setState({currentView: 'deck'}));
      if (document.getElementById('btnCatalog')) document.getElementById('btnCatalog').addEventListener('click', () => setState({currentView: 'catalog'}));
      document.querySelectorAll('#btnAsk').forEach(btn => btn.addEventListener('click', () => setState({currentView: 'ask'})));
      // AS견적은 OSKA Works 내부에서 접근
      if (document.getElementById('btnDeckBlocked')) document.getElementById('btnDeckBlocked').addEventListener('click', () => alert('권한이 없습니다.'));

      // 관리자 모드 이벤트
      if (document.getElementById('adminBtn')) document.getElementById('adminBtn').addEventListener('click', handleAdminEntry);
      if (document.getElementById('exitAdmin')) document.getElementById('exitAdmin').addEventListener('click', () => setState({ currentView: 'dashboard', editingArchiveIdx: -1 }));

      // 탭 전환
      document.querySelectorAll('.admin-tab').forEach(btn => {
        btn.addEventListener('click', () => setState({ adminTab: btn.dataset.tab, editingArchiveIdx: -1 }));
      });

      // 관리자 비밀번호 변경
      if (document.getElementById('btnChangeAdminPw')) {
        document.getElementById('btnChangeAdminPw').addEventListener('click', () => {
          const newPw = document.getElementById('newAdminPw').value.trim();
          changeAdminPassword(newPw);
        });
      }
      if (document.getElementById('btnChangeMasterPw')) {
        document.getElementById('btnChangeMasterPw').addEventListener('click', () => {
          const newPw = document.getElementById('newMasterPw').value.trim();
          if (newPw && confirm('마스터 비밀번호를 변경하시겠습니까?')) changeMasterPassword(newPw);
        });
      }

      // 계정 추가
      if (document.getElementById('btnAddAccount')) {
        document.getElementById('btnAddAccount').addEventListener('click', () => {
          const type = document.getElementById('newAccType').value;
          const name = document.getElementById('newAccName').value.trim();
          const pw = document.getElementById('newAccPw').value.trim();
          const manager = document.getElementById('newAccManager').value.trim();
          addAccount(name, pw, type, manager);
        });
      }

      // 담당자 변경
      document.querySelectorAll('.btn-change-manager').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.manager-change-input[data-name="${name}"]`);
          if (!input) return;
          const manager = input.value.trim();
          if (!manager) return showAdminMsg('담당자명을 입력하세요.', 'error');
          ACCOUNT_MANAGERS[name] = manager;
          const ok = await saveAccountManagers();
          showAdminMsg(ok ? `"${name}" 담당자가 "${manager}"(으)로 저장되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
          render();
        });
      });

      // 비밀번호 변경
      document.querySelectorAll('.btn-change-pw').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.pw-change-input[data-name="${name}"]`);
          if (input) changePassword(name, input.value.trim());
        });
      });

      // 계정 삭제
      document.querySelectorAll('.btn-delete-acc').forEach(btn => {
        btn.addEventListener('click', () => deleteAccount(btn.dataset.name));
      });

      // 숨기기/표시 토글
      document.querySelectorAll('.btn-toggle-hidden').forEach(btn => {
        btn.addEventListener('click', () => toggleHidden(btn.dataset.name));
      });

      // 순서 위로/아래로
      document.querySelectorAll('.btn-move-up').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'up'));
      });
      document.querySelectorAll('.btn-move-down').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'down'));
      });

      // Archive 추가
      if (document.getElementById('btnAddArchive')) {
        document.getElementById('btnAddArchive').addEventListener('click', () => {
          const title = document.getElementById('newArcTitle').value.trim();
          const sub = document.getElementById('newArcSub').value.trim();
          const icon = document.getElementById('newArcIcon').value;
          const url = document.getElementById('newArcUrl').value.trim();
          addArchiveItem(title, sub, icon, url);
        });
      }

      // Archive 수정 진입
      document.querySelectorAll('.btn-edit-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: parseInt(btn.dataset.idx) }));
      });

      // Archive 수정 저장
      document.querySelectorAll('.btn-save-archive').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const title = document.getElementById('editArcTitle').value.trim();
          const sub = document.getElementById('editArcSub').value.trim();
          const icon = document.getElementById('editArcIcon').value;
          const url = document.getElementById('editArcUrl').value.trim();
          updateArchiveItem(idx, title, sub, icon, url);
        });
      });

      // Archive 수정 취소
      document.querySelectorAll('.btn-cancel-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: -1 }));
      });

      // Archive 삭제
      document.querySelectorAll('.btn-delete-archive').forEach(btn => {
        btn.addEventListener('click', () => deleteArchiveItem(parseInt(btn.dataset.idx)));
      });

      // 지사 관리 탭 이벤트
      if (document.getElementById('btnAddBranch')) {
        document.getElementById('btnAddBranch').addEventListener('click', () => {
          const type = document.getElementById('branchType').value;
          const name = document.getElementById('branchName').value.trim();
          const bizNum = document.getElementById('branchBizNum').value.trim();
          const address = document.getElementById('branchAddress').value.trim();
          const email = document.getElementById('branchEmail').value.trim();
          const phone = document.getElementById('branchPhone').value.trim();
          const owner = document.getElementById('branchOwner').value.trim();
          addBranch(name, type, bizNum, address, email, phone, owner);
        });
      }

      // 담당자 관리 펼치기/접기
      document.querySelectorAll('.btn-toggle-branch').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          if (state.expandedBranch === branchName) {
            setState({ expandedBranch: null });
          } else {
            setState({ expandedBranch: branchName });
          }
        });
      });

      // 담당자 추가
      document.querySelectorAll('.btn-add-staff').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          const staffId = document.querySelector(`.staff-id[data-branch="${branchName}"]`).value.trim();
          const staffPw = document.querySelector(`.staff-pw[data-branch="${branchName}"]`).value;
          const staffName = document.querySelector(`.staff-name[data-branch="${branchName}"]`).value.trim();
          const staffPhone = document.querySelector(`.staff-phone[data-branch="${branchName}"]`).value.trim();
          const staffEmail = document.querySelector(`.staff-email[data-branch="${branchName}"]`).value.trim();
          addStaff(branchName, staffId, staffPw, staffName, staffPhone, staffEmail);
        });
      });

      // 담당자 삭제
      document.querySelectorAll('.btn-delete-staff').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          const staffIdx = parseInt(btn.dataset.idx);
          deleteStaff(branchName, staffIdx);
        });
      });

      // 지사 삭제
      document.querySelectorAll('.btn-delete-branch').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          deleteBranch(branchName);
        });
      });
    }

    // Service Worker 등록 (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    window.onload = loadSecureConfig;
  </script>
</body>
</html>
