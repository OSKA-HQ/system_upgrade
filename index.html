  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteField, collection, addDoc, getDocs, query, orderBy, deleteDoc, serverTimestamp, onSnapshot, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs8IJANSBncJHcFFrF03pLM7JvEOppcY0",
      authDomain: "oska-integrated-management.firebaseapp.com",
      projectId: "oska-integrated-management",
      storageBucket: "oska-integrated-management.firebasestorage.app",
      messagingSenderId: "778732114280",
      appId: "1:778732114280:web:96e00aff42bdbff3bf06dd"
    };

    const appId = 'oska-integrated-management';
    const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const storage = getStorage(app);
    window.OSKA_DB = { auth, db, storage, appId, initialToken, signInWithCustomToken, signInAnonymously, doc, getDoc, setDoc, updateDoc, deleteField, collection, addDoc, getDocs, query, orderBy, deleteDoc, serverTimestamp, onSnapshot, where, storageRef, uploadBytes, getDownloadURL };
  </script>

  <style>
    body { font-family: 'NanumSquare', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    .password-input { font-family: sans-serif !important; }

</head>

<body class="bg-white text-neutral-900 selection:bg-neutral-200">
  <div id="loading" class="loading-overlay">
    <div class="font-black text-xs tracking-widest uppercase mb-4 animate-pulse">Initializing Security...</div>
    <div id="loading-status" class="text-[9px] text-neutral-400 font-bold uppercase">Connecting to Database</div>
  </div>
  <div id="app"></div>

  <script>
    let ACCOUNTS = {};
    let EMAILJS_CONFIG = {};
    let ADMIN_PASSWORD = '';
    // 어드민 접근 가능 계정 목록 (Master는 항상 포함, Firestore config.adminAccounts로 관리)
    let ADMIN_ACCOUNTS = ['Master', '이한울'];
    // 계정 순서 및 숨김 설정: { order: ['본사','강남지사',...], hidden: ['강동지사'] }
    let ACCOUNT_SETTINGS = { order: [], hidden: [] };
    // 계정 유형: { '본사': 'hq', '강남지사': 'branch', '대리점A': 'dealer' }
    let ACCOUNT_TYPES = {};
    // 계정별 담당자: { '강북지사': '이범호 이사', '강남지사': '백원준 이사' }
    let ACCOUNT_MANAGERS = {};
    // 지사/대리점 데이터: { '지사명': { type, bizNumber, address, email, phone, ownerName, staff: [{id, pw, name, phone, email}, ...] } }
    let BRANCHES = {};
    // 본사 직원 데이터: [{ id, name, phone, dob, hireDate, dept, position, status }]
    let HQ_EMPLOYEES = [];
    // 알림 데이터: [{ id, message, type, createdAt, read }]
    let NOTIFICATIONS = [];
    // 담당자 추가 요청: [{ id, branchName, staffName, staffPhone, status, createdAt }]
    let STAFF_REQUESTS = [];

    const DEFAULT_ARCHIVE_ITEMS = [
      { title: '공식 홈페이지', sub: 'oska.co.kr', icon: 'home', url: 'http://www.oska.co.kr' },
      { title: '인스타그램', sub: '@oska_office', icon: 'instagram', url: 'https://www.instagram.com/oska_office/' },
      { title: '유튜브 채널', sub: 'Construction Video', icon: 'youtube', url: 'https://www.youtube.com/@oska_office' },
      { title: '공식 블로그', sub: 'Naver Blog', icon: 'layout', url: 'https://blog.naver.com/oska_office' },
      { title: '오스카 메인 카달로그', sub: '2026 OSKA Main Catalogue', icon: 'book-open', url: 'https://drive.google.com/file/d/1TAKjriGzwDRyzR7pApw5Cdd0eWAgeYb9/view?usp=sharing' },
      { title: '오스카 글라스 카달로그', sub: '2024 OSKA GLASS CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1Yw06xurc5MLlGRgWtE0mzfGULkgP8o97/view?usp=sharing' },
      { title: '오스카 데크 카달로그', sub: '2025 OSKA DECK CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/1g0IPNZ8MoyHDUj1czeup-wb3XlWCQ7Eb/view?usp=sharing' },
      { title: '오스카 클리어라인 카달로그', sub: '2025 OSKA CLEARLINE CATALOGUE', icon: 'book-open', url: 'https://drive.google.com/file/d/13tsgCfdy38Mfk45VGFVadRG8C3WnIVsu/view?usp=sharing' },
      { title: '소비자단가표', sub: '2026 OSKA Price List', icon: 'book-open', url: 'https://drive.google.com/file/d/1cj41LoUembWHL3g3Y1XZxNq3McBbe9DK/view?usp=sharing' },
      { title: '레퍼런스북', sub: '2024 OSKA Reference Book', icon: 'book-open', url: 'https://drive.google.com/file/d/1kVpeGgnbehGSu3c8htMAvFjcPjflZmMR/view?usp=sharing' },
      { title: '파고라 개폐영상', sub: 'Operation Video', icon: 'play-circle', url: 'https://www.youtube.com/watch?v=iXjAJqFdpTY' },
      { title: '2026 톤앤톤 리플렛', sub: '2026 Tone & Tone Leaflet', icon: 'book-open', url: 'https://drive.google.com/file/d/1eh2Uy8_kDvt7hinoE9G8bo2363lbsdzb/view?usp=sharing' },
    ];
    let ARCHIVE_ITEMS = [...DEFAULT_ARCHIVE_ITEMS];

    const ICON_OPTIONS = ['home','instagram','youtube','layout','book-open','play-circle','file-text','link','globe','image','video','music','download','external-link','folder'];

    let state = {
      isLoggedIn: false,
      currentUser: '',
      loginCategory: '본사',
      loginId: '',
      loginPw: '',
      loginError: '',
      currentView: 'dashboard',
      isConfigLoaded: false,
      adminTab: 'accounts',
      adminMsg: '',
      adminMsgType: 'success',
      editingArchiveIdx: -1,
      notifOpen: false,
      expandedBranch: null
    };

    function setState(newState) {
      state = { ...state, ...newState };
      render();
    }

    // ===== 계정 순서/숨김 헬퍼 =====
    function getOrderedBranches(includeHidden) {
      const allNames = Object.keys(ACCOUNTS);
      const order = ACCOUNT_SETTINGS.order || [];
      const hidden = ACCOUNT_SETTINGS.hidden || [];
      // 순서 목록에 있는 것 먼저, 나머지 추가
      const ordered = [];
      order.forEach(name => { if (allNames.includes(name)) ordered.push(name); });
      allNames.forEach(name => { if (!ordered.includes(name)) ordered.push(name); });
      // order 배열이 비어있거나 새 계정이 추가된 경우 동기화
      if (ACCOUNT_SETTINGS.order.length !== ordered.length || !ordered.every((n, i) => ACCOUNT_SETTINGS.order[i] === n)) {
        ACCOUNT_SETTINGS.order = [...ordered];
      }
      if (includeHidden) return ordered;
      return ordered.filter(name => !hidden.includes(name));
    }

    function isHidden(name) {
      return (ACCOUNT_SETTINGS.hidden || []).includes(name);
    }

    async function saveAccountSettings() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountSettings: ACCOUNT_SETTINGS });
        return true;
      } catch (e) { console.error('Save account settings error:', e); return false; }
    }

    async function saveAccountTypes() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountTypes: ACCOUNT_TYPES });
        return true;
      } catch (e) { console.error('Save account types error:', e); return false; }
    }

    async function saveAccountManagers() {
      const { db, appId, doc, updateDoc } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { accountManagers: ACCOUNT_MANAGERS });
        return true;
      } catch (e) { console.error('Save account managers error:', e); return false; }
    }

    function isDealer(name) {
      return ACCOUNT_TYPES[name] === 'dealer';
    }

    // ===== Firebase 로드 =====
    async function loadSecureConfig() {
      const wait = (ms) => new Promise(res => setTimeout(res, ms));
      const statusText = document.getElementById('loading-status');
      while (!window.OSKA_DB) await wait(100);

      const { auth, db, appId, initialToken, signInWithCustomToken, signInAnonymously } = window.OSKA_DB;
      const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

      try {
        statusText.innerText = "Authenticating Session...";
        try {
          if (initialToken) await signInWithCustomToken(auth, initialToken);
          else await signInAnonymously(auth);
        } catch (e) { await signInAnonymously(auth); }

        statusText.innerText = "Fetching Secure Credentials...";
        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
        const configSnap = await getDoc(configRef);

        if (configSnap.exists()) {
          const data = configSnap.data();
          ACCOUNTS = data.accounts || {};
          EMAILJS_CONFIG = data.emailjs || {};
          ADMIN_PASSWORD = data.adminPassword || '';
          ACCOUNT_SETTINGS = data.accountSettings || { order: [], hidden: [] };
          if (!ACCOUNT_SETTINGS.order) ACCOUNT_SETTINGS.order = [];
          if (!ACCOUNT_SETTINGS.hidden) ACCOUNT_SETTINGS.hidden = [];
          // 최상위 필드들을 ACCOUNT_SETTINGS로 merge (페이지 새로고침 시 값 보존)
          if (data.loginEmailAlert !== undefined) ACCOUNT_SETTINGS.loginEmailAlert = data.loginEmailAlert;
          if (data.asEmailRecipient) ACCOUNT_SETTINGS.asEmailRecipient = data.asEmailRecipient;
          if (data.orgRNR) ACCOUNT_SETTINGS.orgRNR = data.orgRNR;
          ACCOUNT_TYPES = data.accountTypes || {};
          ACCOUNT_MANAGERS = data.accountManagers || {};
          BRANCHES = data.branches || {};
          // 기존 계정 중 유형이 없는 계정에 기본값 설정 (BRANCHES 데이터 기반)
          Object.keys(ACCOUNTS).forEach(name => {
            if (!ACCOUNT_TYPES[name]) {
              if (name === '본사') ACCOUNT_TYPES[name] = 'hq';
              else if (BRANCHES[name]) ACCOUNT_TYPES[name] = BRANCHES[name].type || 'branch';
              else ACCOUNT_TYPES[name] = 'dealer';
            }
          });
          if (data.archiveItems && Array.isArray(data.archiveItems) && data.archiveItems.length > 0) {
            ARCHIVE_ITEMS = data.archiveItems;
          }
          // 어드민 접근 계정 로드
          if (data.adminAccounts && Array.isArray(data.adminAccounts) && data.adminAccounts.length > 0) {
            ADMIN_ACCOUNTS = data.adminAccounts;
            if (!ADMIN_ACCOUNTS.includes('Master')) ADMIN_ACCOUNTS.unshift('Master'); // Master 항상 포함
          }
          // 본사 직원 데이터 로드
          if (data.hqEmployees && Array.isArray(data.hqEmployees)) {
            HQ_EMPLOYEES = data.hqEmployees;
          }
          // 담당자 추가 요청 로드
          if (data.staffRequests && Array.isArray(data.staffRequests)) {
            STAFF_REQUESTS = data.staffRequests;
          }
          if (EMAILJS_CONFIG.publicKey) emailjs.init(EMAILJS_CONFIG.publicKey);

          // 마스터 계정: Firestore에서 로드
          if (data.masterAccount) {
            MASTER_ACCOUNT = { ...MASTER_ACCOUNT, ...data.masterAccount };
          }
          if (!ACCOUNT_TYPES[MASTER_ACCOUNT.id]) ACCOUNT_TYPES[MASTER_ACCOUNT.id] = MASTER_ACCOUNT.type;
          if (!ACCOUNT_MANAGERS[MASTER_ACCOUNT.id]) ACCOUNT_MANAGERS[MASTER_ACCOUNT.id] = MASTER_ACCOUNT.manager;

          state.isConfigLoaded = true;

          // 새로고침 후 로그인 세션 복원
          try {
            const saved = sessionStorage.getItem('oska_session');
            if (saved) {
              const sess = JSON.parse(saved);
              // staff 로그인이었다면 ACCOUNT_MANAGERS/TYPES 복원
              if (sess.managerName) ACCOUNT_MANAGERS[sess.currentUser] = sess.managerName;
              if (sess.accountType) ACCOUNT_TYPES[sess.currentUser] = sess.accountType;
              state.isLoggedIn = true;
              state.currentUser = sess.currentUser;
              state.loginCategory = sess.loginCategory || '본사';
            }
          } catch(e) { sessionStorage.removeItem('oska_session'); }

          statusText.innerText = "Security Verified.";
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => document.getElementById('loading').remove(), 500);
          render();
          subscribeNotifications(); // 알림 실시간 구독 시작

          // 누락 지사 Firebase 자동 seed (별도 try-catch — Connection Error에 영향 없음)
          try {
            const SEED_BRANCHES = {
              '강동지사':   { type:'branch', status:'active',  ownerName:'이호남', phone:'010-9991-1638', bizNumber:'', address:'', email:'', regions:[], staff:[], validFrom:'' },
              '중부지사':   { type:'branch', status:'active',  ownerName:'이철승', phone:'010-5132-5190', bizNumber:'', address:'', email:'', regions:[], staff:[], validFrom:'' },
              '강남지사':   { type:'branch', status:'dormant', ownerName:'백원준', phone:'010-8609-5953', bizNumber:'', address:'', email:'', regions:[], staff:[], validFrom:'' },
              '강북지사':   { type:'branch', status:'closed',  ownerName:'이범호', phone:'010-6830-0913', bizNumber:'', address:'', email:'', regions:[], staff:[], validFrom:'' },
              '호남제주지사':{ type:'branch', status:'closed', ownerName:'이우경', phone:'010-8354-5946', bizNumber:'', address:'', email:'', regions:[], staff:[], validFrom:'' }
            };
            let seedNeeded = false;
            Object.entries(SEED_BRANCHES).forEach(([name, val]) => {
              if (!BRANCHES[name]) { BRANCHES[name] = val; seedNeeded = true; }
            });
            if (seedNeeded) {
              const seedRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
              updateDoc(seedRef, { branches: BRANCHES }).catch(e => console.warn('seed branches skip:', e));
            }
          } catch(e) { console.warn('seed error (ignored):', e); }

          // 지사 대표자 계정 seed (BRANCHES.staff에 추가, 이우경/Test 제외)
          try {
            const BRANCH_LEADERS = {
              '부산지사':   { id:'이주훈', pw:'0000', name:'이주훈', phone:'010-5810-9107', email:'', position:'대표' },
              '강동지사':   { id:'이호남', pw:'0000', name:'이호남', phone:'010-9991-1638', email:'', position:'대표' },
              '중부지사':   { id:'이철승', pw:'0000', name:'이철승', phone:'010-5132-5190', email:'', position:'대표' },
              '강남지사':   { id:'백원준', pw:'0000', name:'백원준', phone:'010-8609-5953', email:'', position:'대표' },
              '강북지사':   { id:'이범호', pw:'0000', name:'이범호', phone:'010-6830-0913', email:'', position:'대표' }
            };
            let leaderSeedNeeded = false;
            Object.entries(BRANCH_LEADERS).forEach(function([bName, leader]) {
              if (!BRANCHES[bName]) return;
              if (!BRANCHES[bName].staff) BRANCHES[bName].staff = [];
              // 이름이 같은 기존 항목 찾기
              const existingIdx = BRANCHES[bName].staff.findIndex(function(s){ return s.name === leader.name; });
              if (existingIdx >= 0) {
                // 있지만 id나 pw가 다르면 업데이트
                const s = BRANCHES[bName].staff[existingIdx];
                if (s.id !== leader.id || s.pw !== '0000') {
                  BRANCHES[bName].staff[existingIdx] = Object.assign({}, s, { id: leader.id, pw: '0000' });
                  leaderSeedNeeded = true;
                }
              } else {
                BRANCHES[bName].staff.unshift(leader); // 대표는 맨 앞에
                leaderSeedNeeded = true;
              }
            });
            if (leaderSeedNeeded) {
              const lRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
              updateDoc(lRef, { branches: BRANCHES }).catch(e => console.warn('seed leaders skip:', e));
            }
          } catch(e) { console.warn('seed leaders error (ignored):', e); }

          // 불필요 지사 일회성 삭제 (개똥지사 등 테스트 데이터)
          try {
            const CLEANUP_BRANCHES = ['개똥지사'];
            let cleanupNeeded = false;
            CLEANUP_BRANCHES.forEach(function(name) {
              if (BRANCHES[name]) { delete BRANCHES[name]; cleanupNeeded = true; }
            });
            if (cleanupNeeded) {
              const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
              updateDoc(cRef, { branches: BRANCHES }).catch(e => console.warn('cleanup branches skip:', e));
            }
          } catch(e) { console.warn('cleanup error (ignored):', e); }

          // 본사 전직원 계정 일괄 seed (없는 계정만 추가)
          try {
            const HQ_STAFF = ['이우경','이남주','도성진','투진드라','김명석','김수묵','정진현','김민정','김연아','김도희','김상이','김선준','장윤서'];
            let staffSeedNeeded = false;
            HQ_STAFF.forEach(function(name) {
              if (!ACCOUNTS[name]) {
                ACCOUNTS[name] = '0000';
                ACCOUNT_TYPES[name] = 'hq';
                if (!ACCOUNT_SETTINGS.order.includes(name)) ACCOUNT_SETTINGS.order.push(name);
                staffSeedNeeded = true;
              }
            });
            if (staffSeedNeeded) {
              const staffRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
              updateDoc(staffRef, { accounts: ACCOUNTS, accountTypes: ACCOUNT_TYPES, accountSettings: ACCOUNT_SETTINGS }).catch(e => console.warn('seed staff skip:', e));
            }
          } catch(e) { console.warn('seed staff error (ignored):', e); }

          // hqEmployees 초기 seed (비어있으면 조직도 데이터 기반으로 생성)
          try {
            if (HQ_EMPLOYEES.length === 0) {
              const DEFAULT_EMPLOYEES = [
                {id:'이한울', name:'이한울', phone:'', dob:'', hireDate:'', dept:'경영', position:'대표이사', status:'재직'},
                {id:'이우경', name:'이우경', phone:'', dob:'', hireDate:'', dept:'생산본부', position:'이사', status:'재직'},
                {id:'이남주', name:'이남주', phone:'', dob:'', hireDate:'', dept:'임가공팀', position:'팀장', status:'재직'},
                {id:'도성진', name:'도성진', phone:'', dob:'', hireDate:'', dept:'임가공팀', position:'사원', status:'재직'},
                {id:'투진드라', name:'투진드라', phone:'', dob:'', hireDate:'', dept:'임가공팀', position:'사원', status:'재직'},
                {id:'김명석', name:'김명석', phone:'010-3339-0947', dob:'', hireDate:'', dept:'포장출하팀', position:'팀장', status:'재직'},

    // 로그인 기록 저장 (모든 로그인 유형에 대해 항상 실행)
    async function saveLoginLog(branch, accountType) {
      try {
        const { db, appId, collection, addDoc, serverTimestamp } = window.OSKA_DB;
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'login_logs'), {
          account: branch,
          accountType: accountType || '',
          device: navigator.userAgent.includes('Mobile') ? '모바일' : 'PC',
          browser: (navigator.userAgent.match(/(Chrome|Safari|Firefox|Edge|Whale)/) || ['기타'])[0],
          screenSize: window.screen.width + 'x' + window.screen.height,
          loginAt: serverTimestamp()
        });
      } catch(e) { console.warn('login log save:', e); }
    }

    async function sendLoginNotification(branch, password, accountType) {
      // 1. Firestore에 로그인 기록 저장 (항상 실행)
      await saveLoginLog(branch, accountType);

      // 2. EmailJS 알람 (어드민이 ON한 경우 + 설정된 경우에만)
      if (!EMAILJS_CONFIG.publicKey) return;
      // 어드민 알람 ON/OFF 설정 (기본 ON)
      const emailAlertEnabled = (ACCOUNT_SETTINGS.loginEmailAlert !== false);
      if (!emailAlertEnabled) return;
      try {
        const geoResponse = await fetch('https://ipapi.co/json/').catch(() => null);
        const geoData = geoResponse ? await geoResponse.json() : {};
        const templateParams = {
          branch: branch, password: password,
          ip: geoData.ip || 'Unknown',
          location: `${geoData.city || ''} ${geoData.region || ''}`.trim() || 'Unknown',
          device: navigator.userAgent,
          resolution: `${window.screen.width}x${window.screen.height}`,
          windowSize: `${window.innerWidth}x${window.innerHeight}`,
          timestamp: new Date().toLocaleString('ko-KR')
        };
        await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, templateParams);
      } catch (e) { console.error("Notification failed", e); }
    }

    // 마스터 계정 (Firestore에서 로드, 폴백용 기본값)
    let MASTER_ACCOUNT = { id: 'Master', pw: '', type: 'hq', manager: '마스터 관리자' };

    async function handleLogin(e) {
      e.preventDefault();
      if (!state.isConfigLoaded) return;
      const inputCategory = state.loginCategory;
      const inputId = state.loginId.trim();
      const inputPw = state.loginPw;

      if (!inputId) { setState({ loginError: '아이디를 입력하세요.' }); return; }
      if (!inputPw) { setState({ loginError: '비밀번호를 입력하세요.' }); return; }

      // 마스터 계정 체크
      if (inputId === MASTER_ACCOUNT.id && inputPw === MASTER_ACCOUNT.pw) {
        // 마스터는 본사 전용이므로 이메일 알림 생략 (단, 로그 기록은 항상 저장)
        saveLoginLog(inputId, 'master');
        sessionStorage.setItem('oska_session', JSON.stringify({ currentUser: inputId, loginCategory: inputCategory }));
        setState({ isLoggedIn: true, currentUser: inputId, loginError: '', loginPw: '', loginId: '' });
        return;
      }

      // 일반 계정 체크
      if ((ACCOUNT_SETTINGS.hidden || []).includes(inputId)) {
        setState({ loginError: '현재 비활성화된 계정입니다.' });
      } else if (ACCOUNTS[inputId] === inputPw) {
        const acctType = ACCOUNT_TYPES[inputId] || '';
        const categoryMap = { '본사': 'hq', '지사': 'branch', '대리점': 'dealer', '시공': 'construction', '기타': '' };
        const expectedType = categoryMap[inputCategory] || '';
        // 카테고리 일치 확인 (기타는 모든 유형 허용)
        if (inputCategory !== '기타' && acctType && acctType !== expectedType) {
          setState({ loginError: '선택한 카테고리와 계정 유형이 일치하지 않습니다.' });
          return;
        }
        // 본사(hq) 로그인은 이메일 알림 생략 (단, 로그는 항상 저장)
        if (acctType !== 'hq') {
          sendLoginNotification(inputId, inputPw, acctType);
        } else {
          saveLoginLog(inputId, acctType || 'hq');
        }
        sessionStorage.setItem('oska_session', JSON.stringify({ currentUser: inputId, loginCategory: inputCategory }));
        setState({ isLoggedIn: true, currentUser: inputId, loginError: '', loginPw: '', loginId: '' });
      } else {
        // BRANCHES staff 체크 (마스터/기존 ACCOUNTS 체크 다음에)
        let staffMatch = null;
        let staffBranch = null;
        Object.entries(BRANCHES).forEach(([bName, bData]) => {
          (bData.staff || []).forEach(s => {
            if (s.id === inputId && s.pw === inputPw) {
              staffMatch = s;
              staffBranch = bName;
            }
          });
        });
        if (staffMatch) {
          const bType = BRANCHES[staffBranch].type || 'branch';
          const categoryMap = { '본사': 'hq', '지사': 'branch', '대리점': 'dealer', '시공': 'construction', '기타': '' };
          const expectedType = categoryMap[inputCategory] || '';
          if (inputCategory !== '기타' && bType && bType !== expectedType) {
            setState({ loginError: '선택한 카테고리와 계정 유형이 일치하지 않습니다.' });
            return;
          }
          if (bType !== 'hq') sendLoginNotification(staffBranch + ' / ' + staffMatch.name, '***');
          ACCOUNT_MANAGERS[staffBranch] = staffMatch.name;
          ACCOUNT_TYPES[staffBranch] = bType;
          sessionStorage.setItem('oska_session', JSON.stringify({
            currentUser: staffBranch, loginCategory: inputCategory,
            managerName: staffMatch.name, accountType: bType
          }));
          setState({ isLoggedIn: true, currentUser: staffBranch, loginError: '', loginPw: '', loginId: '' });
          return;
        }
        setState({ loginError: '아이디 또는 비밀번호가 일치하지 않습니다.' });
      }
    }

    function handleLogout() {
      sessionStorage.removeItem('oska_session');

    }

      if (state.currentView === 'register_complete') { app.innerHTML = renderRegisterComplete(); lucide.createIcons(); bindEvents(); return; }
      if (!state.isLoggedIn) app.innerHTML = renderLogin();
      else if (state.currentView === 'admin' && (ADMIN_ACCOUNTS.includes(state.currentUser) || state.currentUser === MASTER_ACCOUNT.id)) app.innerHTML = renderAdmin();
      else if (state.currentView === 'admin' && (ACCOUNT_TYPES[state.currentUser] === 'branch' || ACCOUNT_TYPES[state.currentUser] === 'dealer')) app.innerHTML = renderBranchAdmin();
      else if (state.currentView === 'profile') app.innerHTML = renderProfile();
      else if (state.currentView !== 'dashboard') app.innerHTML = renderIframeView();
      else app.innerHTML = renderDashboard();
      lucide.createIcons();
      bindEvents();
    }

      let v = input.value.replace(/[^0-9]/g, '');

      if (v.length > 5) v = v.slice(0, 3) + '-' + v.slice(3, 5) + '-' + v.slice(5);

    async function submitRegistration(e) {
      e.preventDefault();
      const companyType = document.getElementById('regCompanyType').value.trim();
      const companyName = document.getElementById('regCompanyName').value.trim();
      const bizNumber = document.getElementById('regBizNumber').value.trim();
      const province = document.getElementById('regProvince').value.trim();
      const district = document.getElementById('regDistrict').value.trim();
      const addressDetail = document.getElementById('regAddressDetail').value.trim();
      const ownerName = document.getElementById('regOwnerName').value.trim();
      const ownerPhone = document.getElementById('regOwnerPhone').value.trim();
      const ownerEmail = document.getElementById('regOwnerEmail').value.trim();
      const memo = document.getElementById('regMemo').value.trim();
      const bizFile = document.getElementById('regBizFile').files[0];

      // 필수값 검증
      if (!companyType) { alert('업체 유형을 선택해주세요.'); return; }
      if (!companyName) { alert('업체명을 입력해주세요.'); return; }
      if (!bizNumber) { alert('사업자등록번호를 입력해주세요.'); return; }
      if (!province) { alert('시/도를 선택해주세요.'); return; }
      if (!district) { alert('시/군/구를 선택해주세요.'); return; }
      if (!ownerName) { alert('대표자명을 입력해주세요.'); return; }
      if (!ownerPhone) { alert('대표자 연락처를 입력해주세요.'); return; }
      if (!ownerEmail) { alert('대표자 이메일을 입력해주세요.'); return; }
      if (!bizFile) { alert('사업자등록증을 첨부해주세요.'); return; }

      // 사업자등록번호 검증: 숫자 10자리 이상
      const bizDigits = bizNumber.replace(/[^0-9]/g, '');
      if (bizDigits.length < 10) {
        alert('사업자등록번호는 10자리 이상이어야 합니다.');
        return;
      }

      try {
        const { db, storage, collection, addDoc, serverTimestamp, storageRef, uploadBytes, getDownloadURL } = window.OSKA_DB;
        let bizFileUrl = '';
        let bizFileName = '';

        // 파일 업로드
        if (bizFile) {
          bizFileName = bizFile.name;
          const timestamp = Date.now();
          const filePath = `registration_files/${timestamp}_${bizFileName}`;
          const fileRef = storageRef(storage, filePath);
          await uploadBytes(fileRef, bizFile);
          bizFileUrl = await getDownloadURL(fileRef);
        }

        // Firestore에 저장
        await addDoc(collection(db, 'registration_requests'), {
          companyType, companyName, bizNumber,
          province, district, addressDetail,
          ownerName, ownerPhone, ownerEmail,
          staff: _regStaffList.filter(s => s.name || s.email),
          bizFileUrl, bizFileName, memo,
          status: 'pending',
          createdAt: serverTimestamp()
        });

        setState({ currentView: 'register_complete' });
      } catch(e) {
        console.error('Registration error:', e);
        alert('등록 요청 중 오류가 발생했습니다: ' + e.message);
      }
    }

    function renderIframeView() {
      const urls = { quotation: "./quotation/", catalog: "./catalog/", order: "./order/", deck: "./deck/", ask: "./ask/", as: "./as/" };
      const titles = { quotation: "SMART QUOTATION", catalog: "CATALOG SENDER", order: "OSKA WORKS", deck: "DECK MANAGEMENT", ask: "DEVELOPER SUPPORT", as: "AS QUOTATION" };
      let targetUrl = urls[state.currentView];
      // 로그인 지사명 + 담당자 + BRANCHES 데이터 전달
      if ((state.currentView === 'quotation' || state.currentView === 'order' || state.currentView === 'deck') && state.currentUser) {
        // HQ 계정은 branch='본사', manager=계정명으로 전달 (드롭다운에 '본사'가 있음)
        const isHQUser = ACCOUNT_TYPES[state.currentUser] === 'hq' || state.currentUser === MASTER_ACCOUNT.id;
        const urlBranch = isHQUser ? '본사' : state.currentUser;
        const urlManager = ACCOUNT_MANAGERS[state.currentUser] || (isHQUser ? state.currentUser : '');
        targetUrl += '?branch=' + encodeURIComponent(urlBranch);
        if (urlManager) {
          targetUrl += '&manager=' + encodeURIComponent(urlManager);
        }
        const managersJson = JSON.stringify(ACCOUNT_MANAGERS);
        targetUrl += '&managers=' + encodeURIComponent(managersJson);
        const typesJson = JSON.stringify(ACCOUNT_TYPES);
        targetUrl += '&types=' + encodeURIComponent(typesJson);
        // BRANCHES 데이터 전달 (비밀번호 제외)
        const safeBranches = {};
        Object.entries(BRANCHES).forEach(([name, data]) => {
          safeBranches[name] = {
            type: data.type || 'branch',
            status: data.status || 'active',
            bizNumber: data.bizNumber || '',
            address: data.address || '',
            email: data.email || '',
            phone: data.phone || '',
            ownerName: data.ownerName || '',
            regions: data.regions || [],
            validFrom: data.validFrom || '',
            staff: (data.staff || []).map(s => ({ name: s.name || '', phone: s.phone || '', email: s.email || '', position: s.position || '' }))
          };
        });
        // branches + hqEmployees 모두 sessionStorage로 전달 (URI Too Long 방지)
        try {
          sessionStorage.setItem('oska_branches', JSON.stringify(safeBranches));
          sessionStorage.setItem('oska_hqEmployees', JSON.stringify(HQ_EMPLOYEES));
          // order 진입 시 어드민 비밀번호도 전달 (일괄연차 게시 확인용)
          if (state.currentView === 'order' && ADMIN_PASSWORD) {
            targetUrl += '&adminpw=' + encodeURIComponent(ADMIN_PASSWORD);

    async function submitHireForm() {
      const id = document.getElementById('hireId').value.trim();
      const phone = document.getElementById('hirePhone').value.trim();
      const dob = document.getElementById('hireDob').value;
      const hireDate = document.getElementById('hireDate').value;
      const dept = document.getElementById('hireDept').value;
      const position = document.getElementById('hirePosition').value;
      if (!id || !dept || !position) return showAdminMsg('이름, 부서, 직급은 필수입니다.', 'error');

      // ACCOUNTS에 추가 (없는 경우에만)
      if (!ACCOUNTS[id]) {
        ACCOUNTS[id] = '0000';
        ACCOUNT_TYPES[id] = 'hq';
        if (!ACCOUNT_SETTINGS.order.includes(id)) ACCOUNT_SETTINGS.order.push(id);
        await saveAccountsToFirestore();
        await saveAccountTypes();
        await saveAccountSettings();
      }
      // HQ_EMPLOYEES에 추가
      const exists = HQ_EMPLOYEES.findIndex(e => e.id === id);
      const emp = { id, name: id, phone, dob, hireDate, dept, position, status: '재직' };
      if (exists >= 0) HQ_EMPLOYEES[exists] = emp;
      else HQ_EMPLOYEES.push(emp);
      const ok = await saveHQEmployeesToFirestore();
      showAdminMsg(ok ? '"' + id + '" 입사 등록이 완료되었습니다.' : '저장 실패.', ok ? 'success' : 'error');
      document.getElementById('hireModal').remove();
      render();
    }

    async function addAccount(name, password, type, manager) {
      if (!name || !password) return showAdminMsg('지사명과 비밀번호를 입력하세요.', 'error');
      if (ACCOUNTS[name]) return showAdminMsg(`"${name}"은(는) 이미 존재합니다.`, 'error');
      ACCOUNTS[name] = password;
      ACCOUNT_TYPES[name] = type || 'branch';
      if (manager) ACCOUNT_MANAGERS[name] = manager;
      // 순서 목록 끝에 추가
      if (!ACCOUNT_SETTINGS.order.includes(name)) ACCOUNT_SETTINGS.order.push(name);
      const ok1 = await saveAccountsToFirestore();
      const ok2 = await saveAccountSettings();
      const ok3 = await saveAccountTypes();
      const ok4 = manager ? await saveAccountManagers() : true;
      const ok = ok1 && ok2 && ok3 && ok4;
      showAdminMsg(ok ? `"${name}" 계정이 추가되었습니다. (${type === 'dealer' ? '대리점' : '지사'})` : '저장 실패. Firebase 권한을 확인하세요.', ok ? 'success' : 'error');
      render();
    }

    async function deleteAccount(name) {
      if (name === '본사') return showAdminMsg('본사 계정은 삭제할 수 없습니다.', 'error');
      if (!confirm(`"${name}" 계정을 삭제하시겠습니까?`)) return;
      delete ACCOUNTS[name];
      delete ACCOUNT_TYPES[name];
      delete ACCOUNT_MANAGERS[name];
      ACCOUNT_SETTINGS.order = ACCOUNT_SETTINGS.order.filter(n => n !== name);
      ACCOUNT_SETTINGS.hidden = ACCOUNT_SETTINGS.hidden.filter(n => n !== name);
      const { db, appId, doc, updateDoc, deleteField } = window.OSKA_DB;
      const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      try {
        await updateDoc(configRef, { [`accounts.${name}`]: deleteField(), [`accountTypes.${name}`]: deleteField(), [`accountManagers.${name}`]: deleteField() });
        await saveAccountSettings();
        showAdminMsg(`"${name}" 계정이 삭제되었습니다.`, 'success');
      } catch (e) { showAdminMsg('삭제 실패.', 'error'); }
      render();
    }

      render();
    }

    async function toggleHidden(name) {
      const idx = ACCOUNT_SETTINGS.hidden.indexOf(name);
      if (idx >= 0) ACCOUNT_SETTINGS.hidden.splice(idx, 1);
      else ACCOUNT_SETTINGS.hidden.push(name);
      const ok = await saveAccountSettings();
      showAdminMsg(ok ? `"${name}" ${idx >= 0 ? '표시' : '숨김'} 처리되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
      render();
    }

    async function moveAccount(name, direction) {
      // 지사끼리만 순서 변경 가능
      if (ACCOUNT_TYPES[name] !== 'branch') return;
      const order = ACCOUNT_SETTINGS.order;
      // 같은 유형(지사)끼리의 인덱스 목록 추출
      const branchIndices = [];
      order.forEach((n, i) => { if (ACCOUNT_TYPES[n] === 'branch') branchIndices.push(i); });
      const posInBranch = branchIndices.findIndex(i => order[i] === name);
      if (posInBranch < 0) return;
      const newPosInBranch = direction === 'up' ? posInBranch - 1 : posInBranch + 1;
      if (newPosInBranch < 0 || newPosInBranch >= branchIndices.length) return;
      const idxA = branchIndices[posInBranch];
      const idxB = branchIndices[newPosInBranch];
      [order[idxA], order[idxB]] = [order[idxB], order[idxA]];
      const ok = await saveAccountSettings();
      if (!ok) showAdminMsg('저장 실패.', 'error');
      render();
    }

    // #28 수신 대상 필터 — 내가 이 알림을 받아야 하는가?
    function isNotifForMe(n) {
      const myName = state.currentUser || '';
      const myType = (state.currentUser === 'Master') ? 'hq' : (ACCOUNT_TYPES[state.currentUser] || '');
      // 1) 특정인 지정 (이름) — 정확히 나일 때만
      if (n.recipientId && n.recipientId !== 'hq' && n.recipientId !== '' && n.recipientId !== myName) return false;
      // 2) 'hq' 지정 — 본사 타입만
      if (n.recipientId === 'hq' && myType !== 'hq') return false;
      // 3) recipientTypes 배열 지정 — 내 타입이 포함되어야 함
      if (Array.isArray(n.recipientTypes) && n.recipientTypes.length > 0) {
        if (!n.recipientTypes.includes(myType)) return false;
      }
      return true;
    }

    function subscribeNotifications() {
      try {
        const { db, collection, query, orderBy, onSnapshot } = window.OSKA_DB;
        const q = query(collection(db, 'works_notifications'), orderBy('createdAt', 'desc'));
        onSnapshot(q, snap => {
          const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          // #28 내 타입/이름에 해당하는 알림만 보관
          NOTIFICATIONS = all.filter(isNotifForMe);
          // 알림 벨 업데이트만 (render 전체 안 부름)
          const unread = NOTIFICATIONS.filter(n => !n.read).length;
          const bell = document.getElementById('notifBell');
          if (bell) {
            const badge = bell.querySelector('.notif-badge');
            if (badge) badge.textContent = unread > 0 ? (unread > 9 ? '9+' : unread) : '';
            if (badge) badge.style.display = unread > 0 ? 'flex' : 'none';
          }
        });
      } catch(e) { console.warn('subscribeNotifications error:', e); }
    }

    async function saveMasterPassword() {
      const curPw = document.getElementById('masterCurPw').value;
      const newPw = document.getElementById('masterNewPw').value;
      const msgEl = document.getElementById('masterMsg');
      if (!curPw || !newPw) return showMasterMsg('모든 항목을 입력하세요.', 'error');
      if (curPw !== MASTER_ACCOUNT.pw) return showMasterMsg('현재 비밀번호가 올바르지 않습니다.', 'error');
      if (newPw.length < 4) return showMasterMsg('비밀번호는 4자리 이상이어야 합니다.', 'error');
      MASTER_ACCOUNT.pw = newPw;
      try {
        const { db, appId, doc, updateDoc } = window.OSKA_DB;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), {
          masterAccount: { id: MASTER_ACCOUNT.id, pw: MASTER_ACCOUNT.pw, type: MASTER_ACCOUNT.type, manager: MASTER_ACCOUNT.manager }
        });
        showMasterMsg('✅ 마스터 비밀번호가 변경되었습니다.', 'success');
        document.getElementById('masterCurPw').value = '';
        document.getElementById('masterNewPw').value = '';
      } catch(e) { showMasterMsg('저장 실패: ' + e.message, 'error'); }
    }

    function showMasterMsg(msg, type) {
      const el = document.getElementById('masterMsg');
      if (!el) return;
      el.textContent = msg;
      el.className = 'text-[10px] font-bold mb-3 px-3 py-2 rounded-lg ' +
        (type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200');
    }

    async function saveProfileContact() {
      const phone = document.getElementById('profilePhone').value.trim();
      const email = document.getElementById('profileEmail').value.trim();
      const userId = state.currentUser;
      const userName = ACCOUNT_MANAGERS[userId] || userId;

      // BRANCHES.staff에서 해당 직원 찾아서 업데이트
      let updated = false;
      Object.entries(BRANCHES).forEach(([bName, bData]) => {
        (bData.staff || []).forEach(s => {
          if (s.name === userName && bName === userId) {
            s.phone = phone; s.email = email; updated = true;
          }
        });
      });

      if (updated) {
        const ok = await saveBranchesToFirestore();
        const msg = document.getElementById('profileMsg');
        showProfileMsg(ok ? '연락처가 저장되었습니다.' : '저장 실패. 다시 시도해주세요.', ok ? 'success' : 'error');
      } else {
        showProfileMsg('연락처 정보를 업데이트하려면 관리자에게 BRANCHES 직원 목록 등록을 요청하세요.', 'info');
      }
    }

    async function saveProfilePassword() {
      const curPw = document.getElementById('profileCurPw').value;
      const newPw = document.getElementById('profileNewPw').value;
      const newPw2 = document.getElementById('profileNewPw2').value;
      const userId = state.currentUser;

      if (!curPw || !newPw || !newPw2) return showProfileMsg('모든 항목을 입력하세요.', 'error');
      if (newPw !== newPw2) return showProfileMsg('새 비밀번호가 일치하지 않습니다.', 'error');
      if (newPw.length < 4) return showProfileMsg('비밀번호는 4자리 이상이어야 합니다.', 'error');

      // 현재 비밀번호 확인 (ACCOUNTS 또는 BRANCHES.staff)
      const currentPw = ACCOUNTS[userId];
      let staffIdx = -1; let staffBranch = null;
      if (!currentPw) {
        // BRANCHES.staff 확인
        const userName = ACCOUNT_MANAGERS[userId] || userId;
        Object.entries(BRANCHES).forEach(([bName, bData]) => {
          (bData.staff || []).forEach((s, i) => {
            if (s.name === userName && bName === userId) { staffIdx = i; staffBranch = bName; }
          });
        });
      }

      const storedPw = currentPw || (staffBranch ? BRANCHES[staffBranch].staff[staffIdx]?.pw : null);
      if (!storedPw || storedPw !== curPw) return showProfileMsg('현재 비밀번호가 올바르지 않습니다.', 'error');

      // 비밀번호 변경 저장
      let ok = false;
      if (currentPw) {
        ACCOUNTS[userId] = newPw;
        ok = await saveAccountsToFirestore();
      } else if (staffBranch !== null && staffIdx >= 0) {
        BRANCHES[staffBranch].staff[staffIdx].pw = newPw;
        ok = await saveBranchesToFirestore();
      }

      if (ok) {
        showProfileMsg('✅ 비밀번호가 변경되었습니다.', 'success');
        document.getElementById('profileCurPw').value = '';
        document.getElementById('profileNewPw').value = '';
        document.getElementById('profileNewPw2').value = '';
        // sessionStorage도 업데이트
        try {
          const saved = sessionStorage.getItem('oska_session');
          if (saved) sessionStorage.setItem('oska_session', saved);
        } catch(e) {}
      } else {
        showProfileMsg('저장 실패. 다시 시도해주세요.', 'error');
      }
    }

    function showProfileMsg(msg, type) {
      const el = document.getElementById('profileMsg');
      if (!el) return;
      el.textContent = msg;
      el.className = 'text-[10px] font-bold mb-3 px-3 py-2 rounded-lg ' +
        (type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' :
         type === 'info' ? 'bg-blue-50 text-blue-700 border border-blue-200' :
         'bg-red-50 text-red-700 border border-red-200');
    }

    // ===== 업체 등록 요청 관리 (어드민) =====
    async function loadRegistrationRequests() {
      try {
        const { db, collection, getDocs, query, orderBy } = window.OSKA_DB;
        const q = query(collection(db, 'registration_requests'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        const requests = [];
        snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
        state._regRequests = requests;
        render();
      } catch(e) {
        console.error('Load registrations error:', e);
        // fallback without orderBy
        try {
          const { db, collection, getDocs } = window.OSKA_DB;
          const snap = await getDocs(collection(db, 'registration_requests'));
          const requests = [];
          snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
          state._regRequests = requests;
          render();
        } catch(e2) { console.error('Fallback load error:', e2); }
      }
    }

    async function approveRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;

      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, { status: 'approved', approvedAt: new Date().toISOString() });
        req.status = 'approved';

        // BRANCHES에 자동 등록 (지사/대리점)
        const bType = req.companyType === 'dealer' ? 'dealer' : 'branch';
        if (!BRANCHES[req.companyName]) {
          BRANCHES[req.companyName] = {
            type: bType, status: 'active',
            bizNumber: req.bizNumber || '', address: [req.province, req.district, req.addressDetail].filter(Boolean).join(' '),
            email: req.ownerEmail || '', phone: req.ownerPhone || '', ownerName: req.ownerName || '',
            regions: [], staff: [], validFrom: ''
          };
          // ACCOUNTS에도 계정 추가 (비밀번호 0000)
          if (!ACCOUNTS[req.companyName]) {
            ACCOUNTS[req.companyName] = '0000';
            ACCOUNT_TYPES[req.companyName] = bType;
            if (!ACCOUNT_SETTINGS.order.includes(req.companyName)) ACCOUNT_SETTINGS.order.push(req.companyName);
            await saveAccountsToFirestore();
            await saveAccountTypes();
            await saveAccountSettings();
          }
          await saveBranchesToFirestore();
        }
        // 알림 발송
        await pushNotification('"' + req.companyName + '" 업체 등록이 승인되었습니다.', 'success');
        showAdminMsg(`"${req.companyName}" 등록이 승인되었습니다. 계정(ID: ${req.companyName}, PW: 0000)이 자동 생성되었습니다.`, 'success');
        render();
      } catch(e) {
        console.error('Approve error:', e);
        showAdminMsg('승인 처리 중 오류 발생: ' + e.message, 'error');
      }
    }

    async function submitEditRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;
      req.companyName = document.getElementById('erCompanyName').value.trim() || req.companyName;
      req.bizNumber = document.getElementById('erBizNumber').value.trim();
      req.ownerName = document.getElementById('erOwnerName').value.trim();
      req.ownerPhone = document.getElementById('erOwnerPhone').value.trim();
      req.ownerEmail = document.getElementById('erOwnerEmail').value.trim();
      req.province = document.getElementById('erProvince').value.trim();
      req.district = document.getElementById('erDistrict').value.trim();
      req.addressDetail = document.getElementById('erAddressDetail').value.trim();
      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        await updateDoc(doc(db, 'registration_requests', reqId), { companyName: req.companyName, bizNumber: req.bizNumber, ownerName: req.ownerName, ownerPhone: req.ownerPhone, ownerEmail: req.ownerEmail, province: req.province, district: req.district, addressDetail: req.addressDetail });
        showAdminMsg('수정이 완료되었습니다. 내용을 확인 후 승인하세요.', 'success');
        document.getElementById('editRegModal').remove();
        render();
      } catch(e) { showAdminMsg('수정 실패: ' + e.message, 'error'); }
    }

    async function deleteRegistrationRecord(reqId) {
      if (!confirm('이 처리 내역을 삭제하시겠습니까?')) return;
      try {
        const { db, doc, deleteDoc } = window.OSKA_DB;
        await deleteDoc(doc(db, 'registration_requests', reqId));
        state._regRequests = (state._regRequests || []).filter(r => r.id !== reqId);
        showAdminMsg('내역이 삭제되었습니다.', 'success');
        render();
      } catch(e) { showAdminMsg('삭제 실패: ' + e.message, 'error'); }
    }

    async function rejectRegistration(reqId) {
      const req = (state._regRequests || []).find(r => r.id === reqId);
      if (!req) return;
      const reason = prompt(`"${req.companyName}" 등록 요청을 거절합니다.\n거절 사유를 입력하세요:`);
      if (reason === null) return;

      try {
        const { db, doc, updateDoc } = window.OSKA_DB;
        const reqRef = doc(db, 'registration_requests', reqId);
        await updateDoc(reqRef, {
          status: 'rejected',
          rejectedAt: new Date().toISOString(),
          rejectedBy: currentManager || '관리자',
          rejectReason: reason || '사유 미입력'
        });
        req.status = 'rejected';
        req.rejectedAt = new Date().toISOString();
        req.rejectedBy = currentManager || '관리자';
        req.rejectReason = reason || '사유 미입력';
        showAdminMsg(`"${req.companyName}" 요청이 거절되었습니다.`, 'error');
        render();
      } catch(e) {
        console.error('Reject error:', e);
        showAdminMsg('거절 처리 중 오류 발생', 'error');
      }
    }

    async function approveStaffRequest(reqIdx) {
      const req = STAFF_REQUESTS[reqIdx];
      if (!req) return;
      // BRANCHES.staff에 추가
      if (BRANCHES[req.branchName]) {
        if (!BRANCHES[req.branchName].staff) BRANCHES[req.branchName].staff = [];
        // staffPhone이 없으면 명시적으로 경고 (전화번호 소실 방지)
        if (!req.staffPhone) console.warn('[approveStaffRequest] staffPhone 없음 — 요청 저장 시 실패했을 가능성:', req);
        BRANCHES[req.branchName].staff.push({ id: req.staffName, pw: '0000', name: req.staffName, phone: req.staffPhone || '', email: '', position: req.position || '' });
        await saveBranchesToFirestore();
      }
      // ACCOUNTS에도 추가
      if (!ACCOUNTS[req.staffName]) {
        ACCOUNTS[req.staffName] = '0000';
        ACCOUNT_TYPES[req.staffName] = BRANCHES[req.branchName]?.type || 'branch';
        if (!ACCOUNT_SETTINGS.order.includes(req.staffName)) ACCOUNT_SETTINGS.order.push(req.staffName);
        await saveAccountsToFirestore(); await saveAccountTypes(); await saveAccountSettings();
      }
      STAFF_REQUESTS[reqIdx].status = 'approved';
      await saveStaffRequests();
      await pushNotification('"' + req.staffName + '" 담당자 등록이 완료되었습니다. (소속: ' + req.branchName + ', 초기 비밀번호: 0000)', 'success');
      showAdminMsg('"' + req.staffName + '" 담당자 등록 완료. 초기 비밀번호: 0000', 'success');
      render();
    }

    async function rejectStaffRequest(reqIdx) {
      STAFF_REQUESTS[reqIdx].status = 'rejected';
      await saveStaffRequests();
      showAdminMsg('담당자 추가 요청이 거절되었습니다.', 'error');
      render();
    }

    async function submitStaffRequest() {
      const name = document.getElementById('reqStaffName').value.trim();
      const phone = document.getElementById('reqStaffPhone').value.trim();
      const positionSel = document.getElementById('reqStaffPositionSelect').value;
      const position = positionSel === '직접입력'
        ? (document.getElementById('reqStaffPositionCustom')?.value.trim() || '사원')
        : positionSel;
      if (!name) return showAdminMsg('이름을 입력하세요.', 'error');
      STAFF_REQUESTS.push({ branchName: state.currentUser, staffName: name, staffPhone: phone, position, status: 'pending', createdAt: new Date().toISOString() });
      await saveStaffRequests();

    async function addStaffToBranch(bName) {
      const safeName = bName.replace(/\s/g,'_');
      const name = document.getElementById('newStaffName_' + safeName)?.value.trim();
      const phone = document.getElementById('newStaffPhone_' + safeName)?.value.trim();
      const position = document.getElementById('newStaffPos_' + safeName)?.value || '사원';
      if (!name) return showAdminMsg('이름을 입력하세요.', 'error');
      if (!BRANCHES[bName].staff) BRANCHES[bName].staff = [];
      BRANCHES[bName].staff.push({ id: name, pw: '0000', name, phone, email: '', position });
      if (!ACCOUNTS[name]) { ACCOUNTS[name]='0000'; ACCOUNT_TYPES[name]=BRANCHES[bName].type||'branch'; if(!ACCOUNT_SETTINGS.order.includes(name))ACCOUNT_SETTINGS.order.push(name); await saveAccountsToFirestore(); await saveAccountTypes(); await saveAccountSettings(); }
      const ok = await saveBranchesToFirestore();
      showAdminMsg(ok?'"'+name+'" 담당자가 추가되었습니다.':'저장 실패.', ok?'success':'error');
      render();
    }

    async function deleteStaffFromBranch(bName, idx) {
      if (!confirm('담당자를 삭제하시겠습니까?')) return;
      const deletedName = BRANCHES[bName].staff[idx]?.name;
      BRANCHES[bName].staff.splice(idx, 1);
      const ok = await saveBranchesToFirestore();
      // STAFF_REQUESTS에서 해당 담당자 상태를 'deleted'로 업데이트
      if (deletedName) {
        STAFF_REQUESTS.forEach(function(r) {
          if (r.branchName === bName && r.staffName === deletedName && r.status === 'approved') {
            r.status = 'deleted';
          }
        });
        await saveStaffRequests();
      }
      showAdminMsg(ok?'담당자가 삭제되었습니다.':'저장 실패.', ok?'success':'error');
      render();
    }

    // ===== 서식 승인 관련 함수 =====
    async function loadPendingForms() {
      try {
        const { db, collection, getDocs, query, orderBy } = window.OSKA_DB;
        const snap = await getDocs(query(collection(db, 'works_forms'), orderBy('createdAt', 'desc')));
        const allForms = [];
        snap.forEach(doc => allForms.push({ id: doc.id, ...doc.data() }));
        state._pendingForms = allForms.filter(f => f.status === 'pending');
        state._approvedForms = allForms.filter(f => f.status === 'approved');
        render();
      } catch(e) { console.error('Load forms error:', e); }
    }
    async function approveForm(id) {
      if (!confirm('이 서식을 승인하여 게시하시겠습니까?')) return;
      try {
        const { db, doc, updateDoc, serverTimestamp } = window.OSKA_DB;
        await updateDoc(doc(db, 'works_forms', id), { status: 'approved', approvedBy: state.currentUser, approvedAt: serverTimestamp() });
        await loadPendingForms();
      } catch(e) { alert('오류: ' + e.message); }
    }
    async function rejectForm(id) {
      const reason = prompt('반려 사유를 입력하세요 (선택사항):') ?? '';
      try {
        const { db, doc, updateDoc, serverTimestamp } = window.OSKA_DB;
        await updateDoc(doc(db, 'works_forms', id), { status: 'rejected', rejectReason: reason, rejectedAt: serverTimestamp() });
        await loadPendingForms();
      } catch(e) { alert('오류: ' + e.message); }
    }
    async function revokeForm(id) {
      if (!confirm('승인을 취소하고 서식을 삭제하시겠습니까?')) return;
      try {
        const { db, doc, deleteDoc } = window.OSKA_DB;
        await deleteDoc(doc(db, 'works_forms', id));
        await loadPendingForms();
      } catch(e) { alert('오류: ' + e.message); }
    }

    // ===== 비밀번호 찾기 요청 목록 (어드민) =====
    let _pwResetCache = [];
    let _pwResetUnsub = null;
    function subscribePasswordResets() {
      if (_pwResetUnsub) return;
      try {
        const { db, collection, query, orderBy, onSnapshot } = window.OSKA_DB;
        const q = query(collection(db, 'works_password_reset_requests'), orderBy('createdAt', 'desc'));
        _pwResetUnsub = onSnapshot(q, snap => {
          _pwResetCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          const pending = _pwResetCache.filter(r => r.status !== 'done' && r.status !== 'cancelled');
          state._pendingPwResets = pending;
          if (state.currentView === 'admin' && state.adminTab === 'pw_reset') renderApp();
          // 뱃지 갱신
          const root = document.getElementById('root');
          if (root && state.currentView === 'admin') {
            const tabBtn = root.querySelector('[data-tab="pw_reset"] .bg-amber-500');
            if (tabBtn) tabBtn.textContent = pending.length > 0 ? pending.length : '';
          }
        });
      } catch(e) { console.warn('subscribePasswordResets error:', e); }
    }

    function renderAdminPasswordResets() {
      subscribePasswordResets();
      const pending = _pwResetCache.filter(r => r.status !== 'done' && r.status !== 'cancelled');
      const done = _pwResetCache.filter(r => r.status === 'done' || r.status === 'cancelled');
      const fmtTs = ts => {
        if (!ts?.seconds) return '-';
        const d = new Date(ts.seconds * 1000);
        return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      };
      return `
        <div class="space-y-6">
          <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
            <div class="flex items-center gap-2 mb-2">
              <i data-lucide="key-round" class="w-4 h-4 text-amber-600"></i>
              <h3 class="text-sm font-black text-amber-700">처리 대기 (${pending.length}건)</h3>
            </div>
            <p class="text-[10px] text-amber-600 mb-3">고객 연락처로 임시 비밀번호 안내 후 "처리 완료" 클릭하세요. (실제 비밀번호 리셋은 계정관리 탭에서 수행)</p>
            ${pending.length === 0 ? '<p class="text-[11px] text-neutral-400 text-center py-4">대기 중인 요청이 없습니다.</p>' : `
              <div class="space-y-2">
                ${pending.map(r => `
                  <div class="bg-white border border-amber-200 rounded-xl p-3 flex items-center gap-3">
                    <div class="flex-1 text-[11px]">
                      <p class="font-black">${r.name || '-'} <span class="text-neutral-400 font-bold ml-2">@${r.id || '-'}</span></p>
                      <p class="text-neutral-500 mt-0.5">📞 ${r.phone || '-'} · ${fmtTs(r.createdAt)}</p>
                      ${r.memo ? `<p class="text-neutral-400 text-[10px] mt-1">💬 ${r.memo}</p>` : ''}
                    </div>
                    <button onclick="markPwResetDone('${r.id}')" class="h-8 px-3 bg-green-500 text-white rounded-lg text-[10px] font-black hover:bg-green-600 transition-all">처리 완료</button>
                    <button onclick="markPwResetCancelled('${r.id}')" class="h-8 px-3 bg-neutral-200 text-neutral-500 rounded-lg text-[10px] font-black hover:bg-neutral-300 transition-all">취소</button>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
          <div class="bg-white border border-neutral-200 rounded-2xl p-4">
            <h3 class="text-sm font-black text-neutral-400 mb-3">처리 이력 (${done.length}건)</h3>
            ${done.length === 0 ? '<p class="text-[11px] text-neutral-300 text-center py-4">이력이 없습니다.</p>' : `
              <div class="space-y-1">
                ${done.slice(0, 30).map(r => `
                  <div class="text-[10px] text-neutral-400 py-1.5 border-b border-neutral-100 flex items-center justify-between">
                    <span>${r.name || '-'} (${r.id || '-'}) · ${r.phone || '-'}</span>
                    <span class="${r.status === 'done' ? 'text-green-500' : 'text-neutral-300'} font-black">${r.status === 'done' ? '처리완료' : '취소'} · ${fmtTs(r.createdAt)}</span>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    }

      } catch(e) { alert('처리 실패: ' + e.message); }

    async function markPwResetCancelled(id) {

        await updateDoc(doc(db, 'works_password_reset_requests', id), { status: 'cancelled', handledAt: serverTimestamp() });

    }

    async function saveOrgRNR(teamName) {
      // teamName이 id에서 인코딩되어 있어 직접 textarea[data-team] 조회
      const textareas = document.querySelectorAll('textarea[data-team]');
      let target = null;
      textareas.forEach(t => { if (t.dataset.team === teamName) target = t; });
      if (!target) { alert('편집 영역을 찾을 수 없습니다.'); return; }
      const lines = target.value.split('\n').map(s => s.trim()).filter(Boolean);
      if (lines.length === 0) { alert('최소 1줄의 R&R을 입력하세요. (기본값으로 되돌리려면 "기본값 복원" 버튼 사용)'); return; }
      try {
        const { db, doc, setDoc } = window.OSKA_DB;
        const newRNR = { ...(ACCOUNT_SETTINGS.orgRNR || {}), [teamName]: lines };
        ACCOUNT_SETTINGS.orgRNR = newRNR;
        await setDoc(doc(db, 'settings', 'config'), { orgRNR: newRNR }, { merge: true });
        renderApp();
        // 간단한 성공 피드백
        setTimeout(() => alert('✅ "' + teamName + '" R&R이 저장되었습니다.'), 50);
      } catch(e) { alert('저장 실패: ' + e.message); }
    }

    async function resetOrgRNR(teamName) {
      if (!confirm('"' + teamName + '" R&R을 기본값(코드 하드코딩)으로 되돌리시겠습니까?')) return;
      try {
        const { db, doc, setDoc } = window.OSKA_DB;
        const newRNR = { ...(ACCOUNT_SETTINGS.orgRNR || {}) };
        delete newRNR[teamName];
        ACCOUNT_SETTINGS.orgRNR = newRNR;
        await setDoc(doc(db, 'settings', 'config'), { orgRNR: newRNR }, { merge: true });
        renderApp();
      } catch(e) { alert('복원 실패: ' + e.message); }
    }

    async function saveASEmailRecipient() {
      const input = document.getElementById('asEmailRecipientInput');
      if (!input) return;
      const email = input.value.trim();
      // 간단한 이메일 형식 검증 (빈 값은 해제로 간주)
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('올바른 이메일 형식이 아닙니다.');
        return;
      }
      try {
        const { db, doc, setDoc } = window.OSKA_DB;
        ACCOUNT_SETTINGS.asEmailRecipient = email;
        await setDoc(doc(db, 'settings', 'config'), { asEmailRecipient: email }, { merge: true });
        renderApp();
        // 간단한 성공 표시
        const btn = event?.target;
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '✓ 저장됨';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        }
      } catch(e) { alert('저장 실패: ' + e.message); }
    }

    function bindEvents() {
      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', handleLogin);
        // 카테고리 버튼
        document.querySelectorAll('.login-cat-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.loginCategory = btn.dataset.category;
            state.loginError = '';
            render();
          });
        });
        const loginIdInput = document.getElementById('loginId');
        if (loginIdInput) loginIdInput.addEventListener('input', (e) => state.loginId = e.target.value);
        const loginPwInput = document.getElementById('loginPw');
        if (loginPwInput) loginPwInput.addEventListener('input', (e) => state.loginPw = e.target.value);
      }
      // 업체등록 요청
      if (document.getElementById('btnRegister')) document.getElementById('btnRegister').addEventListener('click', () => setState({ currentView: 'register' }));
      if (document.getElementById('btnBackToLogin')) document.getElementById('btnBackToLogin').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('btnBackToLogin2')) document.getElementById('btnBackToLogin2').addEventListener('click', () => setState({ currentView: 'dashboard', isLoggedIn: false }));
      if (document.getElementById('registerForm')) document.getElementById('registerForm').addEventListener('submit', submitRegistration);

      if (document.getElementById('logoutBtn')) document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      document.querySelectorAll('#logoHome').forEach(btn => btn.addEventListener('click', () => setState({ currentView: 'dashboard' })));
      if (document.getElementById('exitView')) document.getElementById('exitView').addEventListener('click', () => setState({ currentView: 'dashboard' }));
      if (document.getElementById('btnQuotation')) document.getElementById('btnQuotation').addEventListener('click', () => setState({currentView: 'quotation'}));
      if (document.getElementById('btnOrder')) document.getElementById('btnOrder').addEventListener('click', () => setState({ currentView: 'order' }));
      if (document.getElementById('btnDeck')) document.getElementById('btnDeck').addEventListener('click', () => setState({currentView: 'deck'}));
      if (document.getElementById('btnCatalog')) document.getElementById('btnCatalog').addEventListener('click', () => setState({currentView: 'catalog'}));
      document.querySelectorAll('#btnAsk').forEach(btn => btn.addEventListener('click', () => setState({currentView: 'ask'})));
      // AS견적은 OSKA Works 내부에서 접근
      if (document.getElementById('btnDeckBlocked')) document.getElementById('btnDeckBlocked').addEventListener('click', () => alert('권한이 없습니다.'));

      // 관리자 모드 이벤트
      if (document.getElementById('profileBtn')) document.getElementById('profileBtn').addEventListener('click', () => setState({ currentView: 'profile' }));
      if (document.getElementById('adminBtn')) document.getElementById('adminBtn').addEventListener('click', handleAdminEntry);
      if (document.getElementById('exitAdmin')) document.getElementById('exitAdmin').addEventListener('click', () => setState({ currentView: 'dashboard', editingArchiveIdx: -1 }));

      // 탭 전환
      document.querySelectorAll('.admin-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          setState({ adminTab: btn.dataset.tab, editingArchiveIdx: -1 });
          if (btn.dataset.tab === 'forms_approval') loadPendingForms();
        });
      });

      // 관리자 비밀번호 변경
      if (document.getElementById('btnChangeAdminPw')) {
        document.getElementById('btnChangeAdminPw').addEventListener('click', () => {
          const newPw = document.getElementById('newAdminPw').value.trim();
          changeAdminPassword(newPw);
        });
      }
      if (document.getElementById('btnChangeMasterPw')) {
        document.getElementById('btnChangeMasterPw').addEventListener('click', () => {
          const newPw = document.getElementById('newMasterPw').value.trim();
          if (newPw && confirm('마스터 비밀번호를 변경하시겠습니까?')) changeMasterPassword(newPw);
        });
      }

      // 계정 추가
      if (document.getElementById('btnAddAccount')) {
        document.getElementById('btnAddAccount').addEventListener('click', () => {
          const type = document.getElementById('newAccType').value;
          const name = document.getElementById('newAccName').value.trim();
          const pw = document.getElementById('newAccPw').value.trim();
          const manager = document.getElementById('newAccManager').value.trim();
          addAccount(name, pw, type, manager);
        });
      }

      // 담당자 변경
      document.querySelectorAll('.btn-change-manager').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.manager-change-input[data-name="${name}"]`);
          if (!input) return;
          const manager = input.value.trim();
          if (!manager) return showAdminMsg('담당자명을 입력하세요.', 'error');
          ACCOUNT_MANAGERS[name] = manager;
          const ok = await saveAccountManagers();
          showAdminMsg(ok ? `"${name}" 담당자가 "${manager}"(으)로 저장되었습니다.` : '저장 실패.', ok ? 'success' : 'error');
          render();
        });
      });

      // 비밀번호 변경
      document.querySelectorAll('.btn-change-pw').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.name;
          const input = document.querySelector(`.pw-change-input[data-name="${name}"]`);
          if (input) changePassword(name, input.value.trim());
        });
      });

      // 계정 삭제
      document.querySelectorAll('.btn-delete-acc').forEach(btn => {
        btn.addEventListener('click', () => deleteAccount(btn.dataset.name));
      });

      // 숨기기/표시 토글
      document.querySelectorAll('.btn-toggle-hidden').forEach(btn => {
        btn.addEventListener('click', () => toggleHidden(btn.dataset.name));
      });

      // 순서 위로/아래로
      document.querySelectorAll('.btn-move-up').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'up'));
      });
      document.querySelectorAll('.btn-move-down').forEach(btn => {
        btn.addEventListener('click', () => moveAccount(btn.dataset.name, 'down'));
      });

      // Archive 추가
      if (document.getElementById('btnAddArchive')) {
        document.getElementById('btnAddArchive').addEventListener('click', () => {
          const title = document.getElementById('newArcTitle').value.trim();
          const sub = document.getElementById('newArcSub').value.trim();
          const icon = document.getElementById('newArcIcon').value;
          const url = document.getElementById('newArcUrl').value.trim();
          addArchiveItem(title, sub, icon, url);
        });
      }

      // Archive 수정 진입
      document.querySelectorAll('.btn-edit-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: parseInt(btn.dataset.idx) }));
      });

      // Archive 수정 저장
      document.querySelectorAll('.btn-save-archive').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const title = document.getElementById('editArcTitle').value.trim();
          const sub = document.getElementById('editArcSub').value.trim();
          const icon = document.getElementById('editArcIcon').value;
          const url = document.getElementById('editArcUrl').value.trim();
          updateArchiveItem(idx, title, sub, icon, url);
        });
      });

      // Archive 수정 취소
      document.querySelectorAll('.btn-cancel-archive').forEach(btn => {
        btn.addEventListener('click', () => setState({ editingArchiveIdx: -1 }));
      });

      // Archive 삭제
      document.querySelectorAll('.btn-delete-archive').forEach(btn => {
        btn.addEventListener('click', () => deleteArchiveItem(parseInt(btn.dataset.idx)));
      });

      // 지사 관리 탭 이벤트
      if (document.getElementById('btnAddBranch')) {
        document.getElementById('btnAddBranch').addEventListener('click', () => {
          const type = document.getElementById('branchType').value;
          const name = document.getElementById('branchName').value.trim();
          const bizNum = document.getElementById('branchBizNum').value.trim();
          const address = document.getElementById('branchAddress').value.trim();
          const email = document.getElementById('branchEmail').value.trim();
          const phone = document.getElementById('branchPhone').value.trim();
          const owner = document.getElementById('branchOwner').value.trim();
          addBranch(name, type, bizNum, address, email, phone, owner);
        });
      }

      // 담당자 관리 펼치기/접기
      document.querySelectorAll('.btn-toggle-branch').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          if (state.expandedBranch === branchName) {
            setState({ expandedBranch: null });
          } else {
            setState({ expandedBranch: branchName });
          }
        });
      });

      // 담당자 추가
      document.querySelectorAll('.btn-add-staff').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          const staffId = document.querySelector(`.staff-id[data-branch="${branchName}"]`).value.trim();
          const staffPw = document.querySelector(`.staff-pw[data-branch="${branchName}"]`).value;
          const staffName = document.querySelector(`.staff-name[data-branch="${branchName}"]`).value.trim();
          const staffPhone = document.querySelector(`.staff-phone[data-branch="${branchName}"]`).value.trim();
          const staffEmail = document.querySelector(`.staff-email[data-branch="${branchName}"]`).value.trim();
          addStaff(branchName, staffId, staffPw, staffName, staffPhone, staffEmail);
        });
      });

      // 담당자 삭제
      document.querySelectorAll('.btn-delete-staff').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          const staffIdx = parseInt(btn.dataset.idx);
          deleteStaff(branchName, staffIdx);
        });
      });

      // 지사 삭제
      document.querySelectorAll('.btn-delete-branch').forEach(btn => {
        btn.addEventListener('click', () => {
          const branchName = btn.dataset.branch;
          deleteBranch(branchName);
        });
      });
    }

    // Service Worker 등록 (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    window.onload = loadSecureConfig;
  </script>
</body>
</html>
