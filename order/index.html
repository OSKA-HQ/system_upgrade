    async function importAdditionalInquiries() {
      if (!confirm('추가문의 53건을 Firestore에 임포트합니다.\n기존 데이터와 중복 여부(no 기준)를 확인 후 진행합니다.\n계속하시겠습니까?')) return;
      const btn = document.getElementById('additionalImportBtn');
      if (btn) { btn.disabled = true; btn.textContent = '임포트 중...'; }

      try {
        const data = ADDITIONAL_INQUIRIES;
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;

        // 기존 no 목록으로 중복 체크
        const existingNos = new Set(customers.map(c => c.no));
        const newRecords = data.filter(r => !existingNos.has(r.no));

        if (newRecords.length === 0) {
          alert('모든 데이터가 이미 존재합니다. 임포트할 신규 건이 없습니다.');
          if (btn) { btn.disabled = false; btn.textContent = '추가문의 임포트'; }
          return;
        }

        let imported = 0;
        const total = newRecords.length;
        const CHUNK = 20;

        for (let i = 0; i < total; i += CHUNK) {
          const slice = newRecords.slice(i, i + CHUNK);
          const promises = slice.map(record => {
            return addDoc(collection(db, 'crm_customers'), {
              ...record,
              createdAt: serverTimestamp()
            });
          });
          await Promise.all(promises);
          imported += slice.length;
          if (btn) btn.textContent = imported + '/' + total + ' (' + Math.round(imported/total*100) + '%)';
        }

        alert('임포트 완료! ' + imported + '건 저장됨 (중복 ' + (data.length - newRecords.length) + '건 제외)');
        if (btn) { btn.textContent = '완료'; btn.disabled = true; }
      } catch(e) {
        console.error('Additional import error:', e);
        alert('임포트 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = '추가문의 임포트'; }
      }
    }

    // 지사이관 + 지역 오타 동기화 (Firestore 기존 데이터 업데이트)
    /* ── 고객정리 (1년 경과 데이터 아카이빙) ── */
    /* ── 고객정리 패널 (탭: 정리대상 / 정리완료) ── */
    let _archiveCache = []; // 정리완료 고객 캐시

    async function openArchivePanel(tab) {
      tab = tab || 'pending';
      const now = new Date();
      const cutoff = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      // 날짜 판정 헬퍼: date 필드(실제 문의일) 우선, 없으면 createdAt
      const getCustDate = (c) => {
        if (c.date) return c.date;
        if (c.createdAt?.seconds) return new Date(c.createdAt.seconds * 1000).toISOString().slice(0, 10);
        return null;
      };

      // 고객 단위 보호: 같은 전화번호로 1년 이내 기록이 하나라도 있으면 전체 보호
      const activePhones = new Set();
      customers.forEach(c => {
        const phone = (c.phone || '').replace(/-/g, '');
        if (!phone) return;
        const d = getCustDate(c);
        if (d && d >= cutoffStr) activePhones.add(phone);
      });

      const oldCustomers = customers.filter(c => {
        const d = getCustDate(c);
        if (!d || d >= cutoffStr) return false;
        const phone = (c.phone || '').replace(/-/g, '');
        if (phone && activePhones.has(phone)) return false;
        return true;
      });

      // 정리완료 탭이면 아카이브 데이터 로드
      if (tab === 'done') {
        try {
          const { db, collection, getDocs } = window.WORKS_DB;
          const snap = await getDocs(collection(db, 'crm_customers_archive'));
          _archiveCache = [];
          snap.forEach(d => _archiveCache.push({ id: d.id, ...d.data() }));
          _archiveCache.sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));
        } catch(e) { console.error('Archive load error:', e); _archiveCache = []; }
      }

      const existing = document.getElementById('archiveOverlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'archiveOverlay';
      overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      const pendingTabCls = tab === 'pending' ? 'border-b-2 border-purple-500 text-purple-600' : 'text-neutral-400 hover:text-neutral-600';
      const doneTabCls = tab === 'done' ? 'border-b-2 border-purple-500 text-purple-600' : 'text-neutral-400 hover:text-neutral-600';

      const tableHeader = `<thead class="bg-neutral-50 sticky top-0"><tr>
        <th class="text-left p-2 font-bold text-neutral-400">No</th>
        <th class="text-left p-2 font-bold text-neutral-400">등록일</th>
        <th class="text-left p-2 font-bold text-neutral-400">연락처</th>
        <th class="text-left p-2 font-bold text-neutral-400">채널</th>
        <th class="text-left p-2 font-bold text-neutral-400">지역</th>
        ${tab === 'done' ? '<th class="text-left p-2 font-bold text-neutral-400">정리일</th>' : ''}
      </tr></thead>`;

      let tableBody = '';
      let actionArea = '';

      if (tab === 'pending') {
        if (oldCustomers.length > 0) {
          tableBody = oldCustomers.slice(0, 100).map(c => `<tr class="border-t border-neutral-100">
            <td class="p-2">${c.no || '-'}</td>
            <td class="p-2">${c.date || (c.createdAt?.seconds ? new Date(c.createdAt.seconds * 1000).toISOString().slice(0, 10) : '-')}</td>
            <td class="p-2">${(c.phone || '').replace(/(\d{3})(\d{4})(\d{4})/, '$1-****-$3')}</td>
            <td class="p-2">${c.channel || '-'}</td>
            <td class="p-2">${c.province || ''} ${c.district || ''}</td>
          </tr>`).join('') + (oldCustomers.length > 100 ? `<tr><td colspan="5" class="p-2 text-center text-neutral-400">... 외 ${oldCustomers.length - 100}건</td></tr>` : '');
          actionArea = `<button onclick="executeArchive('${cutoffStr}')" id="archiveExecBtn" class="w-full h-11 bg-purple-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <i data-lucide="archive" class="w-3.5 h-3.5"></i> ${oldCustomers.length}건 아카이브 실행
          </button>`;
        } else {
          tableBody = '';
          actionArea = `<div class="text-center py-8">
            <i data-lucide="check-circle" class="w-12 h-12 text-green-400 mx-auto mb-3"></i>
            <p class="text-[11px] font-bold text-green-600">정리할 데이터가 없습니다</p>
            <p class="text-[9px] text-neutral-400 mt-1">모든 고객이 1년 이내 활동 이력이 있습니다</p>
          </div>`;
        }
      } else if (tab === 'done') {
        if (_archiveCache.length > 0) {
          tableBody = _archiveCache.slice(0, 100).map(c => `<tr class="border-t border-neutral-100">

    async function executeArchive(cutoffStr) {
      if (!confirm(`${cutoffStr} 이전 등록 고객 중 최근 활동 없는 고객을 아카이브로 이동합니다.\n이 작업은 되돌릴 수 없습니다. 진행하시겠습니까?`)) return;

      const btn = document.getElementById('archiveExecBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 처리 중...'; }

      try {
        const { db, collection, addDoc, doc, deleteDoc, getDocs } = window.WORKS_DB;
        const cutoff = new Date(cutoffStr + 'T00:00:00');

        const snap = await getDocs(collection(db, 'crm_customers'));
        const allDocs = [];
        snap.forEach(d => allDocs.push({ id: d.id, data: d.data() }));

        // 날짜 판정: date 필드 우선
        const getDocDate = (data) => {
          if (data.date) return data.date;
          if (data.createdAt?.seconds) return new Date(data.createdAt.seconds * 1000).toISOString().slice(0, 10);
          return null;
        };

        // 고객 단위 보호
        const recentPhones = new Set();
        allDocs.forEach(({ data }) => {
          const phone = (data.phone || '').replace(/-/g, '');
          if (!phone) return;
          const d = getDocDate(data);
          if (d && d >= cutoffStr) recentPhones.add(phone);
        });

        const toArchive = allDocs.filter(({ data }) => {
          const d = getDocDate(data);
          if (!d || d >= cutoffStr) return false;
          const phone = (data.phone || '').replace(/-/g, '');
          if (phone && recentPhones.has(phone)) return false;
          return true;
        });

        // 이미 아카이브된 원본 ID 목록 수집 (중복 방지)
        const existingArchiveSnap = await getDocs(collection(db, 'crm_customers_archive'));
        const archivedOriginalIds = new Set();
        existingArchiveSnap.forEach(d => {
          const origId = d.data().originalDocId;
          if (origId) archivedOriginalIds.add(origId);
        });

        const CHUNK = 20;
        let moved = 0;
        let skipped = 0;
        for (let i = 0; i < toArchive.length; i += CHUNK) {
          const slice = toArchive.slice(i, i + CHUNK);
          await Promise.all(slice.map(async ({ id, data }) => {
            try {
              if (archivedOriginalIds.has(id)) {
                // 이미 아카이브에 있으면 원본만 삭제
                await deleteDoc(doc(db, 'crm_customers', id));
                skipped++;
              } else {
                await addDoc(collection(db, 'crm_customers_archive'), {
                  ...data, archivedAt: new Date().toISOString(), originalDocId: id
                });
                await deleteDoc(doc(db, 'crm_customers', id));
              }
              moved++;
            } catch(err) {
              console.warn('아카이브 건너뜀:', id, err.message);
              moved++;
            }
          }));
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${moved}/${toArchive.length}`;
        }

        alert(`✅ 고객정리 완료!\n${moved}건이 아카이브로 이동되었습니다.`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Archive error:', e);
        alert('고객정리 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="archive" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    /* ── 자동 복원: 새 문의 등록 시 같은 전화번호의 아카이브 데이터 자동 복원 ── */
    async function restoreArchivedByPhone(phone) {
      if (!phone) return 0;
      const cleanPhone = phone.replace(/-/g, '');
      try {
        const { db, collection, addDoc, doc, deleteDoc, getDocs, serverTimestamp } = window.WORKS_DB;
        const snap = await getDocs(collection(db, 'crm_customers_archive'));
        const toRestore = [];
        snap.forEach(d => {
          const data = d.data();
          const archPhone = (data.phone || '').replace(/-/g, '');
          if (archPhone === cleanPhone) toRestore.push({ id: d.id, data });
        });
        if (toRestore.length === 0) return 0;

        for (const { id, data } of toRestore) {
          const { archivedAt, originalDocId, ...restoreData } = data;
          await addDoc(collection(db, 'crm_customers'), {
            ...restoreData, restoredAt: new Date().toISOString(), restoredFrom: 'archive'
          });
          await deleteDoc(doc(db, 'crm_customers_archive', id));
        }
        return toRestore.length;
      } catch(e) { console.error('Restore error:', e); return 0; }
    }

    /* ── 과거 데이터 임포트 (2020~2024) ── */
    async function importLegacyData() {
      if (!confirm('2020~2024년 과거 문의 데이터 11,250건을 CRM에 추가합니다.\n\n⚠ 이전에 중단된 임포트 데이터가 있으면 자동으로 정리 후 다시 시작합니다.\n시간이 3~5분 소요될 수 있습니다. 진행하시겠습니까?')) return;

      const btn = document.getElementById('legacyImportBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 준비 중...'; }

      try {
        const { db, collection, addDoc, getDocs, doc, deleteDoc, serverTimestamp } = window.WORKS_DB;

        // 1단계: 이전 임포트 데이터 정리 (2024년 이전 날짜 + createdAt이 오늘인 문서 = 레거시 임포트 데이터)
        if (btn) btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 기존 데이터 정리 중...';
        const snap = await getDocs(collection(db, 'crm_customers'));
        const toDelete = [];
        const today = new Date().toISOString().slice(0, 10);
        snap.forEach(d => {
          const data = d.data();
          // 레거시 데이터 판별: date가 2025년 이전 + brand가 OSKA + createdAt이 오늘
          if (data.brand === 'OSKA' && data.date && data.date < '2025-01-01') {
            const createdDate = data.createdAt?.seconds
              ? new Date(data.createdAt.seconds * 1000).toISOString().slice(0, 10)
              : '';
            if (createdDate === today) {
              toDelete.push(d.id);
            }
          }
        });

        if (toDelete.length > 0) {
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${toDelete.length}건 정리 중...`;
          const DEL_CHUNK = 50;
          for (let i = 0; i < toDelete.length; i += DEL_CHUNK) {
            const slice = toDelete.slice(i, i + DEL_CHUNK);
            await Promise.all(slice.map(id => deleteDoc(doc(db, 'crm_customers', id))));
            if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 정리 ${Math.min(i + DEL_CHUNK, toDelete.length)}/${toDelete.length}`;
          }
        }

        // 2단계: JSON 로드 및 임포트
        if (btn) btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 데이터 로딩...';
        const resp = await fetch('../crm_import_legacy.json');
        const data = await resp.json();

        // 기존 최대 no 값 가져오기 (정리 후 다시 계산)
        const freshSnap = await getDocs(collection(db, 'crm_customers'));
        let maxNo = 0;
        freshSnap.forEach(d => {
          const no = d.data().no || 0;
          if (no > maxNo) maxNo = no;
        });

        let imported = 0;
        const total = data.length;
        const CHUNK = 50;

        for (let i = 0; i < total; i += CHUNK) {
          const slice = data.slice(i, i + CHUNK);
          const promises = slice.map(record => {
            maxNo++;
            return addDoc(collection(db, 'crm_customers'), {
              ...record,
              no: maxNo,
              createdAt: serverTimestamp()
            });
          });
          await Promise.all(promises);
          imported += slice.length;
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${imported}/${total} (${Math.round(imported/total*100)}%)`;
        }

        alert(`✅ 임포트 완료!\n${toDelete.length > 0 ? `기존 ${toDelete.length}건 정리 후 ` : ''}${imported}건 추가됨\n\n고객정리를 실행하면 1년 경과 데이터가 자동으로 아카이브됩니다.`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Legacy import error:', e);
        alert('임포트 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="upload" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    /* ── 중복 데이터 정리 ── */
    async function deduplicateLegacyData() {
      if (!confirm('레거시 임포트로 인한 중복 데이터를 정리합니다.\n\n같은 날짜 + 같은 전화번호를 가진 레코드 중 최신 1건만 남기고 나머지를 삭제합니다.\n\n진행하시겠습니까?')) return;

      const btn = document.getElementById('dedupBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 분석 중...'; }

      try {
        const { db, collection, getDocs, doc, deleteDoc } = window.WORKS_DB;
        const snap = await getDocs(collection(db, 'crm_customers'));

        // 레거시 데이터만 추출 (brand=OSKA, date<2025)
        const legacyDocs = [];
        snap.forEach(d => {
          const data = d.data();
          if (data.brand === 'OSKA' && data.date && data.date < '2025-01-01') {
            legacyDocs.push({ id: d.id, ...data });
          }
        });

        // date+phone 기준 그루핑
        const groups = {};
        legacyDocs.forEach(d => {
          const key = (d.date || '') + '|' + (d.phone || '').replace(/-/g, '');
          if (!groups[key]) groups[key] = [];
          groups[key].push(d);
        });

        // 중복 찾기: 그룹에 2개 이상이면 최신 1개 빼고 삭제 대상
        const toDelete = [];
        Object.values(groups).forEach(group => {
          if (group.length > 1) {
            // createdAt 기준 정렬 (최신이 앞으로)
            group.sort((a, b) => {
              const aTime = a.createdAt?.seconds || 0;
              const bTime = b.createdAt?.seconds || 0;
              return bTime - aTime;
            });
            // 첫 번째(최신) 빼고 나머지 삭제
            for (let i = 1; i < group.length; i++) {
              toDelete.push(group[i].id);
            }
          }
        });

        if (toDelete.length === 0) {
          alert('중복 데이터가 없습니다. 정상 상태입니다.');
          if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 중복 데이터 정리'; }
          return;
        }

        if (!confirm(`${toDelete.length}건의 중복 데이터를 발견했습니다.\n삭제하시겠습니까?`)) {
          if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 중복 데이터 정리'; }
          return;
        }

        const DEL_CHUNK = 50;
        for (let i = 0; i < toDelete.length; i += DEL_CHUNK) {
          const slice = toDelete.slice(i, i + DEL_CHUNK);
          await Promise.all(slice.map(id => deleteDoc(doc(db, 'crm_customers', id))));
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 삭제 ${Math.min(i + DEL_CHUNK, toDelete.length)}/${toDelete.length}`;
        }

        alert(`✅ 중복 정리 완료!\n${toDelete.length}건 삭제됨\n\n레거시 데이터 ${legacyDocs.length - toDelete.length}건 유지`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Dedup error:', e);
        alert('중복 정리 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    /* ── 엑셀 다운로드 (관리고객 + 정리고객 2시트) ── */
    async function downloadArchiveExcel() {
      const { db, collection, getDocs } = window.WORKS_DB;
      // 정리완료 데이터 로드
      let archived = _archiveCache;

          snap.forEach(d => archived.push({ id: d.id, ...d.data() }));
        } catch(e) { console.error(e); }
      }

      const mapRow = (c) => ({
        'No': c.no || '', '구분': c.brand || '', '날짜': c.date || '',
        '문의채널': c.channel || '', '개인정보 동의': c.consent || '',
        '전화번호': c.phone || '', '이메일': c.email || '',
        '제품군': c.product || '', '구분(개인/업체)': c.custType || '',
        '등급': c.grade2 || c.grade || '', '상담내용': c.content || '',
        '도/광역시': c.province || '', '시/군': c.district || '',
        '주소': c.address || '', '지사배정': c.assignedBranch || ''
      });
      const colWidths = [6,8,12,10,10,14,20,10,10,8,40,10,10,25,10];

      const ws1 = XLSX.utils.json_to_sheet(customers.map(mapRow));
      ws1['!cols'] = colWidths.map(w => ({ wch: w }));

      const archRows = archived.map(c => ({ ...mapRow(c), '정리일': (c.archivedAt || '').slice(0, 10) }));
      const ws2 = XLSX.utils.json_to_sheet(archRows);
      ws2['!cols'] = [...colWidths, 12].map(w => ({ wch: w }));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws1, '관리고객');
      XLSX.utils.book_append_sheet(wb, ws2, '정리고객');
      XLSX.writeFile(wb, `CRM_전체_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    async function openCustomerHistory(phone, docId) {
      const hasPhone = phone && phone !== '-' && phone.trim() !== '';
      const phoneNorm = hasPhone ? phone.replace(/[^0-9]/g, '') : '';

      let records = [];

      if (hasPhone) {
        // 전화번호가 있으면 같은 번호 전체 검색
        records = customers.filter(c => c.phone && c.phone.replace(/[^0-9]/g, '') === phoneNorm);

        // 아카이브 컬렉션에서도 검색
        try {
          const { db, collection, query, where, getDocs } = window.WORKS_DB;
          if (db) {
            const archiveSnap = await getDocs(collection(db, 'crm_customers_archive'));
            archiveSnap.forEach(doc => {
              const d = doc.data();
              if (d.phone && d.phone.replace(/[^0-9]/g, '') === phoneNorm) {
                records.push({ ...d, id: doc.id, _archived: true });
              }
            });
          }
        } catch (e) { console.log('아카이브 조회:', e); }
      } else if (docId) {
        // 전화번호가 없으면 해당 건 1건만 표시
        const single = customers.find(c => c.id === docId);
        if (single) records = [single];
      }

      records.sort((a, b) => {
        const da = a.date || ''; const db2 = b.date || '';
        return db2.localeCompare(da);
      });
      if (records.length === 0) { alert('고객 정보를 찾을 수 없습니다.'); return; }
      const rep = records[0];
      const totalInquiries = records.length;
      const products = [...new Set(records.flatMap(r => (r.product || '').split(',').map(p => p.trim()).filter(Boolean)))];
      const channels = [...new Set(records.map(r => r.channel).filter(Boolean))];
      const grades = records.map(r => r.grade2).filter(g => CRM_GRADES.includes(g));
      const latestGrade = grades.length > 0 ? grades[0] : '-';
      const gradeClass = CRM_GRADE_COLORS[latestGrade] || 'bg-neutral-50 text-neutral-400 border-neutral-200';
      const dotClass = CRM_GRADE_DOT[latestGrade] || 'bg-neutral-300';

      const panel = document.createElement('div');
      panel.id = 'customerHistoryPanel';
      panel.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm';

    async function saveEditPanel() {
      if (!editingCustomerId) return;
      try {
        const { db, doc, updateDoc, serverTimestamp } = window.WORKS_DB;
        const grade = document.getElementById('editGrade').value;
        const dateVal = document.getElementById('editDate').value;
        const dateObj = dateVal ? new Date(dateVal) : null;
        const yearStr = dateObj ? dateObj.getFullYear() + '년' : '';
        const monthStr = dateObj ? (dateObj.getMonth() + 1) + '월' : '';
        const checkedProducts = document.querySelectorAll('input[name="editProductCheck"]:checked');
        const productStr = Array.from(checkedProducts).map(cb => cb.value).join(', ');
        const updates = {
          brand: document.getElementById('editBrand').value,
          date: dateVal,
          year: yearStr,
          month: monthStr,
          channel: document.getElementById('editChannel').value,
          consent: document.getElementById('editConsent').value,
          phone: document.getElementById('editPhone').value.trim(),
          email: document.getElementById('editEmail').value.trim(),
          custType: document.getElementById('editCustType').value,
          grade2: grade,
          grade: grade || '일반',
          province: document.getElementById('editProvince').value,
          district: document.getElementById('editDistrict').value,
          address: document.getElementById('editAddress').value.trim(),
          assignedBranch: document.getElementById('editBranch').value,
          product: productStr,
          content: document.getElementById('editContent').value.trim(),
          updatedAt: serverTimestamp()
        };
        // 미배정 고객에게 지사배정 또는 등급을 부여하면 배정완료 처리
        const editTarget = customers.find(x => x.id === editingCustomerId);
        if (editTarget && editTarget.status === '미배정') {
          if (updates.assignedBranch || updates.grade2) {
            updates.status = '배정완료';
          }
        }
        await updateDoc(doc(db, 'crm_customers', editingCustomerId), updates);
        closeEditPanel();
      } catch(e) {
        console.error('Edit save error:', e);
        alert('저장 실패: ' + e.message);
      }
    }

    // ===== 생산 단계 클릭 변경 (본사 전용) =====
    async function advanceStage(orderId, stageName, stageIdx) {
      if (currentType !== 'hq') return;

      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      const ps = order.productionStages || {};
      const currentStatus = (ps[stageName] || {}).status || 'pending';

      // 다음 상태 결정: pending → in-progress → completed → pending (토글)
      let nextStatus, actionLabel;
      if (currentStatus === 'pending') {
        nextStatus = 'in-progress';
        actionLabel = `${stageName} 진행중으로 변경`;
      } else if (currentStatus === 'in-progress') {
        nextStatus = 'completed';
        actionLabel = `${stageName} 완료`;
      } else {
        nextStatus = 'pending';
        actionLabel = `${stageName} 대기로 되돌림`;
      }

      // 출고 단계 완료 시 특별 확인
      if (stageName === '출고' && nextStatus === 'completed') {
        if (!confirm(`출고 완료 처리하시겠습니까?\n${order.branch}에 출고준비 완료 알림이 발송됩니다.`)) return;
      } else {
        if (!confirm(`${actionLabel} 하시겠습니까?`)) return;
      }

      const operator = currentBranch ? `${currentBranch} ${currentManager}` : `본사 ${currentManager || '관리자'}`;
      const now = new Date();
      const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      // 로그 메시지 생성
      let logMsg = `${operator}님이 [${stageName}] ${nextStatus === 'completed' ? '완료' : nextStatus === 'in-progress' ? '진행중' : '대기'} 하였습니다.`;

      try {
        const { db, doc, updateDoc, serverTimestamp, arrayUnion } = window.WORKS_DB;

        // 단계 상태 업데이트
        ps[stageName] = {
          status: nextStatus,
          completedDate: nextStatus === 'completed' ? dateStr : (ps[stageName]?.completedDate || ''),
          comment: nextStatus === 'completed' ? `${operator} 완료 처리` : (ps[stageName]?.comment || '')
        };

        // 출고 완료 시: 다음 단계(완료) 자동 in-progress + 알림 로그
        if (stageName === '출고' && nextStatus === 'completed') {
          ps['완료'] = { ...(ps['완료'] || {}), status: 'in-progress' };
          logMsg += ` → ${order.branch}에 출고준비 완료 알림 발송됨.`;
        }

        // Firestore 업데이트
        const updateData = {
          productionStages: ps,
          updatedAt: serverTimestamp()
        };

        // 로그 배열에 추가 (arrayUnion 사용 가능 시)
        const logEntry = { date: dateStr, message: logMsg, operator, stage: stageName, action: nextStatus };

        // stageLogs 배열 업데이트
        const existingLogs = order.stageLogs || [];
        existingLogs.push(logEntry);
        updateData.stageLogs = existingLogs;

        await updateDoc(doc(db, 'works_orders', orderId), updateData);

        // 출고 완료 시 알림 표시
        if (stageName === '출고' && nextStatus === 'completed') {
          alert(`출고 완료 처리되었습니다!\n\n📦 ${order.branch} (${order.manager})에게\n출고준비 완료 알림이 발송되었습니다.\n\n현장: ${order.siteName}\n발주번호: ${order.orderNumber}`);
        }

        render();
      } catch(e) {
        console.error('Stage advance error:', e);
        alert('단계 변경 실패: ' + e.message);
      }
    }

    function openAddSchedule() {
      scheduleModalOpen = true;
      document.getElementById('scheduleModal').classList.remove('hidden');
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('scheduleStartDate').value = today;
      document.getElementById('scheduleEndDate').value = today;
    }

      scheduleModalOpen = false;
      document.getElementById('scheduleModal').classList.add('hidden');

    async function saveSchedule() {
      const title = document.getElementById('scheduleTitle').value;
      const type = document.getElementById('scheduleType').value;
      const startDate = document.getElementById('scheduleStartDate').value;
      const endDate = document.getElementById('scheduleEndDate').value;
      const description = document.getElementById('scheduleDescription').value;

      if (!title || !startDate || !endDate) { alert('필수 항목을 입력하세요.'); return; }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        await addDoc(collection(db, 'works_schedules'), {
          title, type, startDate, endDate, description,
          createdBy: currentBranch || '본사',
          createdAt: serverTimestamp()
        });
        closeAddSchedule();
        alert('일정이 등록되었습니다.');
      } catch(e) { console.error('Schedule save error:', e); alert('일정 등록 실패'); }
    }

    async function deleteSchedule(id) {
      if (!confirm('이 일정을 삭제하시겠습니까?')) return;
      try {
        const { db, doc, deleteDoc } = window.WORKS_DB;
        await deleteDoc(doc(db, 'works_schedules', id));

      const startDate = document.getElementById('leaveStartDate').value;
      const endDate = document.getElementById('leaveEndDate').value;
      const reason = document.getElementById('leaveReason').value;

      if (!applicant || !startDate || !endDate || !reason) { alert('필수 항목을 입력하세요.'); return; }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        await addDoc(collection(db, 'works_leave_requests'), {
          applicant, type, startDate, endDate, reason,
          status: '대기',
          createdAt: serverTimestamp()
        });
        closeLeaveRequest();
        alert('신청이 등록되었습니다.');
      } catch(e) { console.error('Leave save error:', e); alert('신청 등록 실패'); }
    }

    async function approveLeave(id) {
      if (!confirm('이 신청을 승인하시겠습니까?')) return;
      try {
        const { db, doc, updateDoc } = window.WORKS_DB;
        await updateDoc(doc(db, 'works_leave_requests', id), {
          status: '승인',
          approvedBy: currentManager || '본사',
          approvedAt: new Date().toISOString()
        });
      } catch(e) { console.error('Approve error:', e); alert('승인 실패'); }
    }

    async function rejectLeave(id) {
      if (!confirm('이 신청을 반려하시겠습니까?')) return;
      try {
        const { db, doc, updateDoc } = window.WORKS_DB;
        await updateDoc(doc(db, 'works_leave_requests', id), {
          status: '반려',
          approvedBy: currentManager || '본사',
          approvedAt: new Date().toISOString()
        });
      } catch(e) { console.error('Reject error:', e); alert('반려 실패'); }
    }

    // ===== HR DOCS 문서 관련 함수 =====
    function openHRDocForm(type) {
      const modal = document.getElementById('hrDocModal');
      if (!modal) return;
      modal.classList.remove('hidden');
      const titleEl = document.getElementById('hrDocModalTitle');
      const typeEl = document.getElementById('hrDocType');
      const dateEl = document.getElementById('hrDocDate');
      if (titleEl) titleEl.textContent = type + ' 작성';
      if (typeEl) typeEl.value = type;
      if (dateEl) dateEl.value = new Date().toISOString().split('T')[0];
      lucide.createIcons();
    }

    function closeHRDocForm() {
      const modal = document.getElementById('hrDocModal');
      if (modal) modal.classList.add('hidden');
    }

    async function saveHRDoc() {
      const author = document.getElementById('hrDocAuthor')?.value;
      const docType = document.getElementById('hrDocType')?.value;
      const target = document.getElementById('hrDocTarget')?.value;
      const date = document.getElementById('hrDocDate')?.value;
      const title = document.getElementById('hrDocTitle')?.value;
      const content = document.getElementById('hrDocContent')?.value;

      if (!author || !docType || !title || !content) { alert('필수 항목을 입력하세요.'); return; }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        await addDoc(collection(db, 'works_hr_docs'), {
          author, docType, target: target || '', date, title, content,
          status: '등록',
          createdAt: serverTimestamp()
        });
        closeHRDocForm();
        alert(docType + '이(가) 저장되었습니다.');
      } catch(e) { console.error('HR Doc save error:', e); alert('저장 실패'); }
    }

    // ===== Showroom Reservation (쇼룸예약 관리) =====
    function renderShowroomMgmt() {
      const statusColor = {
        '예약요청': 'bg-blue-100 text-blue-700 border-blue-300',
        '확정': 'bg-purple-100 text-purple-700 border-purple-300',
        '방문완료': 'bg-green-100 text-green-700 border-green-300',
        '취소': 'bg-gray-100 text-gray-700 border-gray-300'
      };

      const filteredReservations = showroomFilter === '전체'
        ? showroomReservations
        : showroomReservations.filter(r => r.showroom === showroomFilter);

      const showrooms = [...new Set(showroomReservations.map(r => r.showroom || '기본'))];

      return `
        <div class="min-h-screen bg-white animate-fade-in">
          ${renderNav()}
          <main class="pt-20 pb-20 max-w-6xl mx-auto px-6">
            <div class="flex items-center justify-between mb-6">
              <h1 class="text-3xl font-black tracking-tighter">쇼룸예약 관리</h1>
              <button onclick="navigate('home')" class="text-neutral-400 hover:text-black transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
              </button>
            </div>

            <!-- 필터 -->
            <div class="bg-white border border-neutral-200 rounded-xl p-4 mb-6 flex gap-2">
              <select id="showroomFilter" class="input-base" onchange="updateShowroomFilter(this.value)">
                <option value="전체">전체 쇼룸</option>
                ${showrooms.map(s => `<option value="${s}">${s}</option>`).join('')}
              </select>
            </div>

            <!-- 예약 테이블 -->
            <div class="bg-white border border-neutral-200 rounded-xl overflow-hidden">
              <table class="w-full text-[11px]">
                <thead class="bg-neutral-50 border-b border-neutral-200">
                  <tr>
                    <th class="px-4 py-3 text-left font-black">쇼룸</th>
                    <th class="px-4 py-3 text-left font-black">예약일시</th>
                    <th class="px-4 py-3 text-left font-black">고객명</th>
                    <th class="px-4 py-3 text-left font-black">연락처</th>
                    <th class="px-4 py-3 text-left font-black">관심제품</th>
                    <th class="px-4 py-3 text-left font-black">상태</th>
                    <th class="px-4 py-3 text-center font-black">액션</th>
                  </tr>
                </thead>
                <tbody>
                  ${filteredReservations.length > 0 ? filteredReservations.map(res => `
                    <tr class="border-b border-neutral-100 hover:bg-neutral-50 transition-colors">
                      <td class="px-4 py-3">${res.showroom || '기본'}</td>
                      <td class="px-4 py-3">${formatDate(res.date)} ${res.time || ''}</td>
                      <td class="px-4 py-3 font-black">${res.name}</td>
                      <td class="px-4 py-3">${res.phone}</td>
                      <td class="px-4 py-3 text-[10px]">${res.products || '-'}</td>
                      <td class="px-4 py-3">
                        <select class="text-[10px] px-2 py-1 rounded border ${statusColor[res.status] || statusColor['예약요청']}" onchange="updateReservationStatus('${res.id}', this.value)">
                          <option value="예약요청" ${res.status === '예약요청' ? 'selected' : ''}>예약요청</option>
                          <option value="확정" ${res.status === '확정' ? 'selected' : ''}>확정</option>
                          <option value="방문완료" ${res.status === '방문완료' ? 'selected' : ''}>방문완료</option>
                          <option value="취소" ${res.status === '취소' ? 'selected' : ''}>취소</option>
                        </select>
                      </td>
                      <td class="px-4 py-3 text-center">
                        <button onclick="deleteReservation('${res.id}')" class="text-neutral-300 hover:text-red-500 transition-colors">
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </td>
                    </tr>
                  `).join('') : `
                    <tr><td colspan="7" class="px-4 py-8 text-center text-neutral-300 text-[10px]">예약이 없습니다.</td></tr>
                  `}
                </tbody>
              </table>
            </div>

            <!-- 메모 -->
            <div class="mt-6 bg-neutral-50 border border-neutral-200 rounded-xl p-4">
              <p class="text-[10px] text-neutral-500">
                <i data-lucide="info" class="w-4 h-4 inline mr-2"></i>
                상태 변경: 예약요청 → 확정 → 방문완료 → 취소
              </p>
            </div>
          </main>
          ${renderFooter()}
        </div>
      `;
    }

    function updateShowroomFilter(value) {
      showroomFilter = value;
      render();
    }

    async function updateReservationStatus(id, status) {
      try {
        const { db, doc, updateDoc } = window.WORKS_DB;
        await updateDoc(doc(db, 'showroom_reservations', id), { status });
      } catch(e) { console.error('Status update error:', e); alert('상태 업데이트 실패'); }
    }

    async function deleteReservation(id) {
      if (!confirm('이 예약을 삭제하시겠습니까?')) return;
      try {
        const { db, doc, deleteDoc } = window.WORKS_DB;
        await deleteDoc(doc(db, 'showroom_reservations', id));
      } catch(e) { console.error('Delete error:', e); alert('삭제 실패'); }
    }

    // ===== 초기화 =====
    document.addEventListener('DOMContentLoaded', () => {
      initFromURL();
      // Firestore 준비 대기
      const waitDB = setInterval(() => {
        if (window.WORKS_DB) {
          clearInterval(waitDB);
          subscribeOrders();
          subscribeNotices();
          subscribeCustomers();
          subscribeSchedules();
          subscribeLeaveRequests();
          subscribeShowroomReservations();
          render();
        }
      }, 100);
    });
  </script>
</body>
</html>
