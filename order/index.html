    // ===== URL 파라미터 =====
    function initFromURL() {
      try {
        const params = new URLSearchParams(window.location.search);
        currentBranch = params.get('branch') || '';
        currentManager = params.get('manager') || '';
        const typesRaw = params.get('types');
        if (typesRaw) {
          const allTypes = JSON.parse(typesRaw);
          currentType = allTypes[currentBranch] || '';
        }
      } catch(e) { console.log('URL parse error:', e); }
    }

    // ===== Firestore 실시간 구독 =====
    // ===== CRM Firestore 구독 =====
    let _renderThrottle = null;
    let _lastCustomerCount = -1;

    function throttledRender() {
      if (_renderThrottle) return;
      _renderThrottle = setTimeout(() => {
        _renderThrottle = null;
        render();
      }, 500);
    }

    function subscribeCustomers() {
      const { db, collection, query, onSnapshot } = window.WORKS_DB;
      const ref = collection(db, 'crm_customers');
      const q = query(ref);
      unsubCustomers = onSnapshot(q, (snapshot) => {
        const newCustomers = [];
        snapshot.forEach(doc => {
          const d = { id: doc.id, ...doc.data() };
          // 지사 미배정 + 지역 있으면 자동 배정
          if (!d.assignedBranch && d.province) {
            d.assignedBranch = getAutoAssignedBranch(d.province);
          }
          newCustomers.push(d);
        });
        // 최신순 정렬: createdAt 타임스탬프 > date 문자열 > no 순
        newCustomers.sort((a, b) => {
          const tsA = a.createdAt?.seconds || 0;
          const tsB = b.createdAt?.seconds || 0;
          if (tsA !== tsB) return tsB - tsA;
          if (a.date !== b.date) return (b.date || '').localeCompare(a.date || '');
          return (b.no || 0) - (a.no || 0);
        });
        // 데이터 변경 없으면 render 스킵
        if (newCustomers.length === _lastCustomerCount && customers.length > 0) {
          customers = newCustomers;
          return;
        }
        customers = newCustomers;
        _lastCustomerCount = customers.length;
        console.log('CRM loaded:', customers.length, 'records');
        if (currentView === 'crm' || currentView === 'home' || currentView === 'dashboard') throttledRender();
      }, (error) => {
        console.error('CRM subscribe error:', error);
      });
    }

    function subscribeOrders() {

      if (activeEl && activeEl.id) {
        const cursorPos = activeEl.selectionStart;
        _restoreFocus = { id: activeEl.id, cursor: cursorPos };
      } else {
        _restoreFocus = null;
      }

      const app = document.getElementById('app');
      let html = '';
      if (currentView === 'order_select') html = renderOrderSelect();

      else if (currentView === 'schedule') html = renderSchedule();
      else if (currentView === 'leave') html = renderLeave();
      else if (currentView === 'showroom_mgmt') html = renderShowroomMgmt();
      else html = renderHome();

      requestAnimationFrame(() => {
        app.innerHTML = html;
        lucide.createIcons();
        bindEvents();

        // 렌더 후 포커스 복원
        if (_restoreFocus) {
          const el = document.getElementById(_restoreFocus.id);
          if (el) {
            el.focus();
            if (typeof el.selectionStart !== 'undefined' && _restoreFocus.cursor !== null) {
              el.selectionStart = el.selectionEnd = _restoreFocus.cursor;
            }
          }
          _restoreFocus = null;
        }
        _isRendering = false;
      });
    }

    // ===== 발주 상세 보기 =====
    function viewOrderDetail(orderId) {
      const o = orders.find(x => x.id === orderId);
      if (!o) return;
      const typeLabel = ORDER_TYPE_LABEL[o.orderType] || '제품';
      const modal = document.createElement('div');
      modal.id = 'order-detail-modal';
      modal.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm';
      modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto p-6">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-sm font-black uppercase tracking-widest">발주 상세</h3>
            <button onclick="document.getElementById('order-detail-modal').remove()" class="text-neutral-400 hover:text-black"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
          <div class="space-y-3">
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">발주번호</span><span class="text-xs font-bold">${o.orderNumber || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">유형</span><span class="text-xs font-bold">${typeLabel}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">현장명</span><span class="text-xs font-bold">${o.siteName || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">지사</span><span class="text-xs font-bold">${o.branch || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">담당자</span><span class="text-xs font-bold">${o.manager || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">상태</span><span class="text-xs font-bold">${o.status || '접수'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">금액</span><span class="text-xs font-bold">${formatCurrency(o.total || 0)}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">등록일</span><span class="text-xs font-bold">${formatDate(o.createdAt)}</span></div>
            ${o.memo ? `<div class="pt-2"><span class="text-[10px] text-neutral-400 block mb-1">비고</span><p class="text-xs text-neutral-600">${o.memo}</p></div>` : ''}
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      lucide.createIcons();
    }

    // ===== 발주 현황 (2단계: 생산 추적 워크스페이스) =====
    const PRODUCTION_STAGES = ['접수', '자재', '제작', '품질1차', '도장', '품질2차', '포장', '출고', '완료'];

    function isOrderCompleted(order) {
      const ps = order.productionStages || {};
      return PRODUCTION_STAGES.every(s => (ps[s] || {}).status === 'completed');
    }

    function renderOrderList() {
      // 본사: 전체, 지사/대리점: 본인 지사+담당자 발주만
      let myOrders;
      if (currentType === 'hq') {
        myOrders = orders;
      } else if (currentBranch) {
        myOrders = orders.filter(o => o.branch === currentBranch && (!currentManager || o.manager === currentManager));
      } else {
        myOrders = [];
      }
      const isHQ = currentType === 'hq';

      const activeOrders = myOrders.filter(o => !isOrderCompleted(o));
      const completedOrders = myOrders.filter(o => isOrderCompleted(o));
      const displayOrders = orderListTab === 'active' ? activeOrders : completedOrders;

      return `
        <div class="min-h-screen bg-white animate-fade-in">
          ${renderNav()}
          <main class="pt-20 pb-20 max-w-4xl mx-auto px-6">
            <div class="mb-6">
              <h1 class="text-xl font-black tracking-tight">Order History</h1>
              <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest mt-1">발주내역 확인 · ${myOrders.length}건</p>
            </div>

            <!-- 탭 -->
            <div class="flex items-center gap-1 mb-6 border-b border-neutral-100">
              <button onclick="orderListTab='active';render();" class="px-4 py-2.5 text-[11px] font-black tracking-wide transition-all ${orderListTab === 'active' ? 'border-b-2 border-black text-black' : 'border-b-2 border-transparent text-neutral-400 hover:text-neutral-600'}">
                진행중 <span class="ml-1 text-[10px] ${orderListTab === 'active' ? 'bg-black text-white' : 'bg-neutral-200 text-neutral-500'} px-1.5 py-0.5 rounded-full">${activeOrders.length}</span>
              </button>
              <button onclick="orderListTab='completed';render();" class="px-4 py-2.5 text-[11px] font-black tracking-wide transition-all ${orderListTab === 'completed' ? 'border-b-2 border-black text-black' : 'border-b-2 border-transparent text-neutral-400 hover:text-neutral-600'}">
                출고완료 <span class="ml-1 text-[10px] ${orderListTab === 'completed' ? 'bg-black text-white' : 'bg-neutral-200 text-neutral-500'} px-1.5 py-0.5 rounded-full">${completedOrders.length}</span>
              </button>
            </div>

            <div id="orderListContainer" class="space-y-4">
              ${displayOrders.length > 0
                ? displayOrders.map(o => renderOrderListItem(o, isHQ)).join('')
                : `<div class="text-center py-16">
                    <i data-lucide="${orderListTab === 'completed' ? 'check-circle' : 'inbox'}" class="w-10 h-10 text-neutral-200 mx-auto mb-4"></i>
                    <p class="text-sm text-neutral-300 font-bold mb-4">${orderListTab === 'completed' ? '출고완료된 발주가 없습니다' : '진행중인 발주가 없습니다'}</p>
                    ${currentType === 'hq' && orderListTab === 'active' ? `<button onclick="seedTestOrders()" class="h-10 px-5 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-600 active:scale-[0.98] transition-all">테스트 데이터 생성</button>` : ''}
                  </div>`
              }
            </div>
          </main>
          ${renderFooter()}
        </div>
      `;
    }

    function renderOrderListItem(order, isHQ) {
      const stages = PRODUCTION_STAGES;
      const orderStages = order.productionStages || {};

      // 현재 활성 단계 인덱스 계산
      let activeIdx = -1;
      let completedCount = 0;
      stages.forEach((s, i) => {
        const st = (orderStages[s] || {}).status || 'pending';
        if (st === 'completed') completedCount++;
        if (st === 'in-progress') activeIdx = i;
      });
      if (activeIdx === -1) activeIdx = completedCount;
      const progressPct = Math.round((completedCount / stages.length) * 100);
      const currentPhase = completedCount >= stages.length ? '완료' : stages[Math.min(activeIdx, stages.length - 1)];

      // 로그 목록
      const logs = order.stageLogs || [];

      return `
        <div class="border border-neutral-200 rounded-2xl overflow-hidden">
          <!-- 발주 헤더 -->
          <div class="p-5">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-[9px] font-black status-${order.status||'접수'} px-2 py-0.5 rounded-md">${order.status || '접수'}</span>
                  <span class="text-xs font-black">${order.siteName || '-'}</span>
                </div>
                <p class="text-[10px] text-neutral-400">${order.branch || ''} · ${order.orderNumber || ''}</p>
              </div>
              <div class="text-right flex items-center gap-4">
                <div>
                  <span class="text-lg font-black text-neutral-800">${progressPct}%</span>
                  <p class="text-[9px] text-neutral-400 font-bold">현재: ${currentPhase}</p>
                </div>
                <div class="text-right">
                  <p class="text-[10px] text-neutral-400 mb-1">${formatDate(order.createdAt)}</p>
                  <p class="text-xs font-black">${formatCurrency(order.total || 0)}</p>
                </div>
              </div>
            </div>

            <!-- 가로 진행바 (본사: 클릭 가능) -->
            <div class="progress-bar-wrap">
              ${stages.map((s, i) => {
                const st = (orderStages[s] || {}).status || 'pending';
                const cls = st === 'completed' ? 'seg-done' : st === 'in-progress' ? 'seg-active' : 'seg-wait';
                const clickAttr = isHQ ? `onclick="event.stopPropagation();advanceStage('${order.id}','${s}',${i})" style="cursor:pointer;"` : '';
                return `<div class="bar-seg ${cls}" title="${s}: ${st === 'completed' ? '완료' : st === 'in-progress' ? '진행중' : '대기'}${isHQ ? ' (클릭하여 변경)' : ''}" ${clickAttr}></div>`;
              }).join('')}
            </div>
            <div class="stage-labels">
              ${stages.map((s, i) => {
                const st = (orderStages[s] || {}).status || 'pending';
                const cls = st === 'completed' ? 'lbl-done' : st === 'in-progress' ? 'lbl-active' : '';
                return `<span class="${cls}">${s}</span>`;
              }).join('')}
            </div>
          </div>

          <!-- 상세보기 버튼 -->
          <div class="px-5 pb-4">
            <button onclick="toggleOrderDetail('${order.id}')" class="w-full h-9 border border-neutral-200 rounded-xl text-[10px] font-black text-neutral-400 hover:bg-neutral-50 hover:text-neutral-600 active:scale-[0.99] transition-all flex items-center justify-center gap-1.5">
              <i data-lucide="chevron-down" class="w-3 h-3 order-toggle-${order.id}" style="transition:transform 0.2s;"></i> 상세보기
            </button>
          </div>

          <!-- 상세 (펼침) -->
          <div id="detail-${order.id}" class="hidden border-t border-neutral-100">
            ${isHQ && order.orderType === 'product' ? `
            <!-- 본사 전용: 발주서 다운로드 -->
            <div class="px-5 pt-4 pb-2 bg-blue-50/50 border-b border-blue-100 flex items-center gap-3 flex-wrap">
              <span class="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em]">발주서 다운로드</span>
              <button onclick="event.stopPropagation();downloadManufacturingOrder('${order.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-[10px] font-black rounded-lg hover:bg-blue-700 active:scale-[0.97] transition-all">
                <i data-lucide="file-text" class="w-3 h-3"></i> 제작 발주서
              </button>
              <button onclick="event.stopPropagation();downloadPaintOrder('${order.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 text-white text-[10px] font-black rounded-lg hover:bg-amber-700 active:scale-[0.97] transition-all">
                <i data-lucide="paintbrush" class="w-3 h-3"></i> 도장 발주서
              </button>
            </div>
            ` : ''}
            <div class="p-5 bg-neutral-50/50">
              <p class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] mb-3">생산 진행 상세</p>

              <!-- 가로 카드 그리드 -->
              <div class="stage-detail-grid">
                ${stages.map((stage, idx) => {
                  const stageData = orderStages[stage] || { status: 'pending' };
                  const cardCls = stageData.status === 'completed' ? 'card-done' : stageData.status === 'in-progress' ? 'card-active' : 'card-wait';
                  const statusLabel = stageData.status === 'completed' ? '완료' : stageData.status === 'in-progress' ? '진행중' : '대기';
                  const statusColor = stageData.status === 'completed' ? 'bg-green-50 text-green-600' : stageData.status === 'in-progress' ? 'bg-blue-50 text-blue-600' : 'bg-gray-50 text-gray-400';
                  return `
                    <div class="stage-card ${cardCls}">
                      <div class="flex items-center justify-between mb-1">
                        <span class="text-[10px] font-black">${stage}</span>
                        <span class="text-[8px] font-black px-1.5 py-0.5 rounded ${statusColor}">${statusLabel}</span>
                      </div>
                      ${stageData.completedDate ? `<p class="text-[8px] text-neutral-400">${formatDate(stageData.completedDate)}</p>` : ''}
                      ${stageData.comment ? `<p class="text-[9px] text-neutral-500 mt-1">${stageData.comment}</p>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>

              <!-- 진행 로그 -->
              ${logs.length > 0 ? `
              <div class="mt-5 pt-4 border-t border-neutral-200">
                <p class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] mb-3">진행 로그</p>
                <div class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin">
                  ${logs.slice().reverse().map(log => `
                    <div class="flex items-start gap-2 text-[10px]">
                      <span class="text-neutral-300 whitespace-nowrap">${log.date || ''}</span>
                      <span class="text-neutral-700">${log.message}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ===== 공지사항 =====

        <div class="min-h-screen bg-white animate-fade-in">

          <main class="pt-20 pb-20 max-w-4xl mx-auto px-6">

                    <div class="mt-3 pt-3 border-t border-neutral-50 flex gap-2">

        ${isHQ ? `

          <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl">

              <span class="text-[10px] font-black tracking-widest uppercase text-neutral-400">새 공지 작성</span>

                <i data-lucide="x" class="w-4 h-4"></i>

            </div>
            <div class="p-6 space-y-4">
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest">제목</label>

              </div>
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest">내용</label>
                <textarea id="noticeContent" class="input-base" rows="6" placeholder="공지 내용을 입력하세요..."></textarea>

              <div class="flex items-center gap-2">
                <input type="checkbox" id="noticeImportant" class="w-4 h-4" />

              <button id="btnSaveNotice" class="w-full h-11 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-800 transition-all">공지 등록</button>
            </div>
          </div>
        </div>` : ''}
      `;

    // ===== 이벤트 바인딩 =====
    function bindEvents() {
      if (currentView === 'order') {
        initOrderForm();
      }
      if (currentView === 'notice') {
        document.getElementById('btnNewNotice')?.addEventListener('click', () => {
          document.getElementById('noticeModal').classList.remove('hidden');
        });
        document.getElementById('btnSaveNotice')?.addEventListener('click', saveNotice);
      }
      // 단계 변경은 advanceStage() 함수로 inline onclick 처리됨
    }

    function toggleOrderDetail(orderId) {
      const detailEl = document.getElementById(`detail-${orderId}`);
      const chevron = document.querySelector(`.order-toggle-${orderId}`);
      if (detailEl.classList.contains('hidden')) {
        detailEl.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        detailEl.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    // ===== 발주 폼 초기화 =====
    function initOrderForm() {
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('orderDate').value = dateStr;

      // 희망 납품일을 2주 후로 설정
      const twoWeeks = new Date(today);
      twoWeeks.setDate(twoWeeks.getDate() + 14);
      const deliveryStr = `${twoWeeks.getFullYear()}-${String(twoWeeks.getMonth()+1).padStart(2,'0')}-${String(twoWeeks.getDate()).padStart(2,'0')}`;
      document.getElementById('deliveryDate').value = deliveryStr;

      const orderNum = `ORD-${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;
      document.getElementById('orderNumber').textContent = '발주번호: ' + orderNum;

      orderRows = [];
      orderCount = 0;
      addProductRow();

      document.getElementById('btnAddRow')?.addEventListener('click', () => addProductRow());
      document.getElementById('btnPreview')?.addEventListener('click', showPreview);
      document.getElementById('btnSubmit')?.addEventListener('click', submitOrder);

      // 지역 선택 이벤트
      document.getElementById('siteProvince').addEventListener('change', function() {
        updateDistrictOptions(this.value);
      });

      // 희망 납품일 변경 감시
      document.getElementById('deliveryDate').addEventListener('change', checkDeliveryDate);

      // 전화번호 포맷
      document.getElementById('sitePhone')?.addEventListener('input', function() {
        let val = this.value.replace(/[^0-9]/g, '');
        if (val.length < 4) this.value = val;
        else if (val.length < 7) this.value = val.substr(0,3) + '-' + val.substr(3);
        else if (val.length < 11) this.value = val.substr(0,3) + '-' + val.substr(3,3) + '-' + val.substr(6);
        else this.value = val.substr(0,3) + '-' + val.substr(3,4) + '-' + val.substr(7);
      });
    }

    function updateDistrictOptions(province) {
      const districtSelect = document.getElementById('siteDistrict');
      const districts = REGIONS_DATA[province] || [];
      districtSelect.innerHTML = '<option value="">선택하세요</option>' +
        districts.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function checkDeliveryDate() {
      const orderDate = new Date(document.getElementById('orderDate').value);
      const deliveryDate = new Date(document.getElementById('deliveryDate').value);
      const diffTime = Math.abs(deliveryDate - orderDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      const warningEl = document.getElementById('deliveryWarning');
      if (diffDays < 14) {
        warningEl.classList.remove('hidden');
      } else {
        warningEl.classList.add('hidden');
      }
    }

    // ===== 제품 행 관리 =====
    function addProductRow() {
      orderCount++;
      orderRows.push({ id: orderCount, product: '', spec: '', qty: 1, unit: 'SET', price: 0, isCustom: false });
      renderProductRows();
    }

    function renderProductRows() {
      const container = document.getElementById('productRows');
      if (!container) return;
      const categories = [...new Set(PRODUCT_DB.map(p => p.category))];
      const opts = categories.map(cat => {
        const items = PRODUCT_DB.filter(p => p.category === cat);
        return `<optgroup label="${cat}">${items.map(p => `<option value="${p.name}|${p.spec}|${p.unit}|${p.price}">${p.name}</option>`).join('')}</optgroup>`;
      }).join('');

      container.innerHTML = orderRows.map((row, idx) => `
        <div class="grid grid-cols-12 gap-2 mb-2 items-center" data-id="${row.id}">
          <div class="col-span-1 text-[10px] font-black text-neutral-300 pl-1">${idx+1}</div>
          <div class="col-span-3">
            <select class="input-base text-xs prod-select" data-id="${row.id}" style="height:36px;font-size:11px;">
              <option value="">제품 선택</option>
              ${opts}
              <option value="__custom__">직접 입력</option>
            </select>
            ${row.isCustom ? `<input type="text" class="input-base mt-1 prod-custom text-xs" data-id="${row.id}" placeholder="제품명" value="${row.product}" style="height:32px;font-size:11px;" />` : ''}
          </div>
          <div class="col-span-2"><input type="text" class="input-base prod-spec text-xs" data-id="${row.id}" value="${row.spec}" placeholder="규격" style="height:36px;font-size:11px;" /></div>
          <div class="col-span-1"><input type="number" class="input-base prod-qty text-xs text-center" data-id="${row.id}" value="${row.qty}" min="1" style="height:36px;font-size:11px;padding:0 4px;" /></div>
          <div class="col-span-1"><input type="text" class="input-base prod-unit text-xs text-center" data-id="${row.id}" value="${row.unit}" style="height:36px;font-size:11px;padding:0 4px;" /></div>
          <div class="col-span-2"><input type="number" class="input-base prod-price text-xs" data-id="${row.id}" value="${row.price}" min="0" step="1000" placeholder="단가" style="height:36px;font-size:11px;" /></div>
          <div class="col-span-1 text-right text-[11px] font-black text-neutral-600 prod-sub" data-id="${row.id}">${formatCurrency(row.qty*row.price)}</div>
          <div class="col-span-1 flex justify-center">
            <button class="w-7 h-7 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-100 transition-all btn-del" data-id="${row.id}">
              <i data-lucide="trash-2" class="w-3 h-3"></i>
            </button>
          </div>
        </div>
      `).join('');

      // 이벤트 바인딩
      container.querySelectorAll('.prod-select').forEach(sel => {
        sel.addEventListener('change', e => {
          const row = orderRows.find(r => r.id === +e.target.dataset.id);
          if (!row) return;
          if (e.target.value === '__custom__') { row.isCustom = true; row.product = ''; row.spec = ''; row.unit = 'EA'; row.price = 0; }
          else if (e.target.value) { const [n,s,u,p] = e.target.value.split('|'); row.isCustom = false; row.product = n; row.spec = s; row.unit = u; row.price = +p||0; }
          renderProductRows();
        });
      });
      container.querySelectorAll('.prod-custom').forEach(inp => { inp.addEventListener('input', e => { const r = orderRows.find(r => r.id === +e.target.dataset.id); if(r) r.product = e.target.value; }); });
      container.querySelectorAll('.prod-spec').forEach(inp => { inp.addEventListener('input', e => { const r = orderRows.find(r => r.id === +e.target.dataset.id); if(r) r.spec = e.target.value; }); });
      container.querySelectorAll('.prod-qty').forEach(inp => { inp.addEventListener('input', e => { const r = orderRows.find(r => r.id === +e.target.dataset.id); if(r) { r.qty = +e.target.value||0; updateTotal(); } }); });
      container.querySelectorAll('.prod-unit').forEach(inp => { inp.addEventListener('input', e => { const r = orderRows.find(r => r.id === +e.target.dataset.id); if(r) r.unit = e.target.value; }); });
      container.querySelectorAll('.prod-price').forEach(inp => { inp.addEventListener('input', e => { const r = orderRows.find(r => r.id === +e.target.dataset.id); if(r) { r.price = +e.target.value||0; updateTotal(); } }); });
      container.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', e => {
          const id = +e.currentTarget.dataset.id;
          if (orderRows.length <= 1) return alert('최소 1개 제품이 필요합니다.');
          orderRows = orderRows.filter(r => r.id !== id);
          renderProductRows();
        });
      });
      updateTotal();
      lucide.createIcons();
    }

    function updateTotal() {
      let total = 0;
      orderRows.forEach(r => {
        const sub = r.qty * r.price;
        total += sub;
        const el = document.querySelector(`.prod-sub[data-id="${r.id}"]`);
        if (el) el.textContent = formatCurrency(sub);
      });
      const el = document.getElementById('totalAmount');
      if (el) el.textContent = formatCurrency(total);
    }

    // ===== 유틸 =====
    function formatCurrency(n) { return n ? '₩' + n.toLocaleString('ko-KR') : '₩0'; }
    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    // ===== 발주 데이터 수집 =====
    function collectOrderData() {
      const province = document.getElementById('siteProvince')?.value || '';
      const district = document.getElementById('siteDistrict')?.value || '';
      const detailAddress = document.getElementById('siteDetailAddress')?.value || '';
      const fullAddress = [province, district, detailAddress].filter(x => x).join(' ');

      return {
        orderNumber: document.getElementById('orderNumber')?.textContent.replace('발주번호: ','') || '',
        branch: document.getElementById('orderBranch')?.value.trim() || '',
        manager: document.getElementById('orderManager')?.value.trim() || '',
        orderDate: document.getElementById('orderDate')?.value || '',
        deliveryDate: document.getElementById('deliveryDate')?.value || '',
        siteName: document.getElementById('siteName')?.value.trim() || '',
        sitePhone: document.getElementById('sitePhone')?.value.trim() || '',
        siteAddress: fullAddress,
        products: orderRows.filter(r => r.product).map(r => ({ product: r.product, spec: r.spec, qty: r.qty, unit: r.unit, price: r.price, subtotal: r.qty * r.price })),
        total: orderRows.reduce((s,r) => s + r.qty * r.price, 0),
        memo: document.getElementById('orderMemo')?.value.trim() || '',
        productionStages: {}
      };
    }

    function validateOrder() {
      const d = collectOrderData();
      if (!d.branch) { alert('발주처를 입력하세요.'); return null; }
      if (!d.manager) { alert('담당자를 입력하세요.'); return null; }
      if (!d.deliveryDate) { alert('희망 납품일을 선택하세요.'); return null; }
      if (!d.siteName) { alert('현장명을 입력하세요.'); return null; }
      if (d.products.length === 0) { alert('최소 1개 제품을 입력하세요.'); return null; }
      return d;
    }

    // ===== 미리보기 =====
    // ===== CRM & CDM 페이지 =====
    const CRM_CHANNELS = ['유튜브','홈페이지','전화','카카오톡','블로그','메일','폼','인스타그램','네이버 카페','문자','박람회','스마트스토어','네이버 톡톡','방문','기타'];
    const CRM_PRODUCTS = ['파고라','데크','폴딩도어','시스템셔터','슬라이딩도어','스크린','방충망','글라스폴딩','스마트픽스글라스','난간','클라비아','가구','짚스크린','유리난간','글라스트','스톤모어','기타'];
    const CRM_GRADES = ['S','A','B','C','D'];
    const CRM_GRADE_COLORS = { 'S': 'bg-purple-100 text-purple-700 border-purple-200', 'A': 'bg-green-100 text-green-700 border-green-200', 'B': 'bg-blue-100 text-blue-700 border-blue-200', 'C': 'bg-amber-50 text-amber-700 border-amber-200', 'D': 'bg-neutral-100 text-neutral-500 border-neutral-200' };
    let editingCustomerId = null;
    const CRM_GRADE_DOT = { 'S': 'bg-purple-500', 'A': 'bg-green-500', 'B': 'bg-blue-500', 'C': 'bg-amber-500', 'D': 'bg-neutral-400', '-': 'bg-neutral-300' };

    // ===== 대시보드 (별도 페이지) =====
    function getDashYearOptions() {
      const years = new Set();
      customers.forEach(c => { if (c.year) years.add(c.year); });
      return Array.from(years).sort().reverse();
    }

    function getDashMonthOptions() {
      const months = new Set();
      customers.forEach(c => {
        if (c.month && (dashYear === '전체' || c.year === dashYear)) months.add(c.month);
      });
      // 월 정렬 (1월~12월)
      return Array.from(months).sort((a, b) => parseInt(a) - parseInt(b));
    }

    function getDashData() {
      let data = [...customers];
      if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
      if (dashYear !== '전체') data = data.filter(c => c.year === dashYear);
      if (dashMonth !== '전체') data = data.filter(c => c.month === dashMonth);
      return data;
    }

    function getDashPrevData() {
      // 전체 연도+전체 월이면 비교 없음
      if (dashYear === '전체' && dashMonth === '전체') return null;
      // 특정 연도+전체 월이면 전년도 비교
      if (dashYear !== '전체' && dashMonth === '전체') {
        const prevY = (parseInt(dashYear) - 1) + '년';
        let data = customers.filter(c => c.year === prevY);
        if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
        return data.length > 0 ? data : null;
      }
      // 특정 월이면 전월 비교
      const m = parseInt(dashMonth);
      const y = dashYear !== '전체' ? parseInt(dashYear) : null;
      const prevM = m === 1 ? 12 : m - 1;
      const prevY = m === 1 && y ? y - 1 : y;
      let data = customers.filter(c => {
        const monthMatch = c.month === prevM + '월';
        if (y) return monthMatch && c.year === prevY + '년';
        return monthMatch;
      });
      if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
      return data.length > 0 ? data : null;
    }

    function getDashModeLabel() {
      if (dashYear === '전체' && dashMonth === '전체') return '전체';
      if (dashYear !== '전체' && dashMonth === '전체') return dashYear;
      if (dashYear === '전체' && dashMonth !== '전체') return dashMonth;
      return dashYear + ' ' + dashMonth;
    }

    function setDashYear(y) { dashYear = y; dashMonth = '전체'; render(); }
    function setDashMonth(m) { dashMonth = m; render(); }
    function setDashBrand(brand) { dashBrand = brand; render(); }
    function setDashMode(mode) { dashMode = mode; render(); }
    function setDashCustomRange() {
      dashCustomFrom = document.getElementById('dashFromDate')?.value || '';
      dashCustomTo = document.getElementById('dashToDate')?.value || '';
      render();
    }

    // 대시보드 모드별 데이터 필터링 헬퍼
    function getDashDateRange() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (dashMode === 'daily') {
        return { from: today, to: today, label: formatDateKR(today) };
      } else if (dashMode === 'weekly') {
        const dayOfWeek = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        return { from: monday, to: sunday, label: formatDateKR(monday) + ' ~ ' + formatDateKR(sunday) };
      } else if (dashMode === 'monthly') {
        const first = new Date(now.getFullYear(), now.getMonth(), 1);
        const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        return { from: first, to: last, label: now.getFullYear() + '년 ' + (now.getMonth() + 1) + '월' };
      } else if (dashMode === 'yearly') {
        const first = new Date(now.getFullYear(), 0, 1);
        const last = new Date(now.getFullYear(), 11, 31);
        return { from: first, to: last, label: now.getFullYear() + '년' };
      } else if (dashMode === 'custom' && dashCustomFrom && dashCustomTo) {
        return { from: new Date(dashCustomFrom), to: new Date(dashCustomTo), label: dashCustomFrom + ' ~ ' + dashCustomTo };
      }
      return { from: null, to: null, label: '전체' };
    }

    function formatDateKR(d) {
      return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
    }

    function getCustomerDate(c) {
      if (c.date) {
        const d = new Date(c.date);
        if (!isNaN(d.getTime())) return d;
      }
      if (c.createdAt?.seconds) return new Date(c.createdAt.seconds * 1000);
      // year/month 파싱 폴백
      if (c.year && c.month) {
        const y = parseInt(c.year);
        const m = parseInt(c.month);
        if (y && m) return new Date(y, m - 1, 15);
      }
      return null;
    }

    function filterByDateRange(data, from, to) {
      if (!from || !to) return data;
      const fromTime = from.getTime();
      const toTime = to.getTime() + 86400000 - 1; // to 날짜 끝까지 포함
      return data.filter(c => {
        const d = getCustomerDate(c);
        if (!d) return false;
        const t = d.getTime();
        return t >= fromTime && t <= toTime;
      });
    }

    function isConverted(c) {
      // 전환 = 지사 배정됨 (본사는 미배정 상태이므로 제외)
      const b = (c.assignedBranch || '').trim();
      return !!(b && b !== '본사');
    }

    function renderDashboardPage() {
      // ── 모드별 날짜 범위 ──
      const range = getDashDateRange();
      const allData = dashBrand !== '전체' ? customers.filter(c => c.brand === dashBrand) : [...customers];
      const data = filterByDateRange(allData, range.from, range.to);
      const total = data.length;

      // ── 이전 기간 데이터 (비교용) ──
      let prevData = null;
      if (range.from && range.to) {
        const span = range.to.getTime() - range.from.getTime() + 86400000;
        const prevFrom = new Date(range.from.getTime() - span);
        const prevTo = new Date(range.from.getTime() - 1);
        prevData = filterByDateRange(allData, prevFrom, prevTo);
      }

      // ── 브랜드별 집계 ──
      const oskaData = data.filter(c => c.brand === '오스카');
      const terraData = data.filter(c => c.brand === '테라까사');
      const oskaConverted = oskaData.filter(isConverted).length;
      const terraConverted = terraData.filter(isConverted).length;
      const totalConverted = data.filter(isConverted).length;
      const convRate = total > 0 ? Math.round(totalConverted / total * 100) : 0;

      // ── 채널별 ──
      const channelCounts = {};
      data.forEach(c => { if (c.channel) channelCounts[c.channel] = (channelCounts[c.channel] || 0) + 1; });
      const allChannels = Object.entries(channelCounts).sort((a, b) => b[1] - a[1]);
      const maxCh = allChannels.length > 0 ? allChannels[0][1] : 1;

      // ── 제품별 ──
      const productCounts = {};
      data.forEach(c => {
        if (c.product) c.product.split(',').map(p => p.trim()).filter(Boolean).forEach(p => {
          productCounts[p] = (productCounts[p] || 0) + 1;
        });
      });
      const allProducts = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);
      const maxProd = allProducts.length > 0 ? allProducts[0][1] : 1;

      // ── 지역별 ──
      const regionCounts = {};
      let overseasCount = 0;
      data.forEach(c => {
        if (c.province) {
          if (c.province === '해외') { overseasCount++; }
          else { regionCounts[c.province] = (regionCounts[c.province] || 0) + 1; }
        }
      });
      const domesticRegions = Object.entries(regionCounts).sort((a, b) => b[1] - a[1]);
      const allRegions = overseasCount > 0 ? [...domesticRegions, ['해외', overseasCount]] : domesticRegions;
      const maxRegion = domesticRegions.length > 0 ? domesticRegions[0][1] : 1;

      const regionDetail = {};
      data.forEach(c => {
        if (c.province) {
          const key = c.province;
          if (!regionDetail[key]) regionDetail[key] = {};
          const dist = key === '해외' ? (c.overseasCountry || '기타') : (c.district || '미지정');
          regionDetail[c.province][dist] = (regionDetail[c.province][dist] || 0) + 1;
        }
      });

      // ── 지사이관 현황 ──
      const branchCounts = {};
      data.forEach(c => {
        const b = c.assignedBranch || '';
        if (b) branchCounts[b] = (branchCounts[b] || 0) + 1;
      });
      const totalBranched = Object.values(branchCounts).reduce((s, v) => s + v, 0);
      const branchRate = total > 0 ? Math.round(totalBranched / total * 100) : 0;
      const allBranches = Object.entries(branchCounts).sort((a, b) => b[1] - a[1]);

      // ── 등급별 ──
      const gradeCounts = {};
      data.forEach(c => {
        const g = (c.grade2 && c.grade2.trim()) || (c.grade && c.grade.trim()) || '미지정';
        gradeCounts[g] = (gradeCounts[g] || 0) + 1;
      });
      const allGrades = Object.entries(gradeCounts).sort((a, b) => b[1] - a[1]);

      // ── 유형별 ──
      const typeCounts = {};
      data.forEach(c => { const t = c.custType || '미지정'; typeCounts[t] = (typeCounts[t] || 0) + 1; });

      // ── 동의율 ──
      const consentY = data.filter(c => c.consent === '동의').length;
      const consentRate = total > 0 ? Math.round(consentY / total * 100) : 0;

      // ── 전/후기 비교 ──
      let diffHtml = '';
      if (prevData !== null && prevData.length > 0) {
        const diff = total - prevData.length;
        const pct = prevData.length > 0 ? Math.round(diff / prevData.length * 100) : 0;

                <p class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-4">고객 유형</p>
                <div class="space-y-3">
                  ${typeHTML}
                </div>
              </div>
              <div class="border border-neutral-200 rounded-2xl p-5">
                <p class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-4">지사이관 현황</p>
                <div class="flex flex-col items-center justify-center mb-3">
                  <div class="relative w-24 h-24">
                    <svg viewBox="0 0 36 36" class="w-full h-full -rotate-90">
                      <circle cx="18" cy="18" r="15.9" fill="none" stroke="#f5f5f5" stroke-width="3"/>
                      <circle cx="18" cy="18" r="15.9" fill="none" stroke="#22c55e" stroke-width="3"
                        stroke-dasharray="${branchRate} ${100 - branchRate}" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                      <span class="text-lg font-black">${branchRate}%</span>
                      <span class="text-[7px] text-neutral-400 font-bold">배정률</span>
                    </div>
                  </div>
                </div>
                <div class="space-y-1.5 max-h-40 overflow-y-auto scrollbar-thin">
                  ${branchHTML}
                  <div class="flex items-center justify-between pt-1 border-t border-neutral-100">
                    <div class="flex items-center gap-1.5">
                      <div class="w-2 h-2 bg-neutral-200 rounded-full"></div>
                      <span class="text-[10px] font-bold text-neutral-400">미배정</span>
                    </div>
                    <span class="text-[9px] font-black text-neutral-400">${total - totalBranched}</span>
                  </div>
                </div>
              </div>
            </div>

          </main>
          ${renderFooter()}
        </div>
      `;
    }

    function renderCRM() {
      // 전화번호별 문의 횟수 맵 (전체 데이터 기준)
      const phoneCountMap = {};
      customers.forEach(c => {
        if (c.phone) {
          const norm = c.phone.replace(/[^0-9]/g, '');
          if (norm) phoneCountMap[norm] = (phoneCountMap[norm] || 0) + 1;
        }
      });

      const filtered = getFilteredCustomers();
      const paged = filtered.slice(crmPage * CRM_PAGE_SIZE, (crmPage + 1) * CRM_PAGE_SIZE);
      const totalPages = Math.ceil(filtered.length / CRM_PAGE_SIZE);

      // 다회 문의 고객 수 (필터 카운트용)
      const uniquePhones2 = new Set(); const uniquePhones3 = new Set();
      customers.forEach(c => {
        if (c.phone) {
          const norm = c.phone.replace(/[^0-9]/g, '');
          if (norm && phoneCountMap[norm] >= 2) uniquePhones2.add(norm);
          if (norm && phoneCountMap[norm] >= 3) uniquePhones3.add(norm);
        }
      });
      const repeat2Count = [...uniquePhones2].reduce((s, p) => s + phoneCountMap[p], 0);
      const repeat3Count = [...uniquePhones3].reduce((s, p) => s + phoneCountMap[p], 0);

      // 미배정 건수 (status === '미배정'인 신규 DB만)
      const unassignedCount = customers.filter(c => c.status === '미배정').length;

      // 파이프라인 카운트
      const counts = { '전체': customers.length };
      CRM_GRADES.forEach(g => { counts[g] = customers.filter(c => c.grade2 === g).length; });
      counts['-'] = customers.filter(c => !CRM_GRADES.includes(c.grade2)).length;

      return `
        <div class="min-h-screen bg-white animate-fade-in">
          ${renderNav()}
          <main class="pt-20 pb-20 max-w-6xl mx-auto px-6">

            <div class="flex items-center justify-between mb-8">
              <div>
                <h1 class="text-xl font-black tracking-tight">CRM & CDM</h1>
                <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest mt-1">Customer Relationship Management</p>
              </div>
              <div class="flex items-center gap-2">
                ${customers.length === 0 ? `
                <button onclick="importCRMData()" id="crmImportBtn" class="h-10 px-5 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-600 active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="upload" class="w-3.5 h-3.5"></i> 데이터 임포트
                </button>` : `
                ${currentType === 'hq' ? `
                <button onclick="importAdditionalInquiries()" id="additionalImportBtn" class="h-10 px-5 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="file-plus" class="w-3.5 h-3.5"></i> 추가문의 임포트
                </button>
                <button onclick="navigate('archived')" class="h-10 px-5 bg-neutral-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-600 active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="archive" class="w-3.5 h-3.5"></i> 정리고객
                </button>` : ''}
                <button onclick="downloadCRMExcel()" class="h-10 px-5 bg-white border border-neutral-200 rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-black active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="download" class="w-3.5 h-3.5"></i> 엑셀 다운로드
                </button>`}
                <button onclick="navigate('dashboard')" class="h-10 px-5 bg-white border border-neutral-200 rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-black active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> 대시보드
                </button>
                <button onclick="toggleCRMForm()" class="h-10 px-5 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="plus" class="w-3.5 h-3.5"></i> 신규 등록
                </button>
              </div>
            </div>

            <!-- 신규 고객 등록 폼 (토글) -->
            <div id="crmFormArea" class="hidden mb-8 border border-neutral-200 rounded-2xl p-6 animate-fade-in">
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-sm font-black uppercase tracking-tight">고객 정보 입력</h3>
                <button onclick="toggleCRMForm()" class="text-neutral-400 hover:text-black transition-colors">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">구분 (브랜드)</label>
                  <select id="crmBrand" class="input-base mt-1">
                    <option value="오스카">오스카</option>
                    <option value="테라까사">테라까사</option>
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">날짜</label>
                  <input type="date" id="crmDate" class="input-base mt-1" />
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">문의채널</label>
                  <select id="crmChannel" class="input-base mt-1">
                    <option value="">선택</option>
                    ${CRM_CHANNELS.map(c => `<option value="${c}">${c}</option>`).join('')}
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">개인정보 동의</label>
                  <select id="crmConsent" class="input-base mt-1">
                    <option value="동의">동의</option>
                    <option value="비동의">비동의</option>
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">전화번호</label>
                  <input type="tel" id="crmPhone" class="input-base mt-1" placeholder="010-0000-0000" oninput="formatCRMPhone(this); checkDuplicatePhone(this.value);" maxlength="13" />
                  <div id="phone-duplicate-warning" class="mt-1 hidden"></div>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">이메일</label>
                  <input type="email" id="crmEmail" class="input-base mt-1" placeholder="email@example.com" />
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">구분 (개인/업체)</label>
                  <select id="crmCustType" class="input-base mt-1">
                    <option value="개인">개인</option>
                    <option value="업체">업체</option>
                    <option value="관공서">관공서</option>
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">등급</label>
                  <select id="crmGrade2" class="input-base mt-1">
                    <option value="">미지정</option>
                    ${CRM_GRADES.map(g => `<option value="${g}">${g}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">도/광역시</label>
                  <select id="crmProvince" class="input-base mt-1" onchange="updateCRMDistrict()">
                    <option value="">선택</option>
                    ${Object.keys(REGIONS_DATA).map(p => `<option value="${p}">${p}</option>`).join('')}
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">시/군</label>
                  <select id="crmDistrict" class="input-base mt-1">
                    <option value="">선택</option>
                  </select>
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">주소</label>
                  <input type="text" id="crmAddress" class="input-base mt-1" placeholder="상세 주소" />
                </div>
                <div>
                  <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">지사 배정</label>
                  <select id="crmAssignedBranch" class="input-base mt-1">
                    <option value="">미배정</option>
                    <option value="본사">본사</option>
                    <option value="현방">현방</option>
                    <option value="강남지사">강남지사</option>
                    <option value="강동지사">강동지사</option>
                    <option value="강북지사">강북지사</option>
                    <option value="부산지사">부산지사</option>
                    <option value="호남제주지사">호남제주지사</option>
                    <option value="중부지사">중부지사</option>
                  </select>
                </div>
              </div>
              <!-- 제품군 (체크박스 복수 선택) -->
              <div class="mb-4">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1 mb-2 block">제품군 (복수 선택 가능)</label>
                <div class="flex flex-wrap gap-2">
                  ${CRM_PRODUCTS.map(p => `
                  <label class="flex items-center gap-1.5 px-3 py-2 border border-neutral-200 rounded-lg hover:border-black transition-all cursor-pointer has-[:checked]:bg-black has-[:checked]:text-white has-[:checked]:border-black">
                    <input type="checkbox" name="crmProductCheck" value="${p}" class="w-3 h-3 accent-black" />
                    <span class="text-[11px] font-bold">${p}</span>
                  </label>
                  `).join('')}
                </div>
              </div>
              <div class="mb-4">
                <label class="text-[9px] font-black text-neutral-300 uppercase tracking-widest ml-1">상담내용</label>
                <textarea id="crmContent" class="input-base mt-1" rows="3" placeholder="상담 내용을 입력하세요"></textarea>
              </div>
              <button onclick="saveCRMCustomer()" class="w-full h-12 bg-black text-white rounded-xl font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all text-xs">
                저장하기
              </button>
            </div>

            <!-- 파이프라인 보드 -->
            <div class="grid grid-cols-3 md:grid-cols-7 gap-3 mb-8">
              ${['전체', ...CRM_GRADES, '-'].map(g => `
              <button onclick="setCRMFilter('${g}')" class="p-4 rounded-xl border transition-all text-left ${crmFilter === g ? 'border-black bg-black text-white' : 'border-neutral-200 hover:border-black'}">
                <div class="flex items-center gap-2 mb-2">
                  ${g !== '전체' ? `<div class="w-2 h-2 rounded-full ${crmFilter === g ? 'bg-white' : CRM_GRADE_DOT[g]}"></div>` : ''}
                  <span class="text-[9px] font-black uppercase tracking-widest ${crmFilter === g ? 'text-white/70' : 'text-neutral-400'}">${g === '-' ? '미지정' : g}</span>
                </div>
                <div class="text-2xl font-black">${counts[g] || 0}</div>
              </button>
              `).join('')}
            </div>

            <!-- 검색/필터 바 -->
            <div class="flex flex-col md:flex-row gap-3 mb-6">
              <div class="flex-1 relative">
                <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-neutral-300"></i>
                <input type="text" id="crmSearchInput" class="input-base pl-10" placeholder="전화번호, 상담내용, 주소로 검색..." value="${crmSearch}" oninput="debouncedSearch(this.value)" />
              </div>
              <select id="crmBrandSelect" class="input-base w-auto md:w-36" onchange="crmBrandFilter=this.value; crmPage=0; render();">
                <option value="전체" ${crmBrandFilter === '전체' ? 'selected' : ''}>전체 브랜드</option>
                <option value="오스카" ${crmBrandFilter === '오스카' ? 'selected' : ''}>오스카</option>
                <option value="테라까사" ${crmBrandFilter === '테라까사' ? 'selected' : ''}>테라까사</option>
              </select>
              <select id="crmRepeatSelect" class="input-base w-auto md:w-44" onchange="crmRepeatFilter=this.value; crmPage=0; render();">
                <option value="전체" ${crmRepeatFilter === '전체' ? 'selected' : ''}>전체 고객</option>
                <option value="2회 이상" ${crmRepeatFilter === '2회 이상' ? 'selected' : ''}>2회 이상 문의 (${repeat2Count}건)</option>
                <option value="3회 이상" ${crmRepeatFilter === '3회 이상' ? 'selected' : ''}>3회 이상 문의 (${repeat3Count}건)</option>
              </select>
              <select id="crmAssignSelect" class="input-base w-auto md:w-40" onchange="crmAssignFilter=this.value; crmPage=0; render();">
                <option value="전체" ${crmAssignFilter === '전체' ? 'selected' : ''}>전체 배정</option>
                <option value="미배정" ${crmAssignFilter === '미배정' ? 'selected' : ''}>미배정 (${unassignedCount}건)</option>
              </select>
            </div>

            <!-- 고객 테이블 -->
            <div class="border border-neutral-200 rounded-2xl overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-[11px]">
                  <thead>
                    <tr class="bg-neutral-50 border-b border-neutral-200">
                      ${[
                        {key:'no', label:'No', cls:'w-10'},
                        {key:'brand', label:'구분', cls:''},
                        {key:'date', label:'날짜', cls:''},
                        {key:'channel', label:'채널', cls:''},
                        {key:'phone', label:'전화번호', cls:''},
                        {key:'product', label:'제품', cls:''},
                        {key:'custType', label:'유형', cls:''},
                        {key:'grade2', label:'등급', cls:''},
                        {key:'content', label:'상담내용', cls:'hidden md:table-cell'},
                        {key:'province', label:'지역', cls:'hidden md:table-cell'},
                        {key:'assignedBranch', label:'지사배정', cls:''}
                      ].map(h => {
                        const isActive = crmSortField === h.key;
                        const arrow = isActive ? (crmSortDir === 'asc' ? ' ▲' : ' ▼') : '';
                        return `<th class="px-3 py-3 text-left font-black text-[9px] uppercase tracking-widest ${h.cls} ${isActive ? 'text-black' : 'text-neutral-400'} cursor-pointer hover:text-black select-none" onclick="setCRMSort('${h.key}')">${h.label}${arrow}</th>`;
                      }).join('')}
                      <th class="px-3 py-3 text-center font-black text-[9px] text-neutral-400 uppercase tracking-widest w-32">관리</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${paged.length > 0 ? paged.map(c => {
                      const rawGrade = (c.grade2 && c.grade2.trim()) || '';
                      const displayGrade = CRM_GRADES.includes(rawGrade) ? rawGrade : '-';
                      const gradeClass = CRM_GRADE_COLORS[displayGrade] || 'bg-neutral-50 text-neutral-400 border-neutral-200';
                      const phoneNorm = c.phone ? c.phone.replace(/[^0-9]/g, '') : '';
                      const pCount = phoneNorm ? (phoneCountMap[phoneNorm] || 1) : 1;
                      // pCount: 동일 전화번호 문의 횟수 (중복 문의 뱃지에 사용)
                      return `
                    <tr class="border-b border-neutral-100 hover:bg-neutral-50 transition-colors">
                      <td class="px-3 py-3 text-neutral-400 font-bold">${c.no || '-'}</td>
                      <td class="px-3 py-3"><span class="text-[9px] font-black px-1.5 py-0.5 rounded ${c.brand === '테라까사' ? 'bg-orange-50 text-orange-600' : 'bg-neutral-100 text-neutral-600'}">${c.brand || '-'}</span></td>
                      <td class="px-3 py-3 text-neutral-600 font-bold">${c.date || '-'}</td>
                      <td class="px-3 py-3 font-bold">${c.channel || '-'}</td>
                      <td class="px-3 py-3 font-bold">${c.phone || '-'}</td>
                      <td class="px-3 py-3 font-bold">${c.product || '-'}</td>
                      <td class="px-3 py-3 font-bold">${c.custType || '-'}</td>
                      <td class="px-3 py-3"><span class="text-[9px] font-black px-2 py-0.5 rounded border ${gradeClass}">${displayGrade}</span></td>
                      <td class="px-3 py-3 text-neutral-500 max-w-[200px] truncate hidden md:table-cell">${c.content || '-'}</td>
                      <td class="px-3 py-3 text-neutral-500 hidden md:table-cell">${[c.province, c.district].filter(Boolean).join(' ') || '-'}</td>
                      <td class="px-3 py-3"><span class="text-[9px] font-black px-1.5 py-0.5 rounded ${c.status === '미배정' ? 'bg-red-50 text-red-500 border border-red-200' : c.assignedBranch ? 'bg-green-50 text-green-600' : 'text-neutral-400'}">${c.status === '미배정' ? '미배정' : c.assignedBranch || '-'}</span></td>
                      <td class="px-3 py-3 text-center">
                        <div class="flex items-center justify-center gap-1.5">
                          <button onclick="openCustomerHistory('${c.phone || ''}', '${c.id}')" class="relative px-2 py-1 rounded-lg border text-[9px] font-black transition-all ${pCount >= 2 ? 'border-black bg-black text-white hover:bg-neutral-800' : 'border-neutral-200 text-neutral-400 hover:border-black hover:text-black'}" title="고객관리 (${pCount}회 문의)">
                            고객관리
                            ${pCount >= 2 ? `<span class="ml-0.5 inline-flex items-center justify-center w-3.5 h-3.5 rounded-full text-[7px] font-black ${pCount >= 3 ? 'bg-red-500 text-white' : 'bg-white text-black'}">${pCount}</span>` : ''}
                          </button>
                          <button onclick="openEditPanel('${c.id}')" class="px-2 py-1 rounded-lg border border-neutral-200 text-[9px] font-black text-neutral-400 hover:border-black hover:text-black transition-all">
                            정보수정
                          </button>
                        </div>
                      </td>
                    </tr>`;
                    }).join('') : `
                    <tr><td colspan="12" class="px-6 py-12 text-center text-neutral-300 text-sm font-bold">데이터가 없습니다</td></tr>
                    `}
                  </tbody>
                </table>
              </div>

              <!-- 페이지네이션 -->
              ${totalPages > 1 ? `
              <div class="flex items-center justify-between px-4 py-3 border-t border-neutral-100 bg-neutral-50">
                <span class="text-[10px] text-neutral-400 font-bold">총 ${filtered.length}건 중 ${crmPage * CRM_PAGE_SIZE + 1}-${Math.min((crmPage + 1) * CRM_PAGE_SIZE, filtered.length)}건</span>
                <div class="flex items-center gap-2">
                  <button onclick="crmPage=0;render();" class="px-3 py-1.5 rounded-lg border border-neutral-200 text-[10px] font-black ${crmPage === 0 ? 'text-neutral-300 cursor-not-allowed' : 'hover:border-black'}" title="처음">
                    <i data-lucide="chevrons-left" class="w-3 h-3"></i>
                  </button>
                  <button onclick="crmPage=Math.max(0,crmPage-1);render();" class="px-3 py-1.5 rounded-lg border border-neutral-200 text-[10px] font-black ${crmPage === 0 ? 'text-neutral-300 cursor-not-allowed' : 'hover:border-black'}">이전</button>
                  <span class="text-[10px] font-black">${crmPage + 1} / ${totalPages}</span>
                  <button onclick="crmPage=Math.min(${totalPages - 1},crmPage+1);render();" class="px-3 py-1.5 rounded-lg border border-neutral-200 text-[10px] font-black ${crmPage >= totalPages - 1 ? 'text-neutral-300 cursor-not-allowed' : 'hover:border-black'}">다음</button>
                  <button onclick="crmPage=${totalPages - 1};render();" class="px-3 py-1.5 rounded-lg border border-neutral-200 text-[10px] font-black ${crmPage >= totalPages - 1 ? 'text-neutral-300 cursor-not-allowed' : 'hover:border-black'}" title="끝">
                    <i data-lucide="chevrons-right" class="w-3 h-3"></i>
                  </button>
                </div>
              </div>
              ` : ''}
            </div>

          </main>
          ${renderFooter()}
        </div>
      `;
    }

    // ===== 정리고객 페이지 (1년 경과 고객 리스트) =====
    let archivedPage = 0;
    let archivedSearch = '';
    let archivedBrandFilter = '전체';
    let archivedSortField = 'date';
    let archivedSortDir = 'asc';
    const ARCHIVED_PAGE_SIZE = 50;

    function getArchivedCustomers() {
      const now = new Date();
      const cutoff = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
      const cutoffStr = cutoff.toISOString().slice(0, 10);

      // 같은 전화번호로 1년 이내 기록이 하나라도 있으면 보호
      const activePhones = new Set();
      customers.forEach(c => {
        const phone = (c.phone || '').replace(/-/g, '');
        if (!phone) return;
        const d = c.date || (c.createdAt?.seconds ? new Date(c.createdAt.seconds * 1000).toISOString().slice(0, 10) : null);
        if (d && d >= cutoffStr) activePhones.add(phone);
      });

      let list = customers.filter(c => {
        const d = c.date || (c.createdAt?.seconds ? new Date(c.createdAt.seconds * 1000).toISOString().slice(0, 10) : null);
        if (!d || d >= cutoffStr) return false;
        const phone = (c.phone || '').replace(/-/g, '');
        if (phone && activePhones.has(phone)) return false;
        return true;
      });

      // 브랜드 필터
      if (archivedBrandFilter !== '전체') list = list.filter(c => c.brand === archivedBrandFilter);

      // 검색
      if (archivedSearch) {
        const q = archivedSearch.toLowerCase();
        list = list.filter(c =>
          (c.phone || '').includes(q) ||
          (c.content || '').toLowerCase().includes(q) ||
          (c.channel || '').toLowerCase().includes(q) ||
          (c.province || '').includes(q) ||
          (c.district || '').includes(q) ||
          (c.brand || '').toLowerCase().includes(q) ||
          (String(c.no) || '').includes(q)
        );
      }

      // 정렬
      list.sort((a, b) => {
        let va = '', vb = '';
        if (archivedSortField === 'date') { va = a.date || ''; vb = b.date || ''; }
        else if (archivedSortField === 'no') { va = a.no || 0; vb = b.no || 0; }
        else if (archivedSortField === 'brand') { va = a.brand || ''; vb = b.brand || ''; }
        else if (archivedSortField === 'channel') { va = a.channel || ''; vb = b.channel || ''; }
        if (typeof va === 'number') return archivedSortDir === 'asc' ? va - vb : vb - va;
        return archivedSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      });

      return list;
    }

    function setArchivedSearch(v) { archivedSearch = v; archivedPage = 0; render(); }
    function setArchivedBrand(v) { archivedBrandFilter = v; archivedPage = 0; render(); }
    function setArchivedSort(field) {
      if (archivedSortField === field) archivedSortDir = archivedSortDir === 'asc' ? 'desc' : 'asc';
      else { archivedSortField = field; archivedSortDir = 'desc'; }
      render();
    }
    function setArchivedPage(p) { archivedPage = p; render(); }

          pages.join('') +
          (archivedPage < totalPages - 1 ? '<button onclick="setArchivedPage(' + (archivedPage + 1) + ')" class="w-8 h-8 rounded-lg text-neutral-400 hover:bg-neutral-100 flex items-center justify-center"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>' : '') +
          '</div>';

      return `

                <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest mt-1">1년 이상 연락 없는 고객 · ${filtered.length}건</p>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="navigate('crm')" class="h-10 px-5 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> 관리고객
                </button>
                <button onclick="navigate('dashboard')" class="h-10 px-5 bg-white border border-neutral-200 rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-black active:scale-[0.98] transition-all flex items-center gap-2">
                  <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> 대시보드
                </button>
              </div>
            </div>

            <!-- 필터 / 검색 -->
            <div class="flex items-center gap-3 mb-4 flex-wrap">
              <select class="input-base text-[11px] w-auto" onchange="setArchivedBrand(this.value)">
                <option value="전체" ${archivedBrandFilter === '전체' ? 'selected' : ''}>전체 브랜드</option>
                <option value="오스카" ${archivedBrandFilter === '오스카' ? 'selected' : ''}>오스카</option>
                <option value="테라까사" ${archivedBrandFilter === '테라까사' ? 'selected' : ''}>테라까사</option>
              </select>

              <div class="overflow-x-auto">
                <table class="w-full text-[11px] border-collapse">
                  <thead>
                    <tr class="bg-neutral-50 border-b border-neutral-200">
                      <th class="px-3 py-3 text-left cursor-pointer select-none" onclick="setArchivedSort('no')">

                      </th>

            <!-- 안내 -->

              <p class="text-[9px] text-neutral-400 font-bold">이 목록은 마지막 문의일로부터 1년 이상 경과한 고객입니다. 같은 전화번호로 1년 이내 재문의 기록이 있는 고객은 자동으로 보호됩니다.</p>

      `;
    }

    function getFilteredCustomers() {
      let list = [...customers];
      if (crmFilter === '-') list = list.filter(c => !CRM_GRADES.includes(c.grade2));
      else if (crmFilter !== '전체') list = list.filter(c => c.grade2 === crmFilter);
      if (crmBrandFilter !== '전체') list = list.filter(c => c.brand === crmBrandFilter);
      // 미배정 필터 (status === '미배정'인 신규 DB만 대상)
      if (crmAssignFilter === '미배정') {
        list = list.filter(c => c.status === '미배정');
      }
      // 다회 문의 필터
      if (crmRepeatFilter !== '전체') {
        const phoneMap = {};
        customers.forEach(c => {
          if (c.phone) { const n = c.phone.replace(/[^0-9]/g, ''); if (n) phoneMap[n] = (phoneMap[n] || 0) + 1; }
        });
        const minCount = crmRepeatFilter === '3회 이상' ? 3 : 2;
        list = list.filter(c => {
          if (!c.phone) return false;
          const n = c.phone.replace(/[^0-9]/g, '');
          return n && (phoneMap[n] || 0) >= minCount;
        });
      }
      if (crmSearch.trim()) {
        const q = crmSearch.trim().toLowerCase();
        const qNoHyphen = q.replace(/-/g, '');
        list = list.filter(c => {
          const phone = (c.phone || '').toLowerCase();
          const phoneNoHyphen = phone.replace(/-/g, '');
          return phone.includes(q) || phoneNoHyphen.includes(qNoHyphen) ||
            (c.content || '').toLowerCase().includes(q) ||
            (c.address || '').toLowerCase().includes(q) ||
            (c.province || '').toLowerCase().includes(q) ||
            (c.district || '').toLowerCase().includes(q) ||
            (c.email || '').toLowerCase().includes(q);
        });
      }
      // 정렬 적용
      list.sort((a, b) => {
        let va = a[crmSortField] || '';
        let vb = b[crmSortField] || '';
        if (crmSortField === 'no') {
          va = Number(va) || 0;
          vb = Number(vb) || 0;
        } else if (crmSortField === 'date') {
          va = String(va).replace(/[^0-9-]/g, '');
          vb = String(vb).replace(/[^0-9-]/g, '');
        } else {
          va = String(va).toLowerCase();
          vb = String(vb).toLowerCase();
        }
        if (va < vb) return crmSortDir === 'asc' ? -1 : 1;
        if (va > vb) return crmSortDir === 'asc' ? 1 : -1;
        return 0;
      });
      return list;
    }

    function setCRMSort(field) {
      if (crmSortField === field) {
        crmSortDir = crmSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        crmSortField = field;
        crmSortDir = field === 'date' || field === 'no' ? 'desc' : 'asc';
      }
      crmPage = 0;
      render();
    }

    function setCRMFilter(g) {
      crmFilter = g;
      crmPage = 0;
      render();
    }

    function toggleCRMForm() {
      const area = document.getElementById('crmFormArea');
      if (area) {
        area.classList.toggle('hidden');
        if (!area.classList.contains('hidden')) {
          // 오늘 날짜 기본값
          const today = new Date().toISOString().split('T')[0];
          const dateEl = document.getElementById('crmDate');
          if (dateEl && !dateEl.value) dateEl.value = today;
        }
      }
    }

    function updateCRMDistrict() {
      const prov = document.getElementById('crmProvince').value;
      const distSelect = document.getElementById('crmDistrict');
      distSelect.innerHTML = '<option value="">선택</option>';
      if (prov && REGIONS_DATA[prov]) {
        REGIONS_DATA[prov].forEach(d => {
          distSelect.innerHTML += `<option value="${d}">${d}</option>`;
        });
      }
    }

    function formatCRMPhone(input) {
      let value = input.value.replace(/[^0-9]/g, '');
      let result = '';
      if (value.length < 4) {
        result = value;
      } else if (value.length < 7) {
        result = value.substr(0, 3) + '-' + value.substr(3);
      } else if (value.length < 11) {
        result = value.substr(0, 3) + '-' + value.substr(3, 3) + '-' + value.substr(6);
      } else {
        result = value.substr(0, 3) + '-' + value.substr(3, 4) + '-' + value.substr(7, 4);
      }
      input.value = result;
    }

    function checkDuplicatePhone(phone) {
      const warningDiv = document.getElementById('phone-duplicate-warning');
      if (!warningDiv) return;
      const cleaned = phone.replace(/[^0-9]/g, '');
      if (cleaned.length < 8) {
        warningDiv.classList.add('hidden');
        warningDiv.innerHTML = '';
        return;
      }
      const matches = customers.filter(c => {
        const cPhone = (c.phone || '').replace(/[^0-9]/g, '');
        return cPhone && cPhone === cleaned;
      });
      if (matches.length === 0) {
        warningDiv.classList.add('hidden');
        warningDiv.innerHTML = '';
        return;
      }
      warningDiv.classList.remove('hidden');
      let html = '<div class="bg-red-50 border border-red-200 rounded-lg p-2 space-y-1">';
      html += '<p class="text-[9px] font-black text-red-500 uppercase tracking-widest">⚠ 기존 고객 ' + matches.length + '건 발견</p>';
      matches.forEach(m => {
        const date = m.date || '날짜없음';
        const channel = m.channel || '채널없음';
        const brand = m.brand || '';
        const product = m.product || '';
        html += '<div class="text-[10px] text-red-600 flex gap-2">';
        html += '<span class="font-bold">' + date + '</span>';
        html += '<span>' + channel + '</span>';
        if (brand) html += '<span class="text-red-400">' + brand + '</span>';
        if (product) html += '<span class="text-red-400 truncate max-w-[120px]">' + product + '</span>';
        html += '</div>';
      });
      html += '</div>';
      warningDiv.innerHTML = html;
    }

    async function saveCRMCustomer() {
      const brand = document.getElementById('crmBrand').value;
      const date = document.getElementById('crmDate').value;
      const channel = document.getElementById('crmChannel').value;
      const consent = document.getElementById('crmConsent').value;
      const phone = document.getElementById('crmPhone').value.trim();
      const email = document.getElementById('crmEmail').value.trim();
      const checkedProducts = document.querySelectorAll('input[name="crmProductCheck"]:checked');
      const product = Array.from(checkedProducts).map(cb => cb.value).join(', ');
      const custType = document.getElementById('crmCustType').value;
      const grade2 = document.getElementById('crmGrade2').value.trim();
      const province = document.getElementById('crmProvince').value;
      const district = document.getElementById('crmDistrict').value;
      const address = document.getElementById('crmAddress').value.trim();
      const manualBranch = document.getElementById('crmAssignedBranch').value;
      const assignedBranch = manualBranch || getAutoAssignedBranch(province);
      const content = document.getElementById('crmContent').value.trim();

      if (!channel) { alert('문의채널을 선택하세요.'); return; }
      if (!content) { alert('상담내용을 입력하세요.'); return; }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        const newNo = customers.length > 0 ? Math.max(...customers.map(c => c.no || 0)) + 1 : 1;
        const dateObj = date ? new Date(date) : new Date();
        const yearStr = dateObj.getFullYear() + '년';
        const monthStr = (dateObj.getMonth() + 1) + '월';

        await addDoc(collection(db, 'crm_customers'), {
          no: newNo,
          brand, date, year: yearStr, month: monthStr,
          channel, consent, phone, email,
          product, custType, grade: grade2, grade2,
          province, district, address, assignedBranch, content,
          status: (!grade2) ? '미배정' : '',
          createdAt: serverTimestamp()
        });
        // 아카이브에 같은 전화번호 고객이 있으면 자동 복원
        if (phone) {
          const restored = await restoreArchivedByPhone(phone);
          if (restored > 0) {
            alert(`고객 정보가 저장되었습니다.\n\n📋 이전 정리된 이력 ${restored}건이 자동 복원되었습니다.`);
          } else {
            alert('고객 정보가 저장되었습니다.');
          }
        } else {
          alert('고객 정보가 저장되었습니다.');
        }
        toggleCRMForm();
        // 폼 초기화
        ['crmChannel','crmPhone','crmEmail','crmGrade2','crmProvince','crmDistrict','crmAddress','crmAssignedBranch','crmContent'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.tagName === 'SELECT' ? el.selectedIndex = 0 : el.value = '';
        });
        document.querySelectorAll('input[name="crmProductCheck"]').forEach(cb => cb.checked = false);
        const warn = document.getElementById('phone-duplicate-warning');
        if (warn) { warn.classList.add('hidden'); warn.innerHTML = ''; }
      } catch(e) {
        console.error('CRM save error:', e);
        alert('저장 실패: ' + e.message);
      }
    }

    // 테스트용 발주 데이터 시드

    async function importCRMData() {
      if (!confirm('기존 엑셀 데이터 4,069건을 Firestore에 임포트합니다.\n시간이 1~2분 소요됩니다. 진행하시겠습니까?')) return;
      const btn = document.getElementById('crmImportBtn');
      if (btn) { btn.disabled = true; btn.textContent = '임포트 중...'; }

      try {
        const resp = await fetch('./crm_data.json');
        const data = await resp.json();
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;

        let imported = 0;
        const total = data.length;
        const CHUNK = 50;

        for (let i = 0; i < total; i += CHUNK) {
          const slice = data.slice(i, i + CHUNK);
          const promises = slice.map(record => {
            return addDoc(collection(db, 'crm_customers'), {
              ...record,
              createdAt: serverTimestamp()
            });
          });
          await Promise.all(promises);
          imported += slice.length;
          if (btn) btn.textContent = `${imported}/${total} (${Math.round(imported/total*100)}%)`;
        }

        alert(`✅ 임포트 완료! ${imported}건 저장됨`);
        if (btn) btn.remove();
      } catch(e) {
        console.error('Import error:', e);
        alert('임포트 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = '데이터 임포트'; }
      }
    }
