      const sortIcon = function(field) {
        if (archivedSortField !== field) return '<i data-lucide="arrow-up-down" class="w-2.5 h-2.5 opacity-30"></i>';
        return archivedSortDir === 'asc' ? '<i data-lucide="arrow-up" class="w-2.5 h-2.5"></i>' : '<i data-lucide="arrow-down" class="w-2.5 h-2.5"></i>';
      };

      // 테이블 행 HTML
      const tableRowsHTML = paged.length > 0 ? paged.map(function(c) {
        const displayGrade = c.grade2 || c.grade || '-';
        const gradeClass = CRM_GRADE_COLORS[displayGrade] || 'bg-neutral-50 text-neutral-400 border-neutral-200';
        const archivedDate = c.archivedAt ? (typeof c.archivedAt === 'string' ? c.archivedAt.slice(0, 10) : (c.archivedAt.seconds ? timestampToDateKST(c.archivedAt.seconds) : '-')) : '-';
        return '<tr class="border-b border-neutral-100 hover:bg-neutral-50 transition-colors">' +
          '<td class="px-3 py-3 text-neutral-400 font-bold">' + (c.no || '-') + '</td>' +

          '<td class="px-3 py-3 text-neutral-600 font-bold text-[9px] leading-tight">' + (c.createdAt ? formatDateTime(c.createdAt) : (c.date || '-')) + '</td>' +
          '<td class="px-3 py-3 font-bold">' + (c.channel || '-') + '</td>' +
          '<td class="px-3 py-3 font-bold">' + (c.phone || '-') + '</td>' +
          '<td class="px-3 py-3 font-bold text-[9px] leading-relaxed">' + (c.product ? c.product.split(',').map(function(p){return p.trim()}).filter(Boolean).join('<br>') : '-') + '</td>' +
          '<td class="px-3 py-3 font-bold">' + (c.custType || '-') + '</td>' +
          '<td class="px-3 py-3"><span class="text-[9px] font-black px-2 py-0.5 rounded border ' + gradeClass + '">' + displayGrade + '</span></td>' +
          '<td class="px-3 py-3 text-neutral-500 max-w-[200px] truncate hidden md:table-cell">' + (c.content || '-') + '</td>' +
          '<td class="px-3 py-3 text-neutral-500 hidden md:table-cell">' + [c.province, c.district].filter(Boolean).join(' ') + '</td>' +
          '<td class="px-3 py-3"><span class="text-[9px] font-black px-1.5 py-0.5 rounded ' + (c.assignedBranch ? 'bg-green-50 text-green-600' : 'text-neutral-400') + '">' + (normalizeBranchName(c.assignedBranch) || '-') + '</span></td>' +
          '<td class="px-3 py-3 text-center text-[9px] text-neutral-400 font-bold">' + archivedDate + '</td></tr>';
      }).join('') : '<tr><td colspan="12" class="px-6 py-12 text-center text-neutral-300 text-sm font-bold">정리 완료된 고객이 없습니다</td></tr>';

      // 페이지네이션 HTML (축약형: 처음2 ... 현재±2 ... 끝2)
      let paginationHTML = '';
      if (totalPages > 1) {
        const btnClass = function(i) {
          return 'w-8 h-8 rounded-lg text-[10px] font-black transition-all ' + (archivedPage === i ? 'bg-black text-white' : 'text-neutral-400 hover:bg-neutral-100');
        };
        const pageBtn = function(i) {
          return '<button onclick="setArchivedPage(' + i + ')" class="' + btnClass(i) + '">' + (i + 1) + '</button>';
        };
        const ellipsis = '<span class="w-8 h-8 flex items-center justify-center text-[10px] text-neutral-300">...</span>';

        let pages = '';
        if (totalPages <= 9) {
          for (let i = 0; i < totalPages; i++) pages += pageBtn(i);
        } else {
          // 항상 표시: 0, 1, totalPages-2, totalPages-1
          // 현재 주변: archivedPage-1, archivedPage, archivedPage+1
          const visible = new Set([0, 1, totalPages - 2, totalPages - 1]);
          for (let i = archivedPage - 1; i <= archivedPage + 1; i++) {
            if (i >= 0 && i < totalPages) visible.add(i);
          }
          const sorted = [...visible].sort((a, b) => a - b);
          let prev = -1;
          sorted.forEach(function(i) {
            if (prev !== -1 && i - prev > 1) pages += ellipsis;
            pages += pageBtn(i);
            prev = i;
          });
        }

        paginationHTML = '<div class="flex items-center justify-center gap-1 mt-6">' +
          (archivedPage > 0 ? '<button onclick="setArchivedPage(' + (archivedPage - 1) + ')" class="w-8 h-8 rounded-lg text-neutral-400 hover:bg-neutral-100 flex items-center justify-center"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>' : '') +
          pages +
          (archivedPage < totalPages - 1 ? '<button onclick="setArchivedPage(' + (archivedPage + 1) + ')" class="w-8 h-8 rounded-lg text-neutral-400 hover:bg-neutral-100 flex items-center justify-center"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>' : '') +
          '</div>';

      return `
        <div class="min-h-screen bg-white animate-fade-in">

              </div>

              </select>
              <div class="flex-1 relative">
                <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-neutral-300"></i>
                <input type="text" id="archivedSearchInput" class="input-base pl-9 text-[11px] w-full" placeholder="검색 (전화번호, 내용, 지역...)" value="${archivedSearch}" oninput="setArchivedSearch(this.value)" />
              </div>
            </div>

            <!-- 테이블 -->
            <div class="border border-neutral-200 rounded-2xl overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-[11px] border-collapse">
                  <thead>
                    <tr class="bg-neutral-50 border-b border-neutral-200">
                      <th class="px-3 py-3 text-left cursor-pointer select-none" onclick="setArchivedSort('no')">
                        <span class="flex items-center gap-1 text-[9px] font-black text-neutral-400 uppercase tracking-widest">No ${sortIcon('no')}</span>
                      </th>
                      <th class="px-3 py-3 text-left cursor-pointer select-none" onclick="setArchivedSort('brand')">
                        <span class="flex items-center gap-1 text-[9px] font-black text-neutral-400 uppercase tracking-widest">브랜드 ${sortIcon('brand')}</span>
                      </th>
                      <th class="px-3 py-3 text-left cursor-pointer select-none" onclick="setArchivedSort('date')">
                        <span class="flex items-center gap-1 text-[9px] font-black text-neutral-400 uppercase tracking-widest">날짜 ${sortIcon('date')}</span>
                      </th>
                      <th class="px-3 py-3 text-left cursor-pointer select-none" onclick="setArchivedSort('channel')">
                        <span class="flex items-center gap-1 text-[9px] font-black text-neutral-400 uppercase tracking-widest">채널 ${sortIcon('channel')}</span>
                      </th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest">연락처</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest">제품</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest">유형</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest">등급</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest hidden md:table-cell">상담내용</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest hidden md:table-cell">지역</th>
                      <th class="px-3 py-3 text-left text-[9px] font-black text-neutral-400 uppercase tracking-widest">배정</th>
                      <th class="px-3 py-3 text-center text-[9px] font-black text-neutral-400 uppercase tracking-widest">정리일</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${tableRowsHTML}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- 페이지네이션 -->
            ${paginationHTML}

            <!-- 새로고침 + 안내 -->
            <div class="mt-6 flex items-center justify-between">
              <div class="p-4 bg-neutral-50 rounded-xl flex-1">
                <p class="text-[9px] text-neutral-400 font-bold">이 목록은 고객정리를 통해 아카이브 처리 완료된 고객입니다. 아카이브된 고객은 활성 CRM 목록에서 제외됩니다.</p>
              </div>
              <button onclick="archivedCustomers=[]; loadArchivedCustomers()" class="ml-3 h-9 px-4 bg-white border border-neutral-200 rounded-xl text-[9px] font-black text-neutral-500 hover:border-black hover:text-black transition-all flex items-center gap-1.5">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> 새로고침
              </button>
            </div>

          </main>
          ${renderFooter()}
        </div>
      `;
    }

    function getFilteredCustomers() {
      let list = [...getBranchBaseCustomers()];
      if (crmFilter === '-') list = list.filter(c => !CRM_GRADES.includes(c.grade2));
      else if (crmFilter !== '전체') list = list.filter(c => c.grade2 === crmFilter);
      if (crmBrandFilter !== '전체') list = list.filter(c => c.brand === crmBrandFilter);
      // 지사별 모아보기에서 클릭 시 해당 지사 필터
      if (crmBranchFilter) { list = list.filter(c => (c.assignedBranch || '미배정') === crmBranchFilter); }
      // 미배정 필터 (status === '미배정'인 신규 DB만 대상)
      if (crmAssignFilter === '미배정') {
        list = list.filter(c => c.status === '미배정');
      }
      // 다회 문의 필터
      if (crmRepeatFilter !== '전체') {
        const phoneMap = {};
        customers.forEach(c => {
          if (c.phone) { const n = c.phone.replace(/[^0-9]/g, ''); if (n) phoneMap[n] = (phoneMap[n] || 0) + 1; }
        });
        const minCount = crmRepeatFilter === '3회 이상' ? 3 : 2;
        list = list.filter(c => {
          if (!c.phone) return false;
          const n = c.phone.replace(/[^0-9]/g, '');
          return n && (phoneMap[n] || 0) >= minCount;
        });
      }
      if (crmSearch.trim()) {
        const q = crmSearch.trim().toLowerCase();
        const qNoHyphen = q.replace(/-/g, '');
        list = list.filter(c => {
          const phone = (c.phone || '').toLowerCase();
          const phoneNoHyphen = phone.replace(/-/g, '');
          return phone.includes(q) || phoneNoHyphen.includes(qNoHyphen) ||
            (c.content || '').toLowerCase().includes(q) ||
            (c.address || '').toLowerCase().includes(q) ||
            (c.province || '').toLowerCase().includes(q) ||
            (c.district || '').toLowerCase().includes(q) ||
            (c.email || '').toLowerCase().includes(q);
        });
      }
      // 정렬 적용
      list.sort((a, b) => {
        let va = a[crmSortField] || '';
        let vb = b[crmSortField] || '';
        if (crmSortField === 'no') {
          va = Number(va) || 0;
          vb = Number(vb) || 0;
        } else if (crmSortField === 'date') {
          va = String(va).replace(/[^0-9-]/g, '');
          vb = String(vb).replace(/[^0-9-]/g, '');
        } else {
          va = String(va).toLowerCase();
          vb = String(vb).toLowerCase();
        }
        if (va < vb) return crmSortDir === 'asc' ? -1 : 1;
        if (va > vb) return crmSortDir === 'asc' ? 1 : -1;
        return 0;
      });
      return list;
    }

    function setCRMSort(field) {
      if (crmSortField === field) {
        crmSortDir = crmSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        crmSortField = field;
        crmSortDir = field === 'date' || field === 'no' ? 'desc' : 'asc';
      }
      crmPage = 0;
      render();
    }

    function setCRMFilter(g) {
      crmFilter = g;
      crmPage = 0;
      render();
    }

    // 지사 배정 필터 (드롭다운 통합 핸들러)
    function setCRMAssignFilter(value) {
      crmPage = 0;
      if (value === '') {
        // 전체
        crmBranchFilter = '';
        crmAssignFilter = '전체';
      } else if (value === '__미배정__') {
        // 미배정만
        crmBranchFilter = '';
        crmAssignFilter = '미배정';
      } else {
        // 특정 지사 (본사 포함)
        crmBranchFilter = value;
        crmAssignFilter = '전체';
      }
      render();
    }

    async function submitSiteVisit() {
      const date = document.getElementById('visitDate').value;
      const time = document.getElementById('visitTime').value;
      const phone = document.getElementById('visitPhone').value.trim();
      const customer = document.getElementById('visitCustomer').value.trim();
      const brand = document.getElementById('visitBrand').value;
      const product = document.getElementById('visitProduct').value;
      const custType = document.getElementById('visitCustType').value;
      const province = document.getElementById('visitProvince').value;
      const district = document.getElementById('visitDistrict').value;
      const address = document.getElementById('visitAddress').value.trim();
      const memo = document.getElementById('visitMemo').value.trim();

      if (!date || !phone) { alert('방문일과 전화번호를 입력하세요.'); return; }

      // 상세주소 + 메모 → 상담내용으로 합침
      const content = [address ? `[주소] ${address}` : '', memo].filter(Boolean).join(' / ');

      // 지사 배정: 로그인한 사용자의 지사
      const assignedBranch = currentBranch || '본사';

      // 날짜에서 연/월 추출
      const [year, month] = date.split('-');

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;

        // 1. works_schedules에 일정 저장
        await addDoc(collection(db, 'works_schedules'), {
          type: 'site_visit',
          title: `[현장방문] ${customer || phone}`,
          date: date,
          time: time || '',
          phone: phone,
          customer: customer,
          brand: brand,
          product: product,
          province: province,
          district: district,
          address: [province, district, address].filter(Boolean).join(' '),
          memo: memo,
          branch: assignedBranch,
          manager: currentManager || '',
          createdAt: serverTimestamp()
        });

        // 2. crm_customers에 고객 등록
        const newNo = customers.length > 0 ? Math.max(...customers.map(c => c.no || 0)) + 1 : 1;
        await addDoc(collection(db, 'crm_customers'), {
          no: newNo,
          brand: brand,
          date: date,
          year: year || '',
          month: month || '',
          channel: '현장방문',
          phone: phone,
          email: '',
          custType: custType,
          product: product,
          grade: '',
          grade2: '',
          province: province,
          district: district,
          address: [province, district, address].filter(Boolean).join(' '),
          content: content,
          consent: '',
          assignedBranch: assignedBranch,
          status: assignedBranch ? '배정완료' : '미배정',
          manager: currentManager || '',
          source: 'live',
          createdAt: serverTimestamp()
        });

        // 알람: 본사에 현장방문 알람
        await pushWorkNotification(
          '[현장방문] ' + assignedBranch + ' — ' + (customer || phone) + (product ? ' (' + product + ')' : ''),
          'site_visit', 'hq'
        );
        alert('✅ 현장방문 일정과 CRM 고객이 등록되었습니다.');
        document.getElementById('siteVisitPanel').remove();
      } catch(e) {
        console.error('Site visit save error:', e);
        alert('저장 실패: ' + e.message);
      }
    }

    function formatCRMPhone(input) {
      let value = input.value.replace(/[^0-9]/g, '');
      if (value.length > 11) value = value.substr(0, 11);
      let result = '';
      if (value.length < 4) {
        result = value;
      } else if (value.length < 7) {
        result = value.substr(0, 3) + '-' + value.substr(3);
      } else if (value.length < 11) {
        result = value.substr(0, 3) + '-' + value.substr(3, 3) + '-' + value.substr(6);
      } else {
        result = value.substr(0, 3) + '-' + value.substr(3, 4) + '-' + value.substr(7, 4);
      }
      input.value = result;
    }

    function checkDuplicatePhone(phone) {
      const warningDiv = document.getElementById('phone-duplicate-warning');
      if (!warningDiv) return;
      const cleaned = phone.replace(/[^0-9]/g, '');
      if (cleaned.length < 8) {
        warningDiv.classList.add('hidden');
        warningDiv.innerHTML = '';
        return;
      }
      const matches = customers.filter(c => {
        const cPhone = (c.phone || '').replace(/[^0-9]/g, '');
        return cPhone && cPhone === cleaned;
      });
      if (matches.length === 0) {
        warningDiv.classList.add('hidden');
        warningDiv.innerHTML = '';
        return;
      }
      warningDiv.classList.remove('hidden');
      let html = '<div class="bg-red-50 border border-red-200 rounded-lg p-2 space-y-1">';
      html += '<p class="text-[9px] font-black text-red-500 uppercase tracking-widest">⚠ 기존 고객 ' + matches.length + '건 발견</p>';
      matches.forEach(m => {
        const date = m.date || '날짜없음';
        const channel = m.channel || '채널없음';
        const brand = m.brand || '';
        const product = m.product || '';
        html += '<div class="text-[10px] text-red-600 flex gap-2">';
        html += '<span class="font-bold">' + date + '</span>';
        html += '<span>' + channel + '</span>';
        if (brand) html += '<span class="text-red-400">' + brand + '</span>';
        if (product) html += '<span class="text-red-400 truncate max-w-[120px]">' + product + '</span>';
        html += '</div>';
      });
      html += '</div>';
      warningDiv.innerHTML = html;
    }

    async function saveCRMCustomer() {
      const brand = document.getElementById('crmBrand').value;
      const date = document.getElementById('crmDate').value;
      const channel = document.getElementById('crmChannel').value;
      const consent = document.getElementById('crmConsent').value;
      const phone = document.getElementById('crmPhone').value.trim();
      const email = document.getElementById('crmEmail').value.trim();
      const checkedProducts = document.querySelectorAll('input[name="crmProductCheck"]:checked');
      const product = Array.from(checkedProducts).map(cb => cb.value).join(', ');
      const custType = document.getElementById('crmCustType').value;
      const grade2 = document.getElementById('crmGrade2').value.trim();
      const province = document.getElementById('crmProvince').value;
      const district = document.getElementById('crmDistrict').value;
      const address = document.getElementById('crmAddress').value.trim();
      const manualBranch = document.getElementById('crmAssignedBranch').value;
      // 지사 로그인: 자기 지사로 자동 배정
      const assignedBranch = (currentType !== 'hq' && currentBranch) ? currentBranch : (manualBranch || getAutoAssignedBranch(province));
      const content = document.getElementById('crmContent').value.trim();

      if (!channel) { alert('문의채널을 선택하세요.'); return; }
      if (!content) { alert('상담내용을 입력하세요.'); return; }

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        const newNo = customers.length > 0 ? Math.max(...customers.map(c => c.no || 0)) + 1 : 1;
        const dateObj = date ? new Date(date) : new Date();
        const yearStr = dateObj.getFullYear() + '년';
        const monthStr = (dateObj.getMonth() + 1) + '월';

        await addDoc(collection(db, 'crm_customers'), {
          no: newNo,
          brand, date, year: yearStr, month: monthStr,
          channel, consent, phone, email,
          product, custType, grade: grade2, grade2,
          province, district, address, assignedBranch, content,
          status: (!grade2) ? '미배정' : '',
          source: 'live',
          createdAt: serverTimestamp()
        });
        // 아카이브에 같은 전화번호 고객이 있으면 자동 복원
        if (phone) {
          const restored = await restoreArchivedByPhone(phone);
          if (restored > 0) {
            alert(`고객 정보가 저장되었습니다.\n\n📋 이전 정리된 이력 ${restored}건이 자동 복원되었습니다.`);
          } else {
            alert('고객 정보가 저장되었습니다.');
          }
        } else {
          alert('고객 정보가 저장되었습니다.');
        }
        toggleCRMForm();
        // 폼 초기화
        ['crmChannel','crmPhone','crmEmail','crmGrade2','crmProvince','crmDistrict','crmAddress','crmAssignedBranch','crmContent'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.tagName === 'SELECT' ? el.selectedIndex = 0 : el.value = '';
        });
        document.querySelectorAll('input[name="crmProductCheck"]').forEach(cb => cb.checked = false);
        const warn = document.getElementById('phone-duplicate-warning');
        if (warn) { warn.classList.add('hidden'); warn.innerHTML = ''; }
      } catch(e) {
        console.error('CRM save error:', e);
        alert('저장 실패: ' + e.message);
      }
    }

    async function executeArchive(cutoffStr) {
      if (!confirm(`${cutoffStr} 이전 등록 고객 중 최근 활동 없는 고객을 아카이브로 이동합니다.\n이 작업은 되돌릴 수 없습니다. 진행하시겠습니까?`)) return;

      const btn = document.getElementById('archiveExecBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 처리 중...'; }

      try {
        const { db, collection, addDoc, doc, deleteDoc, getDocs } = window.WORKS_DB;
        // 시간대 문제 방지: 패널과 동일한 방식으로 로컬 시간 기준 cutoff 계산
        // cutoffStr은 toISOString()로 UTC 변환된 값이므로 직접 파싱하면 KST에서 하루 차이 발생
        const now = new Date();
        const cutoff = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());

        const snap = await getDocs(collection(db, 'crm_customers'));
        const allDocs = [];
        snap.forEach(d => allDocs.push({ id: d.id, data: d.data() }));

        // 고객 단위 보호
        const cutoffTime = cutoff.getTime();
        const recentPhones = new Set();
        allDocs.forEach(({ data }) => {
          const phone = (data.phone || '').replace(/-/g, '');
          if (!phone) return;
          const d = getCustomerDate(data);
          if (d && d.getTime() >= cutoffTime) recentPhones.add(phone);
        });

        const toArchive = allDocs.filter(({ data }) => {
          const d = getCustomerDate(data);
          if (!d || d.getTime() >= cutoffTime) return false;
          const phone = (data.phone || '').replace(/-/g, '');
          if (phone && recentPhones.has(phone)) return false;
          return true;
        });

        // 이미 아카이브된 원본 ID 목록 수집 (중복 방지)
        const existingArchiveSnap = await getDocs(collection(db, 'crm_customers_archive'));
        const archivedOriginalIds = new Set();
        existingArchiveSnap.forEach(d => {
          const origId = d.data().originalDocId;
          if (origId) archivedOriginalIds.add(origId);
        });

        const CHUNK = 20;
        let moved = 0;
        let skipped = 0;
        for (let i = 0; i < toArchive.length; i += CHUNK) {
          const slice = toArchive.slice(i, i + CHUNK);
          await Promise.all(slice.map(async ({ id, data }) => {
            try {
              if (archivedOriginalIds.has(id)) {
                // 이미 아카이브에 있으면 원본만 삭제
                await deleteDoc(doc(db, 'crm_customers', id));
                skipped++;
              } else {
                await addDoc(collection(db, 'crm_customers_archive'), {
                  ...data, archivedAt: new Date().toISOString(), originalDocId: id
                });
                await deleteDoc(doc(db, 'crm_customers', id));
              }
              moved++;
            } catch(err) {
              console.warn('아카이브 건너뜀:', id, err.message);
              moved++;
            }
          }));
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${moved}/${toArchive.length}`;
        }

        alert(`✅ 고객정리 완료!\n${moved}건이 아카이브로 이동되었습니다.`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Archive error:', e);
        alert('고객정리 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="archive" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    /* ── 자동 복원: 새 문의 등록 시 같은 전화번호의 아카이브 데이터 자동 복원 ── */
    async function restoreArchivedByPhone(phone) {
      if (!phone) return 0;
      const cleanPhone = phone.replace(/-/g, '');
      try {
        const { db, collection, addDoc, doc, deleteDoc, getDocs, serverTimestamp } = window.WORKS_DB;
        const snap = await getDocs(collection(db, 'crm_customers_archive'));
        const toRestore = [];
        snap.forEach(d => {
          const data = d.data();
          const archPhone = (data.phone || '').replace(/-/g, '');
          if (archPhone === cleanPhone) toRestore.push({ id: d.id, data });
        });
        if (toRestore.length === 0) return 0;

        for (const { id, data } of toRestore) {
          const { archivedAt, originalDocId, ...restoreData } = data;
          await addDoc(collection(db, 'crm_customers'), {
            ...restoreData, restoredAt: new Date().toISOString(), restoredFrom: 'archive'
          });
          await deleteDoc(doc(db, 'crm_customers_archive', id));
        }
        return toRestore.length;
      } catch(e) { console.error('Restore error:', e); return 0; }
    }

    /* ── 과거 데이터 임포트 (2020~2024) ── */
    async function importLegacyData() {
      if (!confirm('2020~2024년 과거 문의 데이터 11,250건을 CRM에 추가합니다.\n\n⚠ 이전에 중단된 임포트 데이터가 있으면 자동으로 정리 후 다시 시작합니다.\n시간이 3~5분 소요될 수 있습니다. 진행하시겠습니까?')) return;

      const btn = document.getElementById('legacyImportBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 준비 중...'; }

      try {
        const { db, collection, addDoc, getDocs, doc, deleteDoc, serverTimestamp } = window.WORKS_DB;

        // 1단계: 이전 임포트 데이터 정리 (2024년 이전 날짜 + createdAt이 오늘인 문서 = 레거시 임포트 데이터)
        if (btn) btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 기존 데이터 정리 중...';
        const snap = await getDocs(collection(db, 'crm_customers'));
        const toDelete = [];
        const today = getTodayKST();
        snap.forEach(d => {
          const data = d.data();
          // 레거시 데이터 판별: date가 2025년 이전 + brand가 OSKA + createdAt이 오늘
          if (data.brand === 'OSKA' && data.date && data.date < '2025-01-01') {
            const createdDate = data.createdAt?.seconds
              ? timestampToDateKST(data.createdAt.seconds)
              : '';
            if (createdDate === today) {
              toDelete.push(d.id);
            }
          }
        });

        if (toDelete.length > 0) {
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${toDelete.length}건 정리 중...`;
          const DEL_CHUNK = 50;
          for (let i = 0; i < toDelete.length; i += DEL_CHUNK) {
            const slice = toDelete.slice(i, i + DEL_CHUNK);
            await Promise.all(slice.map(id => deleteDoc(doc(db, 'crm_customers', id))));
            if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 정리 ${Math.min(i + DEL_CHUNK, toDelete.length)}/${toDelete.length}`;
          }
        }

        // 2단계: JSON 로드 및 임포트
        if (btn) btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 데이터 로딩...';
        const resp = await fetch('../crm_import_legacy.json');
        const data = await resp.json();

        // 기존 최대 no 값 가져오기 (정리 후 다시 계산)
        const freshSnap = await getDocs(collection(db, 'crm_customers'));
        let maxNo = 0;
        freshSnap.forEach(d => {
          const no = d.data().no || 0;
          if (no > maxNo) maxNo = no;
        });

        let imported = 0;
        const total = data.length;
        const CHUNK = 50;

        for (let i = 0; i < total; i += CHUNK) {
          const slice = data.slice(i, i + CHUNK);
          const promises = slice.map(record => {
            maxNo++;
            return addDoc(collection(db, 'crm_customers'), {
              ...record,
              no: maxNo,
              source: 'import',
              createdAt: serverTimestamp()
            });
          });
          await Promise.all(promises);
          imported += slice.length;
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> ${imported}/${total} (${Math.round(imported/total*100)}%)`;
        }

        alert(`✅ 임포트 완료!\n${toDelete.length > 0 ? `기존 ${toDelete.length}건 정리 후 ` : ''}${imported}건 추가됨\n\n고객정리를 실행하면 1년 경과 데이터가 자동으로 아카이브됩니다.`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Legacy import error:', e);
        alert('임포트 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="upload" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    /* ── 중복 데이터 정리 ── */
    // ===== 미배정 고객 → 본사 일괄 배정 (#6) =====
    async function bulkAssignToHQ() {
      // AS접수 채널은 수동 배정 — 대상에서 제외
      // status가 '미배정'이거나 assignedBranch가 비어있는 고객 모두 포함
      const unassigned = customers.filter(c =>
        (c.status === '미배정' || !c.assignedBranch || c.assignedBranch.trim() === '') &&
        getChannelType(c.channel) !== 'A/S'
      );
      if (unassigned.length === 0) {
        alert('미배정 고객이 없습니다.\n(AS접수 고객은 수동 배정 대상이므로 제외됩니다)');
        return;
      }
      if (!confirm(`미배정 고객 ${unassigned.length.toLocaleString()}건을 "본사"로 일괄 배정합니다.\n(AS접수 고객은 제외)\n\n⚠️ 이 작업은 되돌릴 수 없습니다.\n\n진행하시겠습니까?`)) return;

      // 버튼 비활성화 + 진행 표시
      const btn = document.querySelector('button[onclick="bulkAssignToHQ()"]');
      const origHTML = btn ? btn.innerHTML : '';
      if (btn) { btn.disabled = true; btn.innerHTML = '⏳ 진행 중...'; }

      try {
        const { db, doc, updateDoc, serverTimestamp } = window.WORKS_DB;
        let done = 0;
        const batchSize = 30; // 더 안전하게 30건씩
        for (let i = 0; i < unassigned.length; i += batchSize) {
          const batch = unassigned.slice(i, i + batchSize);
          await Promise.all(batch.map(c =>
            updateDoc(doc(db, 'crm_customers', c.id), {
              assignedBranch: c.assignedBranch && c.assignedBranch.trim() ? c.assignedBranch : '본사',
              status: '배정완료',
              updatedAt: serverTimestamp()
            })
          ));
          done += batch.length;
          if (btn) btn.innerHTML = `⏳ ${done}/${unassigned.length}건...`;
          await new Promise(r => setTimeout(r, 100)); // Firestore 부하 방지
        }
        if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
        alert(`✅ ${done.toLocaleString()}건이 본사로 배정되었습니다.`);
      } catch(e) {
        console.error('bulkAssignToHQ error:', e);
        if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
        alert('오류 발생: ' + e.message + '\n\nF12 콘솔에서 상세 오류를 확인하세요.');
      }
    }

    // ===== 시/도 전체명 → 약칭 일괄 변환 (일회성 마이그레이션) =====
    async function fixProvinceAbbr() {
      const targets = customers.filter(c => PROVINCE_NORMALIZE[c.province]);
      if (targets.length === 0) { alert('수정이 필요한 고객이 없습니다.'); return; }
      if (!confirm(`시/도 전체명으로 저장된 고객 ${targets.length}건을 약칭으로 일괄 변환합니다.\n예: 서울특별시 → 서울\n\n진행하시겠습니까?`)) return;
      const { db, doc, updateDoc } = window.WORKS_DB;
      let done = 0;
      for (let i = 0; i < targets.length; i += 50) {
        const batch = targets.slice(i, i + 50);
        await Promise.all(batch.map(c =>
          updateDoc(doc(db, 'crm_customers', c.id), { province: PROVINCE_NORMALIZE[c.province] })
        ));

      }
      alert(`✅ ${done}건 변환 완료 (서울특별시→서울 등)`);
    }

    async function deduplicateLegacyData() {
      if (!confirm('레거시 임포트로 인한 중복 데이터를 정리합니다.\n\n같은 날짜 + 같은 전화번호를 가진 레코드 중 최신 1건만 남기고 나머지를 삭제합니다.\n\n진행하시겠습니까?')) return;

      const btn = document.getElementById('dedupBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 분석 중...'; }

      try {
        const { db, collection, getDocs, doc, deleteDoc } = window.WORKS_DB;
        const snap = await getDocs(collection(db, 'crm_customers'));

        // 레거시 데이터만 추출 (brand=OSKA, date<2025)
        const legacyDocs = [];
        snap.forEach(d => {
          const data = d.data();
          if (data.brand === 'OSKA' && data.date && data.date < '2025-01-01') {
            legacyDocs.push({ id: d.id, ...data });
          }
        });

        // date+phone 기준 그루핑
        const groups = {};
        legacyDocs.forEach(d => {
          const key = (d.date || '') + '|' + (d.phone || '').replace(/-/g, '');
          if (!groups[key]) groups[key] = [];
          groups[key].push(d);
        });

        // 중복 찾기: 그룹에 2개 이상이면 최신 1개 빼고 삭제 대상
        const toDelete = [];
        Object.values(groups).forEach(group => {
          if (group.length > 1) {
            // createdAt 기준 정렬 (최신이 앞으로)
            group.sort((a, b) => {
              const aTime = a.createdAt?.seconds || 0;
              const bTime = b.createdAt?.seconds || 0;
              return bTime - aTime;
            });
            // 첫 번째(최신) 빼고 나머지 삭제
            for (let i = 1; i < group.length; i++) {
              toDelete.push(group[i].id);
            }
          }
        });

        if (toDelete.length === 0) {
          alert('중복 데이터가 없습니다. 정상 상태입니다.');
          if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 중복 데이터 정리'; }
          return;
        }

        if (!confirm(`${toDelete.length}건의 중복 데이터를 발견했습니다.\n삭제하시겠습니까?`)) {
          if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 중복 데이터 정리'; }
          return;
        }

        const DEL_CHUNK = 50;
        for (let i = 0; i < toDelete.length; i += DEL_CHUNK) {
          const slice = toDelete.slice(i, i + DEL_CHUNK);
          await Promise.all(slice.map(id => deleteDoc(doc(db, 'crm_customers', id))));
          if (btn) btn.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 삭제 ${Math.min(i + DEL_CHUNK, toDelete.length)}/${toDelete.length}`;
        }

        alert(`✅ 중복 정리 완료!\n${toDelete.length}건 삭제됨\n\n레거시 데이터 ${legacyDocs.length - toDelete.length}건 유지`);
        document.getElementById('archiveOverlay')?.remove();
      } catch(e) {
        console.error('Dedup error:', e);
        alert('중복 정리 실패: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 다시 시도'; }
      }
    }

    async function openCustomerHistory(phone, docId) {
      const hasPhone = phone && phone !== '-' && phone.trim() !== '';
      const phoneNorm = hasPhone ? phone.replace(/[^0-9]/g, '') : '';

      let records = [];

      if (hasPhone) {
        // 전화번호가 있으면 같은 번호 전체 검색
        records = customers.filter(c => c.phone && c.phone.replace(/[^0-9]/g, '') === phoneNorm);

        // 아카이브 컬렉션에서도 검색
        try {
          const { db, collection, query, where, getDocs } = window.WORKS_DB;
          if (db) {
            const archiveSnap = await getDocs(collection(db, 'crm_customers_archive'));
            archiveSnap.forEach(doc => {
              const d = doc.data();
              if (d.phone && d.phone.replace(/[^0-9]/g, '') === phoneNorm) {
                records.push({ ...d, id: doc.id, _archived: true });
              }
            });
          }

      } else if (docId) {

    async function saveProjectLink() {
      const phonesInput = document.getElementById('projectPhones').value.trim();
      const projectName = document.getElementById('projectName').value.trim();

      if (!phonesInput) {
        alert('전화번호를 입력하세요.');
        return;
      }

      // 전화번호 파싱 (쉼표 또는 줄바꿈으로 구분)
      const phoneList = phonesInput.split(/[\n,]/g).map(p => p.trim()).filter(p => p && p !== '-');

      if (phoneList.length === 0) {
        alert('유효한 전화번호가 없습니다.');
        return;
      }

      // 고유 그룹 ID 생성
      const groupId = 'PG_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

      // Firestore에서 고객 찾기 및 업데이트
      const { db, doc, updateDoc } = window.WORKS_DB;
      if (!db) {
        alert('Firebase 연결 오류');
        return;
      }

      let updatedCount = 0;
      let foundPhones = [];

      for (const phone of phoneList) {
        const phoneNorm = phone.replace(/[^0-9]/g, '');
        const matchingCustomers = customers.filter(c => c.phone && c.phone.replace(/[^0-9]/g, '') === phoneNorm);

        for (const customer of matchingCustomers) {
          try {
            await updateDoc(doc(db, 'crm_customers', customer.id), {
              projectGroup: groupId,
              projectName: projectName
            });
            updatedCount++;
            if (!foundPhones.includes(phone)) foundPhones.push(phone);
          } catch (e) {
            console.error('프로젝트 업데이트 실패:', e);
          }
        }
      }

      closeProjectLink();
      alert(`${updatedCount}건의 고객이 프로젝트로 통합되었습니다.\n(${foundPhones.join(', ')})`);
      render();
    }

    function viewProductionSpec(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order || !(order.productionSpecs?.[0] || order.productionSpec)) return alert('생산 스펙이 없습니다');

      const spec = (order.productionSpecs?.[0] || order.productionSpec);
      if (!spec.calculatedItems?.items?.length) {
        spec.calculatedItems = calculateProductionSpec(spec.model, +spec.spanOuter, +spec.pivotOuter, +spec.pillarSize, +spec.pillarCount);
      }
      const items = spec.calculatedItems?.items || [];

      // 옵션 HTML 미리 계산 (중첩 템플릿 리터럴 회피)
      const optTags = [
        spec.bottomProcess === '있음' ? '<span class="text-[10px] font-black px-2 py-1 bg-orange-100 text-orange-700 rounded">하부가공</span>' : '',
        (spec.options?.led && spec.options.led !== '없음') ? '<span class="text-[10px] font-black px-2 py-1 bg-yellow-100 text-yellow-700 rounded">LED: ' + spec.options.led + '</span>' : '',
        spec.options?.base ? '<span class="text-[10px] font-black px-2 py-1 bg-blue-100 text-blue-700 rounded">베이스: ' + spec.options.base + '</span>' : '',
        (spec.options?.galva && spec.options.galva !== '없음') ? '<span class="text-[10px] font-black px-2 py-1 bg-green-100 text-green-700 rounded">갈바</span>' : ''
      ].filter(Boolean);
      const optionsHTML = optTags.length ? '<div class="mb-6 p-4 bg-neutral-50 border border-neutral-200 rounded-lg"><p class="text-[9px] font-black text-neutral-400 uppercase tracking-[0.2em] mb-2">옵션 사항</p><div class="flex flex-wrap gap-2">' + optTags.join('') + '</div></div>' : '';

      // 부속품 HTML 미리 계산

    // ===== Firestore 발주 제출 =====
    async function submitOrder() {
      const data = validateOrder();
      if (!data) return;
      if (!confirm(`[${data.branch}] ${data.siteName}\n총 ${formatCurrency(data.total)} 발주를 제출하시겠습니까?`)) return;

      try {
        const { db, collection, addDoc, serverTimestamp } = window.WORKS_DB;
        await addDoc(collection(db, 'works_orders'), {
          ...data,
          orderType: 'product',
          status: '접수',
          paymentStatus: '미입금',
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        // 알람: 본사 전체에 새 발주 알람
        await pushWorkNotification(
          '[발주 접수] ' + (data.branch||'') + ' — ' + data.siteName + ' (' + formatCurrency(data.total) + ')',
          'order_new', 'hq'
        );
        alert(`발주가 제출되었습니다!\n\n발주번호: ${data.orderNumber}\n현장: ${data.siteName}\n총액: ${formatCurrency(data.total)}`);
        navigate('orders');
      } catch(e) {
        console.error('Order submit error:', e);
        alert('발주 제출 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    }

    // ===== 입금상태 변경 (본사 전용) =====
    async function updatePaymentStatus(orderId, newStatus) {
      if (currentType !== 'hq') return;

      try {
        const { db, doc, updateDoc } = window.WORKS_DB;
        await updateDoc(doc(db, 'works_orders', orderId), {
          paymentStatus: newStatus,
          updatedAt: new Date()
        });
        render();
      } catch(e) {
        console.error('Payment status update error:', e);
        alert('입금상태 변경 실패: ' + e.message);
      }
    }

    // ===== 생산 단계 클릭 변경 (본사 전용) =====
    async function advanceStage(orderId, stageName, stageIdx) {
      if (currentType !== 'hq') return;

      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      // 미입금 경고
      const paymentStatus = order.paymentStatus || '미입금';
      if (paymentStatus !== '입금확인') {
        alert('입금 미확인 발주입니다. 입금 확인 후 생산을 진행해주세요.');
      }

      const ps = order.productionStages || {};
      const currentStatus = (ps[stageName] || {}).status || 'pending';

      // 다음 상태 결정: pending → in-progress → completed → pending (토글)
      let nextStatus, actionLabel;
      if (currentStatus === 'pending') {
        nextStatus = 'in-progress';
        actionLabel = `${stageName} 진행중으로 변경`;
      } else if (currentStatus === 'in-progress') {
        nextStatus = 'completed';
        actionLabel = `${stageName} 완료`;
      } else {
        nextStatus = 'pending';
        actionLabel = `${stageName} 대기로 되돌림`;
      }

      // 출고 단계 완료 시 특별 확인
      if (stageName === '출고' && nextStatus === 'completed') {
        if (!confirm(`출고 완료 처리하시겠습니까?\n${order.branch}에 출고준비 완료 알림이 발송됩니다.`)) return;
      } else {
        if (!confirm(`${actionLabel} 하시겠습니까?`)) return;
      }

      const operator = currentBranch ? `${currentBranch} ${currentManager}` : `본사 ${currentManager || '관리자'}`;
      const now = new Date();
      const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

      // 로그 메시지 생성
      let logMsg = `${operator}님이 [${stageName}] ${nextStatus === 'completed' ? '완료' : nextStatus === 'in-progress' ? '진행중' : '대기'} 하였습니다.`;

      try {
        const { db, doc, updateDoc, serverTimestamp, arrayUnion } = window.WORKS_DB;

        // 단계 상태 업데이트
        ps[stageName] = {
          status: nextStatus,
          completedDate: nextStatus === 'completed' ? dateStr : (ps[stageName]?.completedDate || ''),
          comment: nextStatus === 'completed' ? `${operator} 완료 처리` : (ps[stageName]?.comment || '')
        };

        // 출고 완료 시: 다음 단계(완료) 자동 in-progress + 알림 로그
        if (stageName === '출고' && nextStatus === 'completed') {
          ps['완료'] = { ...(ps['완료'] || {}), status: 'in-progress' };
          logMsg += ` → ${order.branch}에 출고준비 완료 알림 발송됨.`;
        }

        // Firestore 업데이트
        const updateData = {
          productionStages: ps,
          updatedAt: serverTimestamp()
        };

        // 로그 배열에 추가 (arrayUnion 사용 가능 시)
        const logEntry = { date: dateStr, message: logMsg, operator, stage: stageName, action: nextStatus };

        // stageLogs 배열 업데이트
        const existingLogs = order.stageLogs || [];
        existingLogs.push(logEntry);
        updateData.stageLogs = existingLogs;

        await updateDoc(doc(db, 'works_orders', orderId), updateData);

        // 출고 완료 시 알림 표시
        if (stageName === '출고' && nextStatus === 'completed') {
          alert(`출고 완료 처리되었습니다!\n\n📦 ${order.branch} (${order.manager})에게\n출고준비 완료 알림이 발송되었습니다.\n\n현장: ${order.siteName}\n발주번호: ${order.orderNumber}`);
        }

        render();
      } catch(e) {
        console.error('Stage advance error:', e);
        alert('단계 변경 실패: ' + e.message);
      }
    }
    // ===== 초기화 =====
    // ESC 키: 모달/패널 닫기 + 뒤로가기
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      // 동적 생성 모달 먼저 닫기
      const dynModals = ['production-spec-modal','paint-spec-modal','siteVisitPanel','hireModal','editEmpModal','editRegModal','bulkLeaveModal','leaveModal','issueFormModal','responseDocModal','hrDocModal'];
      for (const id of dynModals) {
        const el = document.getElementById(id);
        if (el) { el.remove ? el.remove() : el.classList.add('hidden'); return; }
      }
      // 정적 모달 닫기
      const staticModals = document.querySelectorAll('.fixed.inset-0:not(.hidden)');
      if (staticModals.length > 0) { staticModals[staticModals.length-1].classList.add('hidden'); return; }
      // 서브뷰에서 홈으로 뒤로가기
      const backableViews = ['crm','orders','order','notice','schedule','leave','showroom_mgmt','vip','forms','cdm_panel','as_requests'];
      if (backableViews.includes(currentView)) navigate('home');
    });

    // #21 조직도 R&R 설정 실시간 구독 (settings/config.orgRNR)
    function subscribeOrgConfig() {
      try {
        const { db, doc, onSnapshot } = window.WORKS_DB;
        onSnapshot(doc(db, 'settings', 'config'), (snap) => {
          if (snap.exists()) {
            const data = snap.data() || {};
            ORG_RNR_OVERRIDE = data.orgRNR || {};
            // 조직도 탭이 열려 있을 때 즉시 반영
            if (currentView === 'leave' && typeof hrDocsTab !== 'undefined' && hrDocsTab === 'org') {
              throttledRender();
            }
          }
        });
      } catch(e) { console.warn('subscribeOrgConfig error:', e); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initFromURL();
      // Firestore 준비 대기
      const waitDB = setInterval(() => {
        if (window.WORKS_DB) {
          clearInterval(waitDB);
          subscribeOrders();
          subscribeNotices();
          subscribeCustomers();
          subscribeSchedules();
          subscribeLeaveRequests();
          subscribeHrIssues();
          subscribeShowroomReservations();
          subscribeOrgConfig();
          render();
        }
      }, 100);
    });
  </script>
