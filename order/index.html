        try {

    // BRANCHES 기반 지사 목록 생성 (select option용)
    function getBranchOptions() {
      const opts = ['본사'];
      Object.entries(allBranches).forEach(([name, data]) => {
        if (!opts.includes(name)) opts.push(name);
      });
      return opts;

    // 지사 선택 드롭다운 옵션 HTML 생성 (휴면/폐지 상태 표시, 선택 차단)
    function getBranchSelectOptions(currentValue) {
      const lines = [`<option value="">미배정</option>`, `<option value="본사" ${currentValue === '본사' ? 'selected' : ''}>본사</option>`];
      Object.entries(allBranches).sort((a,b) => a[0].localeCompare(b[0])).forEach(([name, data]) => {
        const status = data.status || 'active';
        const isDisabled = status === 'dormant' || status === 'closed';
        const label = status === 'dormant' ? `${name} (휴면)` : status === 'closed' ? `${name} (폐지)` : name;
        const selected = currentValue === name ? 'selected' : '';
        lines.push(`<option value="${name}" ${selected} ${isDisabled ? 'disabled class="text-neutral-300"' : ''}>${label}</option>`);
      });
      return lines.join('');
    }

      if (currentType === 'hq' || !currentBranch) return customers;

    // [FIRESTORE SUBSCRIPTIONS] 실시간 데이터 구독
    //   · subscribeCustomers (+ 자동배정 + province 정규화)
    //   · subscribeOrders, subscribeNotices, subscribeSchedules
    //   · subscribeLeaveRequests, subscribeHrIssues
    //   · subscribeShowroomReservations, subscribeForms, subscribeASRequests
    // ═══════════════════════════════════════════════════════════════
    function subscribeCustomers() {
      const { db, collection, query, onSnapshot } = window.WORKS_DB;
      const ref = collection(db, 'crm_customers');
      const q = query(ref);
      unsubCustomers = onSnapshot(q, (snapshot) => {
        const newCustomers = [];
        const autoAssignQueue = [];
        snapshot.forEach(docSnap => {
          const d = { id: docSnap.id, ...docSnap.data() };
          // 자동 배정: 미배정 고객 전원 배정 (AS접수만 수동 배정 유지)
          // - province 있음 → 지역 매칭 지사 또는 본사
          // - province 없음 → 본사
          // - status='미배정'만 있고 assignedBranch는 있는 불일치 케이스도 수정
          const isUnassigned = !d.assignedBranch || d.assignedBranch.trim() === '' || d.status === '미배정';
          if (isUnassigned && getChannelType(d.channel) !== 'A/S') {
            const assigned = d.province ? getAutoAssignedBranch(d.province) : '본사';
            // province 포맷 정규화도 함께 (서울특별시 → 서울 등)
            const normalizedProvince = d.province && PROVINCE_NORMALIZE[d.province] ? PROVINCE_NORMALIZE[d.province] : d.province;
            d.assignedBranch = assigned;
            d.status = '배정완료';
            if (normalizedProvince !== d.province) d.province = normalizedProvince;
            autoAssignQueue.push({ id: docSnap.id, branch: assigned, normalizedProvince });
          }
          newCustomers.push(d);
        });
        // 자동배정 결과를 Firestore에 비동기 저장 (province 정규화 포함)
        if (autoAssignQueue.length > 0 && currentType === 'hq') {
          const { db: fdb, doc: fDoc, updateDoc: fUpdate } = window.WORKS_DB;
          autoAssignQueue.forEach(item => {
            const payload = { assignedBranch: item.branch, status: '배정완료' };
            if (item.normalizedProvince) payload.province = item.normalizedProvince;
            fUpdate(fDoc(fdb, 'crm_customers', item.id), payload).catch(e => console.log('auto-assign save:', e));
          });
        }
        // 최신순 정렬: createdAt 타임스탬프 > date 문자열 > no 순
        newCustomers.sort((a, b) => {
          const tsA = a.createdAt?.seconds || 0;
          const tsB = b.createdAt?.seconds || 0;
          if (tsA !== tsB) return tsB - tsA;
          if (a.date !== b.date) return (b.date || '').localeCompare(a.date || '');
          return (b.no || 0) - (a.no || 0);
        });
        // 데이터 변경 없으면 render 스킵
        if (newCustomers.length === _lastCustomerCount && customers.length > 0) {
          customers = newCustomers;
          return;
        }
        customers = newCustomers;
        _lastCustomerCount = customers.length;
        console.log('CRM loaded:', customers.length, 'records');
        if (currentView === 'crm' || currentView === 'home' || currentView === 'dashboard') throttledRender();
      }, (error) => {
        console.error('CRM subscribe error:', error);
      });
    }

            if (typeof el.selectionStart !== 'undefined' && _restoreFocus.cursor !== null) {
              el.selectionStart = el.selectionEnd = _restoreFocus.cursor;
            }
          }
          _restoreFocus = null;
        }
        _isRendering = false;
      });

    // ===== 생산 스펙 자동 계산 =====
    function calculateProductionSpec(model, spanOuter, pivotOuter, pillarSize, pillarCount) {
      // STAY_E → STAY, STAY_TT_E → STAY_TT (수동/전동 접미사 제거)
      const baseModel = model.replace(/_E$/, '');
      const spec = PRODUCTION_SPEC_MODELS[baseModel];
      if (!spec) return null;

      // 블레이드 개수 계산
      let bladeCount;
      if (baseModel === 'STAY' || baseModel === 'STAY_TT') bladeCount = Math.round((pivotOuter - 113) / 175);
      else if (baseModel === 'AIREA') bladeCount = Math.round((pivotOuter - 120) / 220);
      else if (baseModel === 'OPERA') bladeCount = Math.round((pivotOuter - 260) / 220);
      bladeCount = Math.max(1, bladeCount);

      const bladeSize = spanOuter - spec.bladeOffset;

      // 품목별 스펙 계산
      const items = spec.items.map(item => {
        let cut = 0;
        const formula = item.cutFormula
          .replace(/span/g, spanOuter)
          .replace(/pivot/g, pivotOuter)
          .replace(/pillar/g, pillarSize)
          .replace(/bladeCount/g, bladeCount);
        try { cut = Math.round(eval(formula)); } catch(e) { cut = 0; }

        const qty = item.qtyFormula === 'bladeCount' ? bladeCount : item.qty;
        const paintWeight = (cut * qty * item.unitWeight) / 1000;

        return { name: item.name, cut, qty, unitWeight: item.unitWeight, paintWeight: Math.round(paintWeight * 1000) / 1000 };
      });

      // 기둥 추가
      const pillarWeight = model === 'OPERA' ? 5.615 : 2.943;
      for (let i = 1; i <= pillarCount; i++) {
        const paintWeight = Math.round(pillarSize * 1 * pillarWeight / 1000 * 1000) / 1000;
        items.push({ name: '기둥' + i, cut: pillarSize, qty: 1, unitWeight: pillarWeight, paintWeight });
      }

      const totalPaintWeight = items.reduce((s, i) => s + i.paintWeight, 0);

      return { model, bladeSize, bladeCount, items, totalPaintWeight: Math.round(totalPaintWeight * 1000) / 1000 };
    }

                <button id="btnAddSpecEntry" class="text-[10px] font-black bg-black text-white px-3 py-1.5 rounded-lg hover:bg-neutral-800 transition-all flex items-center gap-1.5">
                  <i data-lucide="plus" class="w-3 h-3"></i> 제품 추가
                </button>
              </div>
              <div id="productSummaryContainer" class="text-[10px] text-neutral-500">
                <p class="py-2">제품을 추가하려면 우측 "제품 추가" 버튼을 클릭하세요.</p>
              </div>
              <div class="mt-4 pt-4 border-t border-neutral-100 flex justify-end items-center gap-4">
                <span class="text-[10px] font-black text-neutral-400 uppercase tracking-widest">합계</span>
                <span id="totalAmount" class="text-xl font-black">₩0</span>
              </div>
            </div>

            <!-- 생산 스펙 입력 (배열 기반: 각 제품마다 1개씩) -->
            <div id="productionSpecContainer" class="space-y-4 mb-4"></div>

            <!-- 메모 -->
            <div class="border border-neutral-200 rounded-2xl p-6 mb-4">
              <div class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] mb-4 flex items-center gap-2">
                <i data-lucide="message-square" class="w-3.5 h-3.5"></i> 특이사항 / 메모
              </div>
              <textarea id="orderMemo" class="input-base" rows="3" placeholder="추가 요청사항, 특이사항 등을 입력하세요..."></textarea>
            </div>

          </main>

          <!-- 하단 액션 바 -->
          <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-neutral-100 py-4 px-6 z-50">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
              <span class="text-[10px] text-neutral-400 font-bold" id="orderNumber"></span>
              <div class="flex gap-3">
                <button id="btnPreview" class="h-10 px-5 bg-neutral-100 text-neutral-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-200 transition-all flex items-center gap-2">
                  <i data-lucide="eye" class="w-3.5 h-3.5"></i> 미리보기
                </button>
                <button id="btnSubmit" class="h-10 px-5 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-800 transition-all flex items-center gap-2">
                  <i data-lucide="send" class="w-3.5 h-3.5"></i> 발주 제출
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 미리보기 모달 -->
        <div id="previewModal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6">
          <div class="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-100">
              <span class="text-[10px] font-black tracking-widest uppercase text-neutral-400">발주서 미리보기</span>
              <button id="btnClosePreview" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-neutral-100 transition-all">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
            <div id="previewContent" class="p-8"></div>
          </div>
        </div>
      `;
    }

    // ===== 발주 상세 보기 =====
    function viewOrderDetail(orderId) {
      const o = orders.find(x => x.id === orderId);
      if (!o) return;
      const typeLabel = ORDER_TYPE_LABEL[o.orderType] || '제품';
      const modal = document.createElement('div');
      modal.id = 'order-detail-modal';
      modal.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm';
      modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
      modal.innerHTML = `
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto p-6">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-sm font-black uppercase tracking-widest">발주 상세</h3>
            <button onclick="document.getElementById('order-detail-modal').remove()" class="text-neutral-400 hover:text-black"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
          <div class="space-y-3">
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">발주번호</span><span class="text-xs font-bold">${o.orderNumber || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">유형</span><span class="text-xs font-bold">${typeLabel}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">현장명</span><span class="text-xs font-bold">${o.siteName || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">지사</span><span class="text-xs font-bold">${o.branch || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">담당자</span><span class="text-xs font-bold">${o.manager || '-'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">상태</span><span class="text-xs font-bold">${o.status || '접수'}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">금액</span><span class="text-xs font-bold">${formatCurrency(o.total || 0)}</span></div>
            <div class="flex justify-between py-2 border-b border-neutral-100"><span class="text-[10px] text-neutral-400">등록일</span><span class="text-xs font-bold">${formatDate(o.createdAt)}</span></div>
            ${o.memo ? `<div class="pt-2"><span class="text-[10px] text-neutral-400 block mb-1">비고</span><p class="text-xs text-neutral-600">${o.memo}</p></div>` : ''}
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      lucide.createIcons();
    }

    // ===== 발주 현황 (2단계: 생산 추적 워크스페이스) =====
    const PRODUCTION_STAGES = ['접수', '자재', '제작', '품질1차', '도장', '품질2차', '포장', '출고', '완료'];

    function isOrderCompleted(order) {
      const ps = order.productionStages || {};
      return PRODUCTION_STAGES.every(s => (ps[s] || {}).status === 'completed');
    }

    function renderOrderList() {
      // 본사: 전체, 지사/대리점: 본인 지사+담당자 발주만
      let myOrders;
      if (currentType === 'hq') {
        myOrders = orders;
      } else if (currentBranch) {
        myOrders = orders.filter(o => o.branch === currentBranch && (!currentManager || o.manager === currentManager));
      } else {
        myOrders = [];
      }
      const isHQ = currentType === 'hq';

      const activeOrders = myOrders.filter(o => !isOrderCompleted(o));
      const completedOrders = myOrders.filter(o => isOrderCompleted(o));
      const displayOrders = orderListTab === 'active' ? activeOrders : completedOrders;

      return `
        <div class="min-h-screen bg-white animate-fade-in">
          ${renderNav()}
          <main class="pt-20 pb-20 max-w-4xl mx-auto px-6">
            <div class="mb-6">
              <h1 class="text-xl font-black tracking-tight">Order History</h1>
              <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest mt-1">발주내역 확인 · ${myOrders.length}건</p>
            </div>

            <!-- 탭 -->
            <div class="flex items-center gap-1 mb-6 border-b border-neutral-100">
              <button onclick="orderListTab='active';render();" class="px-4 py-2.5 text-[11px] font-black tracking-wide transition-all ${orderListTab === 'active' ? 'border-b-2 border-black text-black' : 'border-b-2 border-transparent text-neutral-400 hover:text-neutral-600'}">
                진행중 <span class="ml-1 text-[10px] ${orderListTab === 'active' ? 'bg-black text-white' : 'bg-neutral-200 text-neutral-500'} px-1.5 py-0.5 rounded-full">${activeOrders.length}</span>
              </button>
              <button onclick="orderListTab='completed';render();" class="px-4 py-2.5 text-[11px] font-black tracking-wide transition-all ${orderListTab === 'completed' ? 'border-b-2 border-black text-black' : 'border-b-2 border-transparent text-neutral-400 hover:text-neutral-600'}">
                출고완료 <span class="ml-1 text-[10px] ${orderListTab === 'completed' ? 'bg-black text-white' : 'bg-neutral-200 text-neutral-500'} px-1.5 py-0.5 rounded-full">${completedOrders.length}</span>
              </button>
            </div>

            <div id="orderListContainer" class="space-y-4">
              ${displayOrders.length > 0
                ? displayOrders.map(o => renderOrderListItem(o, isHQ)).join('')
                : `<div class="text-center py-16">
                    <i data-lucide="${orderListTab === 'completed' ? 'check-circle' : 'inbox'}" class="w-10 h-10 text-neutral-200 mx-auto mb-4"></i>
                    <p class="text-sm text-neutral-300 font-bold mb-4">${orderListTab === 'completed' ? '출고완료된 발주가 없습니다' : '진행중인 발주가 없습니다'}</p>
                    ${currentType === 'hq' && orderListTab === 'active' ? `<button onclick="seedTestOrders()" class="h-10 px-5 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-600 active:scale-[0.98] transition-all">테스트 데이터 생성</button>` : ''}
                  </div>`
              }
            </div>
          </main>
          ${renderFooter()}
        </div>
      `;
    }

    function renderOrderListItem(order, isHQ) {
      const stages = PRODUCTION_STAGES;
      const orderStages = order.productionStages || {};

      // 현재 활성 단계 인덱스 계산
      let activeIdx = -1;
      let completedCount = 0;
      stages.forEach((s, i) => {
        const st = (orderStages[s] || {}).status || 'pending';
        if (st === 'completed') completedCount++;
        if (st === 'in-progress') activeIdx = i;
      });
      if (activeIdx === -1) activeIdx = completedCount;
      const progressPct = Math.round((completedCount / stages.length) * 100);
      const currentPhase = completedCount >= stages.length ? '완료' : stages[Math.min(activeIdx, stages.length - 1)];

      // 로그 목록
      const logs = order.stageLogs || [];

      // 입금상태 배지 스타일 결정
      const paymentStatus = order.paymentStatus || '미입금';
      let paymentBadgeClass = 'bg-red-100 text-red-600 border border-red-200';
      if (paymentStatus === '입금확인') paymentBadgeClass = 'bg-green-100 text-green-600 border border-green-200';
      else if (paymentStatus === '부분입금') paymentBadgeClass = 'bg-amber-100 text-amber-600 border border-amber-200';

      return `
        <div class="border border-neutral-200 rounded-2xl overflow-hidden">
          <!-- 발주 헤더 -->
          <div class="p-5">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-[9px] font-black status-${order.status||'접수'} px-2 py-0.5 rounded-md">${order.status || '접수'}</span>
                  <span class="text-[9px] font-black ${paymentBadgeClass} px-2 py-0.5 rounded-md">${paymentStatus}</span>
                  ${(order.productionSpecs?.[0] || order.productionSpec) ? `<span class="text-[8px] font-black px-1.5 py-0.5 rounded bg-amber-100 text-amber-600">생산</span>` : ''}
                  <span class="text-xs font-black">${order.siteName || '-'}</span>
                </div>
                <p class="text-[10px] text-neutral-400">${order.branch || ''} · ${order.orderNumber || ''}</p>
              </div>
              <div class="text-right flex items-center gap-4">
                <div>
                  <span class="text-lg font-black text-neutral-800">${progressPct}%</span>
                  <p class="text-[9px] text-neutral-400 font-bold">현재: ${currentPhase}</p>
                </div>
                <div class="text-right">
                  <p class="text-[10px] text-neutral-400 mb-1">${formatDate(order.createdAt)}</p>
                  <p class="text-xs font-black">${formatCurrency(order.total || 0)}</p>
                </div>
              </div>
            </div>

            <!-- 가로 진행바 (본사: 클릭 가능) -->
            <div class="progress-bar-wrap">
              ${stages.map((s, i) => {
                const st = (orderStages[s] || {}).status || 'pending';
                const cls = st === 'completed' ? 'seg-done' : st === 'in-progress' ? 'seg-active' : 'seg-wait';
                const clickAttr = isHQ ? `onclick="event.stopPropagation();advanceStage('${order.id}','${s}',${i})" style="cursor:pointer;"` : '';
                return `<div class="bar-seg ${cls}" title="${s}: ${st === 'completed' ? '완료' : st === 'in-progress' ? '진행중' : '대기'}${isHQ ? ' (클릭하여 변경)' : ''}" ${clickAttr}></div>`;
              }).join('')}
            </div>
            <div class="stage-labels">
              ${stages.map((s, i) => {
                const st = (orderStages[s] || {}).status || 'pending';
                const cls = st === 'completed' ? 'lbl-done' : st === 'in-progress' ? 'lbl-active' : '';
                return `<span class="${cls}">${s}</span>`;
              }).join('')}
            </div>
          </div>

          <!-- 상세보기 버튼 -->
          <div class="px-5 pb-4">
            <button onclick="toggleOrderDetail('${order.id}')" class="w-full h-9 border border-neutral-200 rounded-xl text-[10px] font-black text-neutral-400 hover:bg-neutral-50 hover:text-neutral-600 active:scale-[0.99] transition-all flex items-center justify-center gap-1.5">
              <i data-lucide="chevron-down" class="w-3 h-3 order-toggle-${order.id}" style="transition:transform 0.2s;"></i> 상세보기
            </button>
          </div>

          <!-- 상세 (펼침) -->
          <div id="detail-${order.id}" class="hidden border-t border-neutral-100">
            ${isHQ ? `
            <!-- 본사 전용: 입금상태 변경 및 발주서 다운로드 -->
            <div class="px-5 pt-4 pb-2 bg-purple-50/50 border-b border-purple-100 flex items-center gap-3 flex-wrap">
              <span class="text-[9px] font-black text-purple-400 uppercase tracking-[0.2em]">입금 관리</span>
              <select id="paymentStatus-${order.id}" onchange="updatePaymentStatus('${order.id}', this.value)" class="input-base w-32" style="height: 32px; font-size: 10px;">
                <option value="미입금" ${paymentStatus === '미입금' ? 'selected' : ''}>미입금</option>
                <option value="부분입금" ${paymentStatus === '부분입금' ? 'selected' : ''}>부분입금</option>
                <option value="입금확인" ${paymentStatus === '입금확인' ? 'selected' : ''}>입금확인</option>
              </select>
            </div>
            ` : ''}
            ${isHQ && (order.productionSpecs?.[0] || order.productionSpec) ? `
            <!-- 본사 전용: 생산 발주서 + 도장 발주서 -->
            <div class="px-5 pt-4 pb-2 bg-amber-50/50 border-b border-amber-100 flex items-center gap-3 flex-wrap">
              <span class="text-[9px] font-black text-amber-600 uppercase tracking-[0.2em]">생산 스펙</span>
              <button onclick="event.stopPropagation();viewProductionSpec('${order.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 text-white text-[10px] font-black rounded-lg hover:bg-amber-700 active:scale-[0.97] transition-all">
                <i data-lucide="zap" class="w-3 h-3"></i> 생산 발주서 보기
              </button>
              <button onclick="event.stopPropagation();viewPaintSpec('${order.id}')" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-purple-600 text-white text-[10px] font-black rounded-lg hover:bg-purple-700 active:scale-[0.97] transition-all">
                <i data-lucide="paint-bucket" class="w-3 h-3"></i> 도장 발주서 보기
              </button>
            </div>
            ` : ''}
            <div class="p-5 bg-neutral-50/50">
              <p class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] mb-3">생산 진행 상세</p>

              <!-- 가로 카드 그리드 -->
              <div class="stage-detail-grid">
                ${stages.map((stage, idx) => {
                  const stageData = orderStages[stage] || { status: 'pending' };
                  const cardCls = stageData.status === 'completed' ? 'card-done' : stageData.status === 'in-progress' ? 'card-active' : 'card-wait';
                  const statusLabel = stageData.status === 'completed' ? '완료' : stageData.status === 'in-progress' ? '진행중' : '대기';
                  const statusColor = stageData.status === 'completed' ? 'bg-green-50 text-green-600' : stageData.status === 'in-progress' ? 'bg-blue-50 text-blue-600' : 'bg-gray-50 text-gray-400';
                  return `
                    <div class="stage-card ${cardCls}">
                      <div class="flex items-center justify-between mb-1">
                        <span class="text-[10px] font-black">${stage}</span>
                        <span class="text-[8px] font-black px-1.5 py-0.5 rounded ${statusColor}">${statusLabel}</span>
                      </div>
                      ${stageData.completedDate ? `<p class="text-[8px] text-neutral-400">${formatDate(stageData.completedDate)}</p>` : ''}
                      ${stageData.comment ? `<p class="text-[9px] text-neutral-500 mt-1">${stageData.comment}</p>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>

              <!-- 진행 로그 -->
              ${logs.length > 0 ? `
              <div class="mt-5 pt-4 border-t border-neutral-200">
                <p class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] mb-3">진행 로그</p>
                <div class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin">
                  ${logs.slice().reverse().map(log => `
                    <div class="flex items-start gap-2 text-[10px]">
                      <span class="text-neutral-300 whitespace-nowrap">${log.date || ''}</span>
                      <span class="text-neutral-700">${log.message}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ===== 이벤트 바인딩 =====
    function bindEvents() {
      if (currentView === 'order') {
        initOrderForm();
      }
      if (currentView === 'notice') {
        document.getElementById('btnNewNotice')?.addEventListener('click', () => {
          document.getElementById('noticeModal').classList.remove('hidden');
        });
        document.getElementById('btnSaveNotice')?.addEventListener('click', saveNotice);
      }
      // 단계 변경은 advanceStage() 함수로 inline onclick 처리됨
    }

    function toggleOrderDetail(orderId) {
      const detailEl = document.getElementById(`detail-${orderId}`);
      const chevron = document.querySelector(`.order-toggle-${orderId}`);
      if (detailEl.classList.contains('hidden')) {
        detailEl.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        detailEl.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    // ===== 발주 폼 초기화 =====
    function initOrderForm() {
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('orderDate').value = dateStr;

      // 희망 납품일을 2주 후로 설정
      const twoWeeks = new Date(today);
      twoWeeks.setDate(twoWeeks.getDate() + 14);
      const deliveryStr = `${twoWeeks.getFullYear()}-${String(twoWeeks.getMonth()+1).padStart(2,'0')}-${String(twoWeeks.getDate()).padStart(2,'0')}`;
      document.getElementById('deliveryDate').value = deliveryStr;

      const orderNum = `ORD-${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;
      document.getElementById('orderNumber').textContent = '발주번호: ' + orderNum;

      // Phase 2.5: 배열 기반 초기화
      productionSpecEntries = [];
      specEntryCount = 0;
      renderProductionSpecEntries();
      updateProductSummary();
      document.getElementById('btnPreview')?.addEventListener('click', showPreview);
      document.getElementById('btnSubmit')?.addEventListener('click', submitOrder);

      // 지역 선택 이벤트
      document.getElementById('siteProvince').addEventListener('change', function() {
        updateDistrictOptions(this.value);
      });

      // 희망 납품일 변경 감시
      document.getElementById('deliveryDate').addEventListener('change', checkDeliveryDate);

      // 전화번호 포맷
      document.getElementById('sitePhone')?.addEventListener('input', function() {
        let val = this.value.replace(/[^0-9]/g, '');
        if (val.length < 4) this.value = val;
        else if (val.length < 7) this.value = val.substr(0,3) + '-' + val.substr(3);
        else if (val.length < 11) this.value = val.substr(0,3) + '-' + val.substr(3,3) + '-' + val.substr(6);
        else this.value = val.substr(0,3) + '-' + val.substr(3,4) + '-' + val.substr(7);
      });

      // 제품 추가 버튼 이벤트
      document.getElementById('btnAddSpecEntry')?.addEventListener('click', addProductionSpecEntry);
    }

    // ===== Phase 2.5: 배열 기반 생산 스펙 함수 =====
    let specEntryCount = 0;

    function addProductionSpecEntry() {
      specEntryCount++;
      productionSpecEntries.push({
        id: specEntryCount,
        model: '',
        color: '',
        colorCustom: '',
        driveType: 'manual',
        spanOuter: 0,
        pivotOuter: '',
        pillarBase: 'inner',
        pillarCount: 4,
        pillarSize: 3000,
        bottomProcess: '없음',
        options: { led: '없음', base: '노출알루미늄', galva: '없음', galvaAngles: [], galvaFlats: [] },
        coverColor: '',
        installDate: '',
        specMemo: '',
        quantity: 1,
        unitPrice: 0
      });
      renderProductionSpecEntries();
      updateProductSummary();
    }

    function renderProductionSpecEntries() {
      const container = document.getElementById('productionSpecContainer');
      if (!container) return;

      if (productionSpecEntries.length === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = productionSpecEntries.map((entry, idx) => {
        return `
          <div class="border border-amber-200 rounded-2xl p-6 spec-entry" data-id="${entry.id}">
            <div class="flex items-center justify-between mb-4">
              <div class="text-[9px] font-black text-neutral-300 uppercase tracking-[0.3em] flex items-center gap-2">
                <i data-lucide="zap" class="w-3.5 h-3.5"></i> 제품 ${idx + 1} - 생산 스펙
              </div>
              <button onclick="deleteProductionSpecEntry(${entry.id})" class="w-7 h-7 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-100 transition-all">
                <i data-lucide="trash-2" class="w-3 h-3"></i>
              </button>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-4">
              <!-- 제품 모델 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">제품 모델</label>
                <select class="input-base spec-model" data-id="${entry.id}">
                  <option value="">선택하세요</option>
                  <optgroup label="파고라">
                    <option value="STAY" ${entry.model==='STAY'?'selected':''}>STAY (수동)</option>
                    <option value="STAY_E" ${entry.model==='STAY_E'?'selected':''}>STAY (전동)</option>
                    <option value="STAY_TT" ${entry.model==='STAY_TT'?'selected':''}>Tone & Tone (수동)</option>
                    <option value="STAY_TT_E" ${entry.model==='STAY_TT_E'?'selected':''}>Tone & Tone (전동)</option>
                    <option value="AIREA" ${entry.model==='AIREA'?'selected':''}>AIREA</option>
                    <option value="OPERA" ${entry.model==='OPERA'?'selected':''}>OPERA</option>
                    <option value="ATHENA" disabled>ATHENA (발주서 미구현)</option>
                  </optgroup>
                  <optgroup label="솔라">
                    <option value="AIREA_SOLAR" disabled>AIREA Solar (발주서 미구현)</option>
                    <option value="OPERA_SOLAR" disabled>OPERA Solar (발주서 미구현)</option>
                    <option value="SOLAR_PANEL" disabled>Solar Panel (발주서 미구현)</option>
                    <option value="SOLAR_INVERTER" disabled>Solar Inverter (발주서 미구현)</option>
                  </optgroup>
                  <optgroup label="글라스">
                    <option value="GLASS_SLIDING" disabled>Glass Sliding (발주서 미구현)</option>
                    <option value="GLASS_FOLDING" disabled>Glass Folding (발주서 미구현)</option>
                    <option value="BASIC_FOLDING" disabled>Basic Folding (발주서 미구현)</option>
                    <option value="FIX_GLASS" disabled>Fix Glass (발주서 미구현)</option>
                    <option value="GLASS_DOOR" disabled>Glass Door (발주서 미구현)</option>
                  </optgroup>
                  <optgroup label="월사이딩">
                    <option value="LYRA_LEPTE" disabled>LYRA Lepte (발주서 미구현)</option>
                    <option value="LYRA_TREIS" disabled>LYRA Treis (발주서 미구현)</option>
                    <option value="LYRA_TREIS_LED" disabled>LYRA Treis LED (발주서 미구현)</option>
                  </optgroup>
                  <optgroup label="데크">
                    <option value="STONE_DECK" disabled>Stone Deck (발주서 미구현)</option>
                  </optgroup>
                </select>
              </div>

              <!-- 색상 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">색상</label>
                <select class="input-base spec-color" data-id="${entry.id}">
                  <option value="">색상 선택</option>
                  <option value="화이트" ${entry.color==='화이트'?'selected':''}>화이트</option>
                  <option value="차콜" ${entry.color==='차콜'?'selected':''}>차콜</option>
                  <option value="기타" ${entry.colorCustom?'selected':''}>기타 (도장번호 직접입력)</option>
                </select>
                <input type="text" class="input-base spec-color-custom mt-2 ${entry.colorCustom?'':'hidden'}" data-id="${entry.id}" placeholder="도장번호 입력 (예: RAL 7016)" value="${entry.colorCustom || ''}" />
              </div>

              <!-- 수량 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">수량</label>
                <input type="number" class="input-base spec-quantity text-center" data-id="${entry.id}" value="${entry.quantity}" min="1" />
              </div>
            </div>

            <!-- 단가 입력 (Phase 3.5) -->
            <div class="mt-4 pt-4 border-t border-neutral-100">
              <div class="flex items-center gap-4">
                <div class="flex-1">
                  <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">단가 (VAT 포함, 원)</label>
                  <input type="number" class="input-base spec-unit-price" data-id="${entry.id}" value="${entry.unitPrice || 0}" min="0" step="10000" placeholder="기본 제품비 입력" />
                </div>
                <div class="text-right">
                  <p class="text-[9px] font-black text-neutral-300 uppercase tracking-widest mb-1">소계</p>
                  <p class="spec-subtotal text-base font-black" data-id="${entry.id}">${entry.unitPrice && entry.quantity ? '₩' + (entry.unitPrice * entry.quantity).toLocaleString('ko-KR') : '₩0'}</p>
                </div>
              </div>
              <p class="text-[9px] text-neutral-400 mt-2">기본 제품비 기준이며, 특이사항·추가 요구사항에 따라 추가금액이 발생할 수 있습니다.</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <!-- 스팬 외경 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">스팬 외경 (mm) <span class="text-neutral-400">최대 4000mm</span></label>
                <input type="number" class="input-base spec-span-outer" data-id="${entry.id}" placeholder="예: 3000" value="${entry.spanOuter || ''}" />
                <div class="spec-span-warning hidden mt-2 p-2 bg-red-50 border border-red-200 rounded-lg text-[9px] text-red-600 font-bold">⚠️ 4000mm 초과 사이즈입니다. 제작 가능 여부를 담당자와 협의해 주세요.</div>
              </div>

              <!-- 피봇 외경 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">피봇 외경 (mm)</label>
                <select class="input-base spec-pivot-outer" data-id="${entry.id}">
                  <option value="">피봇 사이즈 선택</option>
                </select>
              </div>

              <!-- 기둥 정보 -->
              <div class="col-span-2">
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">기둥 정보</label>
                <div class="spec-pillar-wrapper mb-3 flex items-center gap-4">
                  <span class="text-[10px] font-black text-neutral-500 w-16">하부가공</span>
                  <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="bottomProcess_${entry.id}" value="있음" ${entry.bottomProcess==='있음'?'checked':''} class="w-3.5 h-3.5 spec-bottom-radio" data-id="${entry.id}" /><span class="text-[10px] font-bold">있음</span></label>
                  <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="bottomProcess_${entry.id}" value="없음" ${entry.bottomProcess!=='있음'?'checked':''} class="w-3.5 h-3.5 spec-bottom-radio" data-id="${entry.id}" /><span class="text-[10px] font-bold">없음 (현장절단)</span></label>
                </div>
                <div class="flex items-start gap-3">
                  <div class="flex-shrink-0">
                    <span class="text-[8px] text-neutral-400 font-bold block mb-1">기준</span>
                    <div class="flex gap-2">
                      <label class="flex items-center gap-1 cursor-pointer px-3 py-2 border border-neutral-200 rounded-lg has-[:checked]:bg-black has-[:checked]:text-white has-[:checked]:border-black">
                        <input type="radio" name="pillarBase_${entry.id}" value="inner" ${entry.pillarBase!=='outer'?'checked':''} class="hidden" ${entry.bottomProcess!=='있음'?'disabled':''} /> <span class="text-[10px] font-bold">내경</span>
                      </label>
                      <label class="flex items-center gap-1 cursor-pointer px-3 py-2 border border-neutral-200 rounded-lg has-[:checked]:bg-black has-[:checked]:text-white has-[:checked]:border-black">
                        <input type="radio" name="pillarBase_${entry.id}" value="outer" ${entry.pillarBase==='outer'?'checked':''} class="hidden" ${entry.bottomProcess!=='있음'?'disabled':''} /> <span class="text-[10px] font-bold">외경</span>
                      </label>
                    </div>
                  </div>
                  <div class="w-24">
                    <span class="text-[8px] text-neutral-400 font-bold block mb-1">개수</span>
                    <input type="number" class="input-base spec-pillar-count text-center" data-id="${entry.id}" value="${entry.pillarCount || 4}" min="1" max="8" />
                  </div>
                  <div class="flex-1">
                    <span class="text-[8px] text-neutral-400 font-bold block mb-1">높이 (mm)</span>
                    <input type="number" class="input-base spec-pillar-size" data-id="${entry.id}" placeholder="${entry.bottomProcess!=='있음' ? '3000 (원장)' : '예: 2500'}" value="${entry.bottomProcess!=='있음' ? '3000' : (entry.pillarSize || '')}" ${entry.bottomProcess!=='있음'?'disabled':''} />
                  </div>
                </div>
                <div class="spec-pillar-outer-warning hidden mt-2 p-3 bg-red-50 border border-red-200 rounded-lg text-[10px] text-red-600 font-bold">
                  ⚠️ 외경 기준 주의사항<br/>
                  · 피봇 금형 높이만큼 위로 올라갑니다<br/>
                  · 블레이드 회전 높이와 모터 커버 높이는 외경높이에 반영되지 않습니다
                </div>
              </div>

              <!-- 설치일 -->
              <div>
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">설치일</label>
                <input type="date" class="input-base spec-install-date" data-id="${entry.id}" />
              </div>

              <!-- 현장 특이사항 -->
              <div class="col-span-2">
                <label class="block text-[9px] font-black text-neutral-300 mb-1.5 uppercase tracking-widest ml-1">현장 특이사항</label>
                <textarea class="input-base spec-memo" data-id="${entry.id}" rows="3" placeholder="특이사항을 입력하세요..."></textarea>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // 이벤트 바인딩
      bindProductionSpecEntryEvents();
      lucide.createIcons();
    }

    function bindProductionSpecEntryEvents() {
      // 모델 선택 시
      document.querySelectorAll('.spec-model').forEach(sel => {
        sel.addEventListener('change', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (!entry) return;
          entry.model = e.target.value;
          renderProductionSpecEntries();
          updateProductSummary();
        });
      });

      // 색상 선택 시
      document.querySelectorAll('.spec-color').forEach(sel => {
        sel.addEventListener('change', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (!entry) return;
          entry.color = e.target.value === '기타' ? '' : e.target.value;
          const customInput = e.target.closest('.spec-entry').querySelector('.spec-color-custom');
          if (e.target.value === '기타') {
            customInput?.classList.remove('hidden');
          } else {
            customInput?.classList.add('hidden');
          }
          updateProductSummary();
        });
      });

      document.querySelectorAll('.spec-color-custom').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.colorCustom = e.target.value;
        });
      });

      // 스팬 외경
      document.querySelectorAll('.spec-span-outer').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (!entry) return;
          entry.spanOuter = +e.target.value || 0;
          const warning = e.target.closest('.spec-entry').querySelector('.spec-span-warning');
          if (warning) warning.classList.toggle('hidden', entry.spanOuter <= 4000);
          updateProductSummary();
        });
      });

      // 피봇 외경
      document.querySelectorAll('.spec-pivot-outer').forEach(sel => {
        sel.addEventListener('change', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.pivotOuter = e.target.value;
          updateProductSummary();
        });
      });

      // 수량
      document.querySelectorAll('.spec-quantity').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.quantity = Math.max(1, +e.target.value || 1);
          updateProductSummary();
        });
      });

      // 단가 입력 이벤트 (Phase 3.5)
      document.querySelectorAll('.spec-unit-price').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) { entry.unitPrice = Math.max(0, +e.target.value || 0); }
          updateProductSummary();
        });
      });

      // 기둥 정보
      document.querySelectorAll('.spec-pillar-count').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.pillarCount = +e.target.value || 4;
          updateProductSummary();
        });
      });

      document.querySelectorAll('.spec-pillar-size').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.pillarSize = +e.target.value || 0;
          updateProductSummary();
        });
      });

      // 기준 (내경/외경) 변경 시 경고
      document.querySelectorAll('input[name^="pillarBase_"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const entryId = +e.target.name.split('_')[1];
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (!entry) return;
          entry.pillarBase = e.target.value;
          const warning = e.target.closest('.spec-entry').querySelector('.spec-pillar-outer-warning');
          if (warning) warning.classList.toggle('hidden', e.target.value !== 'outer');
          updateProductSummary();
        });
      });

      // 설치일
      document.querySelectorAll('.spec-install-date').forEach(inp => {
        inp.addEventListener('change', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.installDate = e.target.value;
        });
      });

      // 현장 특이사항
      document.querySelectorAll('.spec-memo').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (entry) entry.specMemo = e.target.value;
        });
      });

      // 하부가공 선택 시
      document.querySelectorAll('.spec-bottom-radio').forEach(radio => {
        radio.addEventListener('change', (e) => {
          const entryId = +e.target.dataset.id;
          const entry = productionSpecEntries.find(x => x.id === entryId);
          if (!entry) return;
          entry.bottomProcess = e.target.value;
          const specEntry = e.target.closest('.spec-entry');
          const pillarBaseRadios = specEntry.querySelectorAll(`input[name="pillarBase_${entryId}"]`);
          const pillarSizeInput = specEntry.querySelector('.spec-pillar-size');
          if (e.target.value === '없음') {
            // 없음: 내경 고정, 높이 3000 고정
            pillarBaseRadios.forEach(r => { r.disabled = true; if (r.value === 'inner') r.checked = true; });
            entry.pillarBase = 'inner';
            entry.pillarSize = 3000;
            if (pillarSizeInput) { pillarSizeInput.value = '3000'; pillarSizeInput.disabled = true; pillarSizeInput.placeholder = '3000 (원장)'; }
          } else {
            // 있음: 모두 활성화
            pillarBaseRadios.forEach(r => r.disabled = false);
            if (pillarSizeInput) { pillarSizeInput.disabled = false; pillarSizeInput.value = ''; pillarSizeInput.placeholder = '예: 2500'; }
            entry.pillarSize = 0;
          }
          updateProductSummary();
        });
      });

      // 각 entry별 피봇 사이즈 옵션 초기화
      productionSpecEntries.forEach(entry => {
        if (!entry.model) return;
        const pivotSel = document.querySelector(`.spec-pivot-outer[data-id="${entry.id}"]`);
        if (!pivotSel) return;
        let sizes = [];
        const m = entry.model.replace('_E', ''); // STAY_E → STAY
        if (m === 'STAY' || m === 'STAY_TT') {
          const driveType = entry.model.endsWith('_E') ? 'electric' : 'manual';
          sizes = (PIVOT_SIZES[m] && PIVOT_SIZES[m][driveType]) || [];
        } else {
          sizes = PIVOT_SIZES[m] || [];
        }
        pivotSel.innerHTML = '<option value="">피봇 사이즈 선택</option>' +
          sizes.map(s => `<option value="${s}" ${+entry.pivotOuter === s ? 'selected' : ''}>${s} mm</option>`).join('');
      });

      // 설치일 초기값: 희망 납품일
      const deliveryVal = document.getElementById('deliveryDate')?.value;
      if (deliveryVal) {
        document.querySelectorAll('.spec-install-date').forEach(inp => {
          if (!inp.value) inp.value = deliveryVal;
        });
      }
    }

    function deleteProductionSpecEntry(entryId) {
      if (productionSpecEntries.length <= 1) return alert('최소 1개 제품이 필요합니다.');
      productionSpecEntries = productionSpecEntries.filter(x => x.id !== entryId);
      renderProductionSpecEntries();
      updateProductSummary();
    }

    function updateProductSummary() {
      const container = document.getElementById('productSummaryContainer');
      if (!container) return;

      if (productionSpecEntries.length === 0) {
        container.innerHTML = '<p class="py-2 text-[10px] text-neutral-500">제품을 추가하려면 우측 "제품 추가" 버튼을 클릭하세요.</p>';
        return;
      }

      const summaryHTML = productionSpecEntries.map((entry, idx) => {
        const modelLabel = getProductModelLabel(entry.model);
        const sizeInfo = entry.spanOuter > 0 ? `스팬 ${entry.spanOuter}mm × 피봇 ${entry.pivotOuter || '-'}mm` : '';
        const colorInfo = entry.color ? `색상: ${entry.color}${entry.coverColor ? ' / 커버: ' + entry.coverColor : ''}` : '';
        const pillarInfo = entry.pillarSize ? `기둥: ${entry.pillarBase === 'outer' ? '외경' : '내경'} ${entry.pillarSize}mm × ${entry.pillarCount || 4}개` : '';
        const bottomInfo = entry.bottomProcess === '없음' ? '하부가공 없음 (원장 3000mm)' : entry.bottomProcess === '있음' ? '하부가공 있음' : '';
        return `
          <div class="py-3 border-b border-neutral-100 last:border-b-0">
            <div class="flex justify-between items-start mb-1">
              <span class="text-[11px] font-black text-neutral-800">제품 ${idx + 1}: ${modelLabel || '선택 필요'}</span>
              <span class="text-[10px] font-black">수량: ${entry.quantity}</span>
            </div>
            ${sizeInfo || colorInfo || pillarInfo ? `
            <div class="text-[9px] text-neutral-400 space-y-0.5">
              ${sizeInfo ? `<p>${sizeInfo}</p>` : ''}
              ${colorInfo ? `<p>${colorInfo}</p>` : ''}
              ${pillarInfo ? `<p>${pillarInfo}</p>` : ''}
              ${bottomInfo ? `<p>${bottomInfo}</p>` : ''}
            </div>` : ''}
          </div>
        `;
      }).join('');

      container.innerHTML = summaryHTML;

      // 총 합계 계산 (Phase 3.5)
      const totalEl = document.getElementById('totalAmount');
      if (totalEl) {
        const total = productionSpecEntries.reduce((sum, e) => sum + ((e.unitPrice || 0) * (e.quantity || 1)), 0);
        totalEl.textContent = total > 0 ? '₩' + total.toLocaleString('ko-KR') : '₩0';
        totalEl.className = 'text-xl font-black ' + (total > 0 ? 'text-black' : 'text-neutral-300');
      }

      // 소계 DOM 업데이트
      productionSpecEntries.forEach(entry => {
        const subtotalEl = document.querySelector(`.spec-subtotal[data-id="${entry.id}"]`);
        if (subtotalEl) {
          const sub = (entry.unitPrice || 0) * (entry.quantity || 1);
          subtotalEl.textContent = sub > 0 ? '₩' + sub.toLocaleString('ko-KR') : '₩0';
        }
      });
    }

    function getProductModelLabel(model) {
      const modelMap = {
        'STAY': 'STAY (수동)',
        'STAY_E': 'STAY (전동)',
        'STAY_TT': 'Tone & Tone (수동)',
        'STAY_TT_E': 'Tone & Tone (전동)',
        'AIREA': 'AIREA',
        'OPERA': 'OPERA',
        'ATHENA': 'ATHENA'
      };
      return modelMap[model] || '';
    }

    function updateDriveTypeVisibility(model) {
      const wrapper = document.getElementById('specDriveTypeWrapper');
      if (model === 'STAY' || model === 'STAY_TT') {
        wrapper?.classList.remove('hidden');
      } else {
        wrapper?.classList.add('hidden');
      }
    }

    function updatePivotSizeOptions(model) {
      const select = document.getElementById('specPivotOuter');
      select.innerHTML = '<option value="">피봇 사이즈 선택</option>';

      if (!model) return;

      let sizes = [];
      if (model === 'STAY' || model === 'STAY_TT') {
        const driveType = document.querySelector('input[name="specDriveType"]:checked')?.value || 'manual';
        sizes = PIVOT_SIZES[model][driveType] || [];

    // ===== 미리보기 =====
    // ===== CRM & CDM 페이지 =====
    // CRM_CHANNELS, CHANNEL_TYPE, getChannelType → js/utils.js (상수는 constants.js)
    // CRM_PRODUCTS, PRODUCT_CATEGORIES → js/constants.js
    // ═══════════════════════════════════════════════════════════════
    // [CONSTANTS] → js/constants.js 로 분리됨 (Phase 2)
    //   CRM_GRADES, CRM_BRANDS, CRM_BRAND_COLORS, CRM_GRADE_COLORS, CRM_GRADE_DOT
    //   getBrandColor, renderBrandOptions, renderBrandFilterOptions → utils.js
    // ═══════════════════════════════════════════════════════════════
    let editingCustomerId = null;

    // ===== 대시보드 (별도 페이지) =====
    function getDashYearOptions() {
      const years = new Set();
      customers.forEach(c => { if (c.year) years.add(c.year); });
      return Array.from(years).sort().reverse();
    }

    function getDashMonthOptions() {
      const months = new Set();
      customers.forEach(c => {
        if (c.month && (dashYear === '전체' || c.year === dashYear)) months.add(c.month);
      });
      // 월 정렬 (1월~12월)
      return Array.from(months).sort((a, b) => parseInt(a) - parseInt(b));
    }

    function getDashData() {
      let data = [...customers];
      if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
      if (dashYear !== '전체') data = data.filter(c => c.year === dashYear);
      if (dashMonth !== '전체') data = data.filter(c => c.month === dashMonth);
      return data;
    }

    function getDashPrevData() {
      // 전체 연도+전체 월이면 비교 없음
      if (dashYear === '전체' && dashMonth === '전체') return null;
      // 특정 연도+전체 월이면 전년도 비교
      if (dashYear !== '전체' && dashMonth === '전체') {
        const prevY = (parseInt(dashYear) - 1) + '년';
        let data = customers.filter(c => c.year === prevY);
        if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
        return data.length > 0 ? data : null;
      }
      // 특정 월이면 전월 비교
      const m = parseInt(dashMonth);
      const y = dashYear !== '전체' ? parseInt(dashYear) : null;
      const prevM = m === 1 ? 12 : m - 1;
      const prevY = m === 1 && y ? y - 1 : y;
      let data = customers.filter(c => {
        const monthMatch = c.month === prevM + '월';
        if (y) return monthMatch && c.year === prevY + '년';
        return monthMatch;
      });
      if (dashBrand !== '전체') data = data.filter(c => c.brand === dashBrand);
      return data.length > 0 ? data : null;
    }

    function getDashModeLabel() {
      if (dashYear === '전체' && dashMonth === '전체') return '전체';
      if (dashYear !== '전체' && dashMonth === '전체') return dashYear;
      if (dashYear === '전체' && dashMonth !== '전체') return dashMonth;
      return dashYear + ' ' + dashMonth;
    }

    function setDashYear(y) { dashYear = y; dashMonth = '전체'; render(); }
    function setDashMonth(m) { dashMonth = m; render(); }
    function setDashBrand(brand) { dashBrand = brand; render(); }
    function setDashMode(mode) { dashMode = mode; render(); }
    function setDashCustomRange() {
      dashCustomFrom = document.getElementById('dashFromDate')?.value || '';
      dashCustomTo = document.getElementById('dashToDate')?.value || '';
      render();
    }

    // 대시보드 모드별 데이터 필터링 헬퍼
    function getDashDateRange() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (dashMode === 'daily') {
        return { from: today, to: today, label: formatDateKR(today) };
      } else if (dashMode === 'weekly') {
        const dayOfWeek = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        return { from: monday, to: sunday, label: formatDateKR(monday) + ' ~ ' + formatDateKR(sunday) };
      } else if (dashMode === 'monthly') {
        const first = new Date(now.getFullYear(), now.getMonth(), 1);
        const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        return { from: first, to: last, label: now.getFullYear() + '년 ' + (now.getMonth() + 1) + '월' };
      } else if (dashMode === 'yearly') {
        const first = new Date(now.getFullYear(), 0, 1);
        const last = new Date(now.getFullYear(), 11, 31);
        return { from: first, to: last, label: now.getFullYear() + '년' };
      } else if (dashMode === 'custom' && dashCustomFrom && dashCustomTo) {
        return { from: new Date(dashCustomFrom), to: new Date(dashCustomTo), label: dashCustomFrom + ' ~ ' + dashCustomTo };
      }
      return { from: null, to: null, label: '전체' };
    }

    // formatDateKR → js/utils.js (Phase 2 분리)

    // [정책 C 하이브리드 · 2026-04-18]
    // 고객 카드의 "실효 유입일"을 판정하는 통합 함수.
    // - 'import' 카드: 엑셀/마이그레이션에서 일괄 주입 → 원본 문의일(c.date) 기준
    // - 'live' 카드: 웹폼·전화·AS·도슨트투어 등 실시간 유입 → Firestore 자동 createdAt 기준
    // - source 없는 구 데이터: createdAt과 c.date 차이가 30일 초과면 자동 'import' 취급
    function getCustomerDate(c) {
      // createdAt 우선 — 대시보드·CRM 리스트 날짜 기준 통일 (2026-04-20)
      // "시스템에 등록된 날짜" 기준으로 일관되게 카운트
      if (c.createdAt?.seconds) return new Date(c.createdAt.seconds * 1000);
      // createdAt 없는 구 데이터 fallback: date → year/month
      if (c.date) {
        const d = new Date(c.date);
        if (!isNaN(d.getTime())) return d;
      }
      if (c.year && c.month) {
        const y = parseInt(c.year);
        const m = parseInt(c.month);
        if (y && m) return new Date(y, m - 1, 15);
      }
      return null;
    }

    function filterByDateRange(data, from, to) {
      if (!from || !to) return data;
      const fromTime = from.getTime();
      const toTime = to.getTime() + 86400000 - 1; // to 날짜 끝까지 포함
      return data.filter(c => {
        const d = getCustomerDate(c);
        if (!d) return false;
        const t = d.getTime();
        return t >= fromTime && t <= toTime;
      });
    }

    function isConverted(c) {
      // 전환 = 지사 배정됨 (본사는 미배정 상태이므로 제외)
      const b = (c.assignedBranch || '').trim();
      return !!(b && b !== '본사');
    }

    // ═══════════════════════════════════════════════════════════════
    // [DASHBOARD] CRM 대시보드 (통계/차트/지역별/지사이관 현황)
    //   · renderDashboardPage — 본사 전용 분석
    //   · 기간 필터, 브랜드별/지역별/제품별 집계, 전환율 차트
    // ═══════════════════════════════════════════════════════════════
    function renderDashboardPage() {
      // ── 모드별 날짜 범위 ──
      const range = getDashDateRange();
      // 지사 로그인: 배정 고객만 대상
      const branchBase = getBranchBaseCustomers();
      const allData = dashBrand !== '전체' ? branchBase.filter(c => c.brand === dashBrand) : [...branchBase];
      const data = filterByDateRange(allData, range.from, range.to);
      const total = data.length;

      // ── 이전 기간 데이터 (비교용) ──
      let prevData = null;
      if (range.from && range.to) {
        const span = range.to.getTime() - range.from.getTime() + 86400000;
        const prevFrom = new Date(range.from.getTime() - span);
        const prevTo = new Date(range.from.getTime() - 1);
        prevData = filterByDateRange(allData, prevFrom, prevTo);
      }

      // ── 브랜드별 집계 (#5: CRM_BRANDS 기반 동적 생성) ──
      const brandData = {};
      CRM_BRANDS.forEach(b => {
        brandData[b] = {
          data: data.filter(c => c.brand === b),
          get converted() { return this.data.filter(isConverted).length; }
        };
      });
      const totalConverted = data.filter(isConverted).length;
      const convRate = total > 0 ? Math.round(totalConverted / total * 100) : 0;
      // 브랜드 텍스트 색상 추출 헬퍼 (CRM_BRAND_COLORS에서 text-*만)
      const getBrandTextColor = (brand) => {
        const c = (typeof CRM_BRAND_COLORS !== 'undefined' ? CRM_BRAND_COLORS[brand] : '') || '';
        const m = c.match(/text-[a-z]+-\d+/);
        return m ? m[0] : 'text-neutral-700';
      };

      // ── 채널별 ──
      const channelCounts = {};
      data.forEach(c => { if (c.channel) channelCounts[c.channel] = (channelCounts[c.channel] || 0) + 1; });
      const allChannels = Object.entries(channelCounts).sort((a, b) => b[1] - a[1]);
      const maxCh = allChannels.length > 0 ? allChannels[0][1] : 1;

      // ── 제품별 ──
      const productCounts = {};
      data.forEach(c => {
        if (c.product) c.product.split(',').map(p => p.trim()).filter(Boolean).forEach(p => {
          productCounts[p] = (productCounts[p] || 0) + 1;
        });
      });
      const allProducts = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);
      const maxProd = allProducts.length > 0 ? allProducts[0][1] : 1;

      // ── 지역별 ──
      const regionCounts = {};
      let overseasCount = 0;
      data.forEach(c => {
        if (c.province) {
          if (c.province === '해외') { overseasCount++; }
          else { regionCounts[c.province] = (regionCounts[c.province] || 0) + 1; }
        }
      });
      const domesticRegions = Object.entries(regionCounts).sort((a, b) => b[1] - a[1]);
      const allRegions = overseasCount > 0 ? [...domesticRegions, ['해외', overseasCount]] : domesticRegions;
      const maxRegion = domesticRegions.length > 0 ? domesticRegions[0][1] : 1;

      const regionDetail = {};
      data.forEach(c => {
        if (c.province) {
          const key = c.province;
          if (!regionDetail[key]) regionDetail[key] = {};
          const dist = key === '해외' ? (c.overseasCountry || '기타') : (c.district || '미지정');
          regionDetail[c.province][dist] = (regionDetail[c.province][dist] || 0) + 1;
        }
      });

      // ── 지사이관 현황 (본사 배정 제외, 실제 지사/대리점으로 배정된 건만) ──
      const branchCounts = {};
      data.forEach(c => {
        const b = normalizeBranchName(c.assignedBranch || '');
        if (b && b !== '미배정' && b !== '본사') branchCounts[b] = (branchCounts[b] || 0) + 1;
      });
      const totalBranched = Object.values(branchCounts).reduce((s, v) => s + v, 0);
      const branchRate = total > 0 ? Math.round(totalBranched / total * 100) : 0;
      const allBranches = Object.entries(branchCounts).sort((a, b) => b[1] - a[1]);

      // ── 등급별 ──
      const gradeCounts = {};
      data.forEach(c => {
        const g = (c.grade2 && c.grade2.trim()) || (c.grade && c.grade.trim()) || '미지정';
        gradeCounts[g] = (gradeCounts[g] || 0) + 1;
      });
      const allGrades = Object.entries(gradeCounts).sort((a, b) => b[1] - a[1]);

      // ── 유형별 ──
      const typeCounts = {};
      data.forEach(c => { const t = c.custType || '미지정'; typeCounts[t] = (typeCounts[t] || 0) + 1; });

      // ── 동의율 ──
      const consentY = data.filter(c => c.consent === '동의').length;
      const consentRate = total > 0 ? Math.round(consentY / total * 100) : 0;

      // ── 전/후기 비교 ──
      let diffHtml = '';
      if (prevData !== null && prevData.length > 0) {
        const diff = total - prevData.length;
        const pct = prevData.length > 0 ? Math.round(diff / prevData.length * 100) : 0;
        diffHtml = '<p class="text-[9px] ' + (diff >= 0 ? 'text-green-500' : 'text-red-500') + ' mt-1 font-bold">' + (diff >= 0 ? '▲' : '▼') + ' ' + Math.abs(diff) + '건 (' + (diff >= 0 ? '+' : '') + pct + '%) 전기 대비</p>';
      }

      // ── 일별 추이 (최근 7일 or 모드에 따라) ──
      const trendData = [];
      if (dashMode === 'daily' || dashMode === 'weekly') {
        // 최근 7일 트렌드
        const now = new Date();
        for (let i = 6; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
          const dayData = filterByDateRange(allData, d, d);
          trendData.push({ label: (d.getMonth()+1)+'/'+d.getDate(), total: dayData.length, converted: dayData.filter(isConverted).length });
        }
      } else if (dashMode === 'monthly' || dashMode === 'yearly' || dashMode === 'custom') {
        // 최근 12개월 트렌드
        const now = new Date();
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
          const mData = filterByDateRange(allData, d, last);
          trendData.push({ label: (d.getMonth()+1)+'월', total: mData.length, converted: mData.filter(isConverted).length });
        }
      }
      const maxTrend = Math.max(...trendData.map(t => t.total), 1);

      // ── 오늘 날짜 문자열 ──
      const todayStr = formatDateKR(new Date());

      // ── 기존 연도/월 필터 (연간 모드용) ──
      const yearOptions = getDashYearOptions();
      // ── 브랜드별 상세 집계 (보고서 테이블용) — CRM_BRANDS 기반 ──
      const brandStats = CRM_BRANDS.map(name => ({
        name,
        data: brandData[name].data,
        converted: brandData[name].converted
      }));

      // 기간선택 HTML
      const customRangeHTML = dashMode === 'custom' ? '<div class="flex items-center gap-2 mt-2"><input type="date" id="dashFromDate" value="' + dashCustomFrom + '" class="input-base text-[11px] w-auto" /><span class="text-neutral-400 text-[10px]">~</span><input type="date" id="dashToDate" value="' + dashCustomTo + '" class="input-base text-[11px] w-auto" /><button onclick="setDashCustomRange()" class="h-9 px-4 bg-black text-white rounded-lg text-[10px] font-black hover:bg-neutral-800 active:scale-[0.98] transition-all">조회</button></div>' : '';

      // 추이 차트 HTML
      const trendChartHTML = trendData.length > 0 ? trendData.map(t => '<div class="flex-1 flex flex-col items-center justify-end h-full min-w-0"><p class="text-[8px] font-black mb-1 ' + (t.total === 0 ? 'text-neutral-300' : '') + '">' + (t.total || '') + '</p><div class="w-full relative rounded-t overflow-hidden" style="height: ' + Math.max(t.total / maxTrend * 100, 3) + '%"><div class="absolute bottom-0 w-full bg-black rounded-t" style="height: 100%"></div>' + (t.converted > 0 ? '<div class="absolute bottom-0 w-full bg-green-500 rounded-t" style="height: ' + (t.total > 0 ? t.converted / t.total * 100 : 0) + '%"></div>' : '') + '</div><p class="text-[7px] text-neutral-400 mt-1.5 font-bold">' + t.label + '</p></div>').join('') : '';

      // 채널 차트 HTML
      const channelHTML = allChannels.map(function(ch, i) {
        return '<div><div class="flex items-center justify-between mb-1"><span class="text-[10px] font-bold">' + (i+1) + '. ' + ch[0] + '</span><span class="text-[9px] font-black text-neutral-400">' + ch[1] + '건 <span class="text-neutral-300">(' + (total > 0 ? Math.round(ch[1]/total*100) : 0) + '%)</span></span></div><div class="h-2 bg-neutral-100 rounded-full overflow-hidden"><div class="h-full bg-black rounded-full transition-all" style="width: ' + (ch[1]/maxCh*100) + '%"></div></div></div>';
      }).join('');

      // 제품 차트 HTML
      const productHTML = allProducts.map(function(p, i) {
        return '<div><div class="flex items-center justify-between mb-1"><span class="text-[10px] font-bold">' + (i+1) + '. ' + p[0] + '</span><span class="text-[9px] font-black text-neutral-400">' + p[1] + '건 <span class="text-neutral-300">(' + (total > 0 ? Math.round(p[1]/total*100) : 0) + '%)</span></span></div><div class="h-2 bg-neutral-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full transition-all" style="width: ' + (p[1]/maxProd*100) + '%"></div></div></div>';
      }).join('');

      // 지역 바차트 HTML
      const regionBarHTML = allRegions.map(function(r) {
        const shortName = r[0].replace('특별시','').replace('광역시','').replace('특별자치시','').replace('특별자치도','');
        return '<div class="flex-1 flex flex-col items-center justify-end h-full min-w-0"><p class="text-[8px] font-black mb-1">' + r[1] + '</p><div class="w-full ' + (r[0]==='해외' ? 'bg-blue-500' : 'bg-neutral-800') + ' rounded-t transition-all" style="height: ' + Math.max(r[1]/maxRegion*100, 4) + '%"></div><p class="text-[7px] ' + (r[0]==='해외' ? 'text-blue-500' : 'text-neutral-400') + ' mt-1.5 font-bold text-center leading-tight truncate w-full">' + shortName + '</p></div>';
      }).join('');

      // 지역 상세 테이블 HTML
      const regionTableHTML = allRegions.map(function(item) {
        const prov = item[0], provCnt = item[1];
        const districts = Object.entries(regionDetail[prov] || {}).sort(function(a,b){ return b[1]-a[1]; });
        return districts.map(function(d, di) {
          return '<tr class="border-b border-neutral-50 hover:bg-neutral-50">' + (di === 0 ? '<td class="px-4 py-2 font-black" rowspan="' + districts.length + '">' + prov + ' <span class="text-neutral-400 font-bold">(' + provCnt + ')</span></td>' : '') + '<td class="px-4 py-2">' + d[0] + '</td><td class="px-4 py-2 text-right font-bold">' + d[1] + '</td><td class="px-4 py-2 text-right text-neutral-400">' + (total > 0 ? Math.round(d[1]/total*100) : 0) + '%</td></tr>';
        }).join('');
      }).join('');

      // 등급 분포 HTML
      const gradeHTML = allGrades.slice(0, 10).map(function(g) {
        return '<div class="flex items-center justify-between"><span class="text-[10px] font-bold">' + g[0] + '</span><div class="flex items-center gap-2"><div class="w-20 h-1.5 bg-neutral-100 rounded-full overflow-hidden"><div class="h-full bg-amber-500 rounded-full" style="width: ' + (total > 0 ? g[1]/total*100 : 0) + '%"></div></div><span class="text-[9px] font-black text-neutral-400 w-10 text-right">' + g[1] + '</span></div></div>';
      }).join('');

      // 유형 HTML
      const typeHTML = Object.entries(typeCounts).sort(function(a,b){ return b[1]-a[1]; }).map(function(t) {
        return '<div class="flex items-center justify-between p-3 bg-neutral-50 rounded-xl"><span class="text-[11px] font-black">' + t[0] + '</span><div class="text-right"><span class="text-sm font-black">' + t[1] + '</span><span class="text-[9px] text-neutral-400 ml-1">(' + (total > 0 ? Math.round(t[1]/total*100) : 0) + '%)</span></div></div>';
      }).join('');

      // 지사 HTML
      const branchHTML = allBranches.map(function(item) {
        const name = item[0], cnt = item[1];
        const colors = {'본사':'bg-black','부산지사':'bg-orange-500','강동지사':'bg-purple-500','중부지사':'bg-blue-500','강남지사':'bg-pink-400','강북지사':'bg-neutral-400','호남제주지사':'bg-neutral-400'};
        const bg = colors[name] || 'bg-neutral-500';
        return '<div class="flex items-center justify-between"><div class="flex items-center gap-1.5"><div class="w-2 h-2 ' + bg + ' rounded-full"></div><span class="text-[10px] font-bold">' + name + '</span></div><span class="text-[9px] font-black text-neutral-400">' + cnt + ' <span class="text-neutral-300">(' + (total > 0 ? Math.round(cnt/total*100) : 0) + '%)</span></span></div>';
      }).join('');

      return `
        <div class="min-h-screen bg-white animate-fade-in">
          ${renderNav()}
          <main class="pt-20 pb-20 max-w-6xl mx-auto px-6">

            <!-- 헤더 -->
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
              <div>
                <h1 class="text-xl font-black tracking-tight">CRM Dashboard</h1>
                <p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest mt-1">${range.label}</p>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <select class="input-base text-[11px] w-auto" onchange="setDashBrand(this.value)">
                  ${renderBrandFilterOptions(dashBrand, true)}
                </select>
                <button onclick="navigate('crm')" class="h-10 px-4 bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all">
                  고객 목록
                </button>
              </div>
            </div>

            <!-- 기간 모드 선택 탭 -->
            <div class="flex items-center gap-1 mb-4 flex-wrap">
              <button onclick="setDashMode('daily')" class="px-4 py-2 rounded-lg text-[10px] font-black transition-all ${dashMode === 'daily' ? 'bg-black text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}">일간</button>
              <button onclick="setDashMode('weekly')" class="px-4 py-2 rounded-lg text-[10px] font-black transition-all ${dashMode === 'weekly' ? 'bg-black text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}">주간</button>
              <button onclick="setDashMode('monthly')" class="px-4 py-2 rounded-lg text-[10px] font-black transition-all ${dashMode === 'monthly' ? 'bg-black text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}">월간</button>
              <button onclick="setDashMode('yearly')" class="px-4 py-2 rounded-lg text-[10px] font-black transition-all ${dashMode === 'yearly' ? 'bg-black text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}">연간</button>
              <button onclick="setDashMode('custom')" class="px-4 py-2 rounded-lg text-[10px] font-black transition-all ${dashMode === 'custom' ? 'bg-black text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}">기간선택</button>
              ${dashMode === 'yearly' ? `
              <select class="input-base text-[11px] w-auto ml-2" onchange="setDashYear(this.value)">
                ${yearOptions.map(y => '<option value="' + y + '" ' + (dashYear === y ? 'selected' : '') + '>' + y + '</option>').join('')}
              </select>` : ''}
            </div>
            ${customRangeHTML}

            <!-- ★ 브랜드 전략팀 일일/월간 보고 카드 ★ -->
            <div class="bg-neutral-50 rounded-2xl p-6 mb-6">
              <div class="flex items-center justify-between mb-4">
                <p class="text-[11px] font-black tracking-tight">브랜드 전략팀 리포트</p>
                <p class="text-[9px] text-neutral-400 font-bold">${range.label}</p>
              </div>

              <!-- 전체 요약 (고객유입 vs 고객고도화) -->
              ${(function() {
                const inflowCount = data.filter(c => getChannelType(c.channel) === '유입').length;
                const advCount = data.filter(c => getChannelType(c.channel) === '고도화').length;
                return `
              <div class="grid grid-cols-5 gap-3 mb-4">
                <div class="bg-white rounded-xl p-4 text-center">
                  <p class="text-[9px] font-black text-neutral-400 uppercase tracking-widest mb-1">전체 DB</p>
                  <p class="text-2xl font-black">${total}</p>
                  ${diffHtml}
                </div>
                <div class="bg-white rounded-xl p-4 text-center border-l-4 border-blue-400">
                  <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">고객 유입</p>
                  <p class="text-2xl font-black text-blue-600">${inflowCount}</p>

        }
      });

      // 미배정 건수 (status === '미배정'인 신규 DB만)

      baseCustomers.forEach(c => {
        const b = c.assignedBranch || '';
        if (b && b !== '본사') branchDropdownCounts[b] = (branchDropdownCounts[b] || 0) + 1;
      });

      // 파이프라인 카운트
      const counts = { '전체': baseCustomers.length };
      CRM_GRADES.forEach(g => { counts[g] = baseCustomers.filter(c => c.grade2 === g).length; });
      counts['-'] = baseCustomers.filter(c => !CRM_GRADES.includes(c.grade2)).length;

      // 일일 증감 (1년 롤링 윈도우)
      const _now = new Date();
      const _todayCutoff = new Date(_now.getFullYear() - 1, _now.getMonth(), _now.getDate());
      const _todayDBCount = baseCustomers.filter(c => { const d = getCustomerDate(c); return d && d >= _todayCutoff; }).length;

                  <i data-lucide="download" class="w-3.5 h-3.5"></i> 엑셀 다운로드

            ${currentType === 'hq' ? (function() {
              const now = new Date();

              const branchStats = {};
              customers.forEach(function(c) {
                const b = c.assignedBranch || '미배정';
                if (!branchStats[b]) branchStats[b] = { total: 0, adv: 0, inflow: 0, ungraded: 0 };
                branchStats[b].total++;
                if (c.channel && ['스마트견적','쇼룸','현장방문요청','현장방문','견적서 송부','스마트로그'].includes(c.channel)) branchStats[b].adv++;
                else branchStats[b].inflow++;
                if (!c.grade2 || c.grade2 === '') branchStats[b].ungraded++;
              });
              const rows = Object.entries(branchStats)
                .sort(function(a,b){ return b[1].total - a[1].total; })
                .map(function(entry) {
                  const bName = entry[0]; const s = entry[1];
                  const brData = allBranches[bName] || {};
                  const brStatus = brData.status || 'active';
                  const statusCls = brStatus === 'active' ? 'bg-green-50 text-green-600' : brStatus === 'dormant' ? 'bg-yellow-50 text-yellow-600' : 'bg-neutral-100 text-neutral-500';

                </div>

    // ===== 정리고객 페이지 (아카이브 완료된 고객 리스트) =====
    let archivedPage = 0;
    let archivedSearch = '';
    let archivedBrandFilter = '전체';

    let archivedSortDir = 'desc';
    const ARCHIVED_PAGE_SIZE = 50;

    async function loadArchivedCustomers() {
      archivedLoading = true;
      render();
      try {
        const { db, collection, getDocs, doc, updateDoc } = window.WORKS_DB;
        const snap = await getDocs(collection(db, 'crm_customers_archive'));
        archivedCustomers = [];
        snap.forEach(d => archivedCustomers.push({ id: d.id, ...d.data() }));

        archivedCustomers.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      } catch(e) {
        console.error('Archive load error:', e);
        archivedCustomers = [];
      }
      archivedLoading = false;
      render();
    }

    function getFilteredArchivedCustomers() {
      let list = [...archivedCustomers];

      // 브랜드 필터
      if (archivedBrandFilter !== '전체') list = list.filter(c => c.brand === archivedBrandFilter);

      // 검색
      if (archivedSearch) {
        const q = archivedSearch.toLowerCase();
        list = list.filter(c =>
          (c.phone || '').includes(q) ||
          (c.content || '').toLowerCase().includes(q) ||
          (c.channel || '').toLowerCase().includes(q) ||
          (c.province || '').includes(q) ||
          (c.district || '').includes(q) ||
          (c.brand || '').toLowerCase().includes(q) ||
          (String(c.no) || '').includes(q)
        );
      }

      // 정렬
      list.sort((a, b) => {
        let va = '', vb = '';
        if (archivedSortField === 'date') { va = a.date || ''; vb = b.date || ''; }
        else if (archivedSortField === 'no') { va = a.no || 0; vb = b.no || 0; }
        else if (archivedSortField === 'brand') { va = a.brand || ''; vb = b.brand || ''; }
        else if (archivedSortField === 'channel') { va = a.channel || ''; vb = b.channel || ''; }
        if (typeof va === 'number') return archivedSortDir === 'asc' ? va - vb : vb - va;
        return archivedSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      });

      return list;
    }

    let _archivedSearchDebounce = null;
    function setArchivedSearch(v) {
      archivedSearch = v;
      archivedPage = 0;
      clearTimeout(_archivedSearchDebounce);
      _archivedSearchDebounce = setTimeout(() => render(), 300);
    }
    function setArchivedBrand(v) { archivedBrandFilter = v; archivedPage = 0; render(); }
    function setArchivedSort(field) {
      if (archivedSortField === field) archivedSortDir = archivedSortDir === 'asc' ? 'desc' : 'asc';
      else { archivedSortField = field; archivedSortDir = 'desc'; }
      render();
    }
    function setArchivedPage(p) { archivedPage = p; render(); }

    // ═══════════════════════════════════════════════════════════════
    // [ARCHIVED CRM] 정리고객 (아카이브)
    //   · renderArchivedCRM, executeArchive (1년 경과 자동 아카이빙)
    //   · crm_customers_archive 컬렉션
    // ═══════════════════════════════════════════════════════════════
    function renderArchivedCRM() {
      if (archivedLoading) {
        return '<div class="min-h-screen bg-white animate-fade-in">' + renderNav() +

      }

      const filtered = getFilteredArchivedCustomers();
      const paged = filtered.slice(archivedPage * ARCHIVED_PAGE_SIZE, (archivedPage + 1) * ARCHIVED_PAGE_SIZE);
      const totalPages = Math.ceil(filtered.length / ARCHIVED_PAGE_SIZE);

      // 전화번호별 문의 횟수 맵 (아카이브 데이터 기준)
      const phoneCountMap = {};
      archivedCustomers.forEach(c => {
        if (c.phone) {
          const norm = c.phone.replace(/[^0-9]/g, '');
          if (norm) phoneCountMap[norm] = (phoneCountMap[norm] || 0) + 1;
        }
