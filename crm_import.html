<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>CRM Data Import</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css">
  <style>* { font-family: 'NanumSquare', sans-serif; }</style>
</head>
<body class="bg-white p-8 max-w-2xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl font-black tracking-tight mb-2">CRM Data Import</h1>
    <p class="text-sm text-neutral-400">crm_data.json → Firestore (crm_customers)</p>
  </div>

  <div id="status" class="p-4 bg-neutral-50 border border-neutral-200 rounded-xl text-sm font-bold mb-6">Firebase 연결 중...</div>

  <div class="flex gap-3 mb-6">
    <button id="checkBtn" disabled class="px-6 py-3 bg-neutral-100 border border-neutral-200 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-neutral-200 transition-all">기존 데이터 확인</button>
    <button id="importBtn" disabled class="px-6 py-3 bg-black text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-neutral-800 transition-all">임포트 시작</button>
  </div>

  <div id="progress" class="hidden mb-6">
    <div class="h-4 bg-neutral-100 rounded-full overflow-hidden mb-2">
      <div id="progressBar" class="h-full bg-black rounded-full transition-all" style="width:0%"></div>
    </div>
    <p id="progressText" class="text-xs font-bold text-neutral-400"></p>
  </div>

  <div id="log" class="p-4 bg-neutral-50 rounded-xl text-[11px] font-mono max-h-[400px] overflow-y-auto space-y-1"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, writeBatch, doc, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyDs8IJANSBncJHcFFrF03pLM7JvEOppcY0",
      authDomain: "oska-integrated-management.firebaseapp.com",
      projectId: "oska-integrated-management",
      storageBucket: "oska-integrated-management.firebasestorage.app",
      messagingSenderId: "778732114280",
      appId: "1:778732114280:web:96e00aff42bdbff3bf06dd"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    try {
      await signInAnonymously(auth);
      document.getElementById('status').textContent = 'Firebase 연결 완료. 임포트 준비됨.';
      log('Firebase 인증 성공');
    } catch(e) {
      document.getElementById('status').textContent = 'Firebase 연결 실패: ' + e.message;
      log('에러: ' + e.message);
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    // 버튼 이벤트 바인딩 (모듈 내부에서 직접)
    document.getElementById('checkBtn').disabled = false;
    document.getElementById('importBtn').disabled = false;

    document.getElementById('checkBtn').addEventListener('click', async () => {
      log('기존 데이터 확인 중...');
      try {
        const snapshot = await getDocs(collection(db, 'crm_customers'));
        log(`기존 crm_customers: ${snapshot.size}건`);
        document.getElementById('status').textContent = `기존 데이터: ${snapshot.size}건`;
      } catch(e) {
        log('에러: ' + e.message);
      }
    });

    document.getElementById('importBtn').addEventListener('click', async () => {
      document.getElementById('importBtn').disabled = true;
      document.getElementById('progress').classList.remove('hidden');

      try {
        log('crm_data.json 로딩 중...');
        const resp = await fetch('./crm_data.json');
        const data = await resp.json();
        log(`${data.length}건 로드 완료. 업로드 시작...`);

        const BATCH_SIZE = 400;
        const totalBatches = Math.ceil(data.length / BATCH_SIZE);
        let imported = 0;

        for (let i = 0; i < totalBatches; i++) {
          const batch = writeBatch(db);
          const slice = data.slice(i * BATCH_SIZE, (i + 1) * BATCH_SIZE);

          slice.forEach(record => {
            const ref = doc(collection(db, 'crm_customers'));
            let dateTs = null;
            try {
              if (record.date) dateTs = Timestamp.fromDate(new Date(record.date + 'T00:00:00'));
            } catch(e) {}
            batch.set(ref, {
              ...record,
              createdAt: dateTs || Timestamp.now()
            });
          });

          await batch.commit();
          imported += slice.length;

          const pct = Math.round((imported / data.length) * 100);
          document.getElementById('progressBar').style.width = pct + '%';
          document.getElementById('progressText').textContent = `${imported} / ${data.length} (${pct}%)`;
          log(`배치 ${i + 1}/${totalBatches} 완료 (${slice.length}건)`);
        }

        log(`✅ 임포트 완료! 총 ${imported}건`);
        document.getElementById('status').textContent = `✅ 임포트 완료! ${imported}건 저장됨`;
        document.getElementById('status').className = 'p-4 bg-green-50 border border-green-200 rounded-xl text-sm font-bold mb-6 text-green-700';
      } catch(e) {
        log(`❌ 에러: ${e.message}`);
        document.getElementById('status').textContent = '임포트 실패: ' + e.message;
        document.getElementById('importBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
